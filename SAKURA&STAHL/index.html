/* =====================================================================

   v2: fake-3D top-down renderer (camera-parallax extrusion + sprite-
   stacked cars with body roll), 5 badge-free JDM legend lookalikes,
   per-car engine synth with gears / turbo whine / BOV / lift-off pops,

   v2.1: 120 Hz fixed-substep physics, reachable spin-outs (tyre
   saturation), frame-rate-proof wrong-way, gamepad + rumble, minimap,
   localStorage save (best lap + ghost + chain + mute + selection),
   interpolated ghost playback, M mute, blur auto-pause, compact garage.
   v2.2: mechanical gearshifts (hard rev drop, ignition cut, driveline
   clunk, rev-match blip), turbo whine + spool whoosh + flutter/BOV,
   NA induction growl, engine roughness wobble; underglow removed.
   v2.3: real gearbox pacing (hysteresis, shift cooldown, torque cut,
   limiter over-swing), lift-off flutter fixed (raw-pedal edge detect)
   with a longer surge whose stutter slows as it dies — tolololo.
   v2.4: per-car gear ratios, rpm/speed/load shift logic, natural
   downshifts, and lower-gear torque pull for more believable drift runs.
   v2.5: Meihan Sportsland (third circuit, sodium-dusk drift bowl),
   Nordschleife Touristenfahrten traffic (yielding tourists, blinkers,
   overtake scoring, contact physics), authentic 5/6-speed ratios and
   shift times per car, per-car turbo pitch / spool lag / NA growl,
   corner-name callouts and lap-distance HUD on the 'Ring.
   ===================================================================== */

// ------------------------------------------------ tiny math
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const angNorm = a => { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; };
const fmtT = t => {
  if (t == null) return '--:--.---';
  // round FIRST, then split — 59.9999 must read 1:00.000, not 0:60.000
  const ms = Math.max(0, Math.round(t * 1000));
  const m = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  return m + ':' + String(sec).padStart(2, '0') + '.' + String(ms % 1000).padStart(3, '0');
};
// deterministic hash → [0,1) — procedural scenery that never changes
function h01(n) {
  const s = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return s - Math.floor(s);
}
// hex -> [r,g,b]
function hexRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}
// mix two hex colors, t=0 -> a, t=1 -> b
function mixCol(a, b, t) {
  const A = hexRgb(a), B = hexRgb(b);
  return 'rgb(' + Math.round(lerp(A[0], B[0], t)) + ',' +
    Math.round(lerp(A[1], B[1], t)) + ',' + Math.round(lerp(A[2], B[2], t)) + ')';
}
// multiply hex brightness
function shadeCol(h, m) {
  const c = hexRgb(h);
  return 'rgb(' + Math.round(clamp(c[0] * m, 0, 255)) + ',' +
    Math.round(clamp(c[1] * m, 0, 255)) + ',' + Math.round(clamp(c[2] * m, 0, 255)) + ')';
}

// ------------------------------------------------ fake-3D constant
// A point at height h is drawn pushed away from the camera centre by
// (p - cam) * KZ * h  — classic top-down parallax extrusion.
const KZ = 0.00125;

// ------------------------------------------------ track definition
// Control points [x, y, width] — closed Catmull-Rom loop.
// v2: widths up ~75% so long, lazy drifts fit. Layout homage to Ebisu:
// figure-eight crossover, tight east hairpin, huge banked west sweeper.
const CTRL = [
  [1350, 1250, 150],  // approach crossover from SW
  [1550,  950, 150],  // leave crossover to NE
  [1850,  700, 152],
  [2250,  620, 156],  // start/finish straight
  [2600,  780, 164],
  [2720, 1080, 176],  // hairpin apex (east)
  [2560, 1350, 164],
  [2200, 1420, 156],
  [1850, 1330, 150],
  [1600, 1120, 146],  // approach crossover from SE
  [1350,  900, 150],  // leave crossover to NW
  [1050,  700, 156],
  [ 680,  620, 172],
  [ 380,  800, 204],  // wide drift zone begins
  [ 300, 1120, 226],  // big sweeper apex (banked)
  [ 430, 1420, 220],
  [ 760, 1560, 208],
  [1100, 1480, 178]
];

// shared loop finisher: recentre with margin, tangents/normals, length,
// curvature (heading delta over ±5 samples) and edge points
function finalizeLoop(pts, M) {
  const N = pts.length;
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  for (const p of pts) {
    minX = Math.min(minX, p.x - p.w); maxX = Math.max(maxX, p.x + p.w);
    minY = Math.min(minY, p.y - p.w); maxY = Math.max(maxY, p.y + p.w);
  }
  const ox = M - minX, oy = M - minY;
  for (const p of pts) { p.x += ox; p.y += oy; }
  const worldW = (maxX - minX) + 2 * M, worldH = (maxY - minY) + 2 * M;
  for (let i = 0; i < N; i++) {
    const a = pts[(i - 1 + N) % N], b = pts[(i + 1) % N];
    let tx = b.x - a.x, ty = b.y - a.y;
    const l = Math.hypot(tx, ty) || 1; tx /= l; ty /= l;
    const p = pts[i];
    p.tx = tx; p.ty = ty; p.nx = -ty; p.ny = tx;
  }
  let total = 0;
  for (let i = 0; i < N; i++) {
    const a = pts[i], b = pts[(i + 1) % N];
    a.segLen = Math.hypot(b.x - a.x, b.y - a.y);
    total += a.segLen;
  }
  for (let i = 0; i < N; i++) {
    const a = pts[(i - 5 + N) % N], b = pts[(i + 5) % N];
    pts[i].curv = angNorm(Math.atan2(b.ty, b.tx) - Math.atan2(a.ty, a.tx));
  }
  for (const p of pts) {
    const hw = p.w / 2;
    p.lx = p.x + p.nx * hw; p.ly = p.y + p.ny * hw;
    p.rx = p.x - p.nx * hw; p.ry = p.y - p.ny * hw;
  }
  return { pts, N, total, worldW, worldH, ox, oy };
}

// generic Catmull-Rom control-loop builder shared by the drift circuits
function buildCtrlTrack(ctrl, startX, startY) {
  const SEG = 40, n = ctrl.length, pts = [];
  for (let i = 0; i < n; i++) {
    const p0 = ctrl[(i - 1 + n) % n], p1 = ctrl[i],
          p2 = ctrl[(i + 1) % n],     p3 = ctrl[(i + 2) % n];
    for (let j = 0; j < SEG; j++) {
      const t = j / SEG, t2 = t * t, t3 = t2 * t;
      const q = (a, b, c, d) =>
        0.5 * (2 * b + (c - a) * t + (2 * a - 5 * b + 4 * c - d) * t2 + (3 * b - a - 3 * c + d) * t3);
      pts.push({
        x: q(p0[0], p1[0], p2[0], p3[0]),
        y: q(p0[1], p1[1], p2[1], p3[1]),
        w: q(p0[2], p1[2], p2[2], p3[2])
      });
    }
  }
  const t = finalizeLoop(pts, 360);
  const sx = startX + t.ox, sy = startY + t.oy;
  let startIdx = 0, bd = 1e18;
  for (let i = 0; i < t.N; i++) {
    const d = (t.pts[i].x - sx) ** 2 + (t.pts[i].y - sy) ** 2;
    if (d < bd) { bd = d; startIdx = i; }
  }
  t.startIdx = startIdx; t.dyn = false;
  return t;
}
function buildTrack() { return buildCtrlTrack(CTRL, 2050, 660); }

function buildNring() {
  const pts = [];
  const ROAD_W = 180;
  const START_APRON = 56;
  let x = NRING_D[0], y = NRING_D[1];
  pts.push({ x, y, w: ROAD_W });
  for (let i = 2; i < NRING_D.length; i += 2) {
    x += NRING_D[i]; y += NRING_D[i + 1];
    pts.push({ x, y, w: ROAD_W });
  }
  const n = pts.length;
  // wider apron through the start/finish area, tapering off smoothly
  for (let k = -22; k <= 22; k++) {
    const i = (k + n) % n;
    pts[i].w = ROAD_W + START_APRON * (0.5 + 0.5 * Math.cos(Math.PI * k / 22));
  }
  const t = finalizeLoop(pts, 700);
  t.startIdx = 0; t.dyn = true;
  // spatial hash of sample indices for viewport-culled dynamic rendering
  t.gridCell = 1024;
  t.grid = new Map();
  for (let i = 0; i < t.N; i++) {
    const p = t.pts[i];
    const key = Math.floor(p.x / t.gridCell) + ',' + Math.floor(p.y / t.gridCell);
    let arr = t.grid.get(key);
    if (!arr) t.grid.set(key, arr = []);
    arr.push(i);
  }
  // Eifel forest planted ONCE, deterministically, with a clearance
  // check against the whole circuit — parallel sections (Wehrseifen /
  // Hatzenbach run ~30 m apart) must never get a tree on the tarmac
  const clearHere = (x, y) => {
    const cs = t.gridCell;
    for (let gx = Math.floor((x - 140) / cs); gx <= Math.floor((x + 140) / cs); gx++)
      for (let gy = Math.floor((y - 140) / cs); gy <= Math.floor((y + 140) / cs); gy++) {
        const arr = t.grid.get(gx + ',' + gy);
        if (!arr) continue;
        for (const i of arr) {
          const p = t.pts[i];
          const dx = p.x - x, dy = p.y - y;
          if (dx * dx + dy * dy < (p.w / 2 + 30) ** 2) return false;
        }
      }
    return true;
  };
  t.treeByIdx = new Map();
  for (let i = 0; i < t.N; i += 2) {
    const p = t.pts[i];
    const bucket = [];
    for (const side of [1, -1]) {
      for (let row = 0; row < 2; row++) {   // near treeline + deep forest
        const hb = h01(i * 2.7 + side * 13.3 + row * 51.7);
        if (hb < (row ? 0.5 : 0.22)) continue;
        const dist = p.w / 2 + 46 + h01(i * 5.1 + side + row * 17) * 190 + row * 220;
        const tx = p.x + p.nx * side * dist, ty = p.y + p.ny * side * dist;
        if (!clearHere(tx, ty)) continue;
        bucket.push({
          x: tx, y: ty,
          s: 13 + h01(i * 9.7 - side * 3 + row) * 17,
          con: h01(i * 3.3 + side * 7 + row * 5) < 0.72
        });
      }
    }
    if (bucket.length) t.treeByIdx.set(i, bucket);
  }
  return t;
}

// nearest centreline sample. from == null → full scan, else windowed
// search around a known progress index (handles the fig-8 crossover).
function nearestSample(x, y, from, win) {
  const P = TRACK.pts, N = TRACK.N;
  let bi = 0, bd = 1e18;
  if (from == null) {
    for (let i = 0; i < N; i++) {
      const d = (P[i].x - x) ** 2 + (P[i].y - y) ** 2;
      if (d < bd) { bd = d; bi = i; }
    }
  } else {
    for (let k = -win; k <= win; k++) {
      const i = (from + k + N) % N;
      const d = (P[i].x - x) ** 2 + (P[i].y - y) ** 2;
      if (d < bd) { bd = d; bi = i; }
    }
  }
  return { i: bi, d: Math.sqrt(bd) };
}
// coarse global "am I on ANY asphalt" test (crossover branch safety)
function anyOnTrack(x, y) {
  const P = TRACK.pts, N = TRACK.N;
  for (let i = 0; i < N; i += 4) {
    const dx = P[i].x - x, dy = P[i].y - y;
    const hw = P[i].w / 2 + 3;
    if (dx * dx + dy * dy < hw * hw) return true;
  }
  return false;
}

  const loaded = throttle > 0.28;

        }
        if (this.rpm > 0.72 && (E.pops || 0) > 0.3 && Math.random() < 0.5)
          this.crackle(1);                                  // shift brap
      }
    },
    airShift() { // GT3 pneumatic paddle shift: sharp "psht" + dog clack
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime + 0.01;
        const s = c.createBufferSource(); s.buffer = this.noiseBuf;
        s.playbackRate.value = 1.6;
        const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 3200;
        const g = c.createGain();
        g.gain.setValueAtTime(0.09, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        s.connect(f); f.connect(g); g.connect(this.master);
        s.start(t); s.stop(t + 0.08);
        const o = c.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(210, t + 0.02);
        o.frequency.exponentialRampToValueAtTime(90, t + 0.05);
        const g2 = c.createGain();
        g2.gain.setValueAtTime(0.05, t + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        o.connect(g2); g2.connect(this.master);
        o.start(t + 0.02); o.stop(t + 0.07);
      } catch (e) {}
    },
    clunk(up) { // driveline thock on clutch re-engagement
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime + (up ? 0.2 : 0.06);
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(up ? 120 : 100, t);
        o.frequency.exponentialRampToValueAtTime(55, t + 0.05);
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.07, t + 0.006);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.09);
        const s2 = c.createBufferSource(); s2.buffer = this.noiseBuf;
        const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
        const g2 = c.createGain();
        g2.gain.setValueAtTime(0.035, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
        s2.connect(f); f.connect(g2); g2.connect(this.master);
        s2.start(t); s2.stop(t + 0.06);
      } catch (e) {}
    },
    flutter(inten) { // compressor surge — "to-lo-lo-lo-lo" on lift
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime;
        const dur = 0.38 + clamp(inten, 0, 1) * 0.18;    // big boost = long surge
        const s2 = c.createBufferSource(); s2.buffer = this.noiseBuf;
        s2.playbackRate.value = 1.15;
        const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.7;
        f.frequency.setValueAtTime(2400, t);
        f.frequency.exponentialRampToValueAtTime(850, t + dur);
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.13 * clamp(inten, 0.45, 1), t + 0.012);
        g.gain.setValueAtTime(0.11 * clamp(inten, 0.45, 1), t + dur * 0.45);
        g.gain.exponentialRampToValueAtTime(0.002, t + dur);
        // the chop IS the tolololo — and it slows down as the surge dies
        const chop = c.createGain(); chop.gain.value = 0.5;
        const lfo = c.createOscillator(); lfo.type = 'square';
        lfo.frequency.setValueAtTime(29, t);
        lfo.frequency.linearRampToValueAtTime(17, t + dur);
        const lg = c.createGain(); lg.gain.value = 0.5;
        lfo.connect(lg); lg.connect(chop.gain);
        s2.connect(f); f.connect(g); g.connect(chop); chop.connect(this.master);
        s2.start(t); lfo.start(t);
        s2.stop(t + dur + 0.03); lfo.stop(t + dur + 0.03);
      } catch (e) {}
    },
    bov(inten) { // blow-off valve "psshh"
      if (!this.ok) return;
      const c = this.ctx, s = c.createBufferSource(); s.buffer = this.noiseBuf;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.1;
      const g = c.createGain(), t = c.currentTime;
      f.frequency.setValueAtTime(2600, t);
      f.frequency.exponentialRampToValueAtTime(900, t + 0.28);
      g.gain.setValueAtTime(0.11 * clamp(inten, 0.3, 1), t);
      g.gain.exponentialRampToValueAtTime(0.002, t + 0.3);
      s.connect(f); f.connect(g); g.connect(this.master);
      s.start(t); s.stop(t + 0.32);
    },
    whoosh(v) { // pass-by air rush — traffic blowing past (or being blown past)
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime;
        const s = c.createBufferSource(); s.buffer = this.noiseBuf; s.loop = true;
        const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 0.8;
        f.frequency.setValueAtTime(320, t);
        f.frequency.exponentialRampToValueAtTime(1500, t + 0.16);
        f.frequency.exponentialRampToValueAtTime(240, t + 0.55);
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.09 * clamp(v, 0.3, 1), t + 0.14);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        s.connect(f); f.connect(g); g.connect(this.master);
        s.start(t); s.stop(t + 0.65);
      } catch (e) {}
    },
    thud() { // body-on-body contact with traffic
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime;
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(95, t);
        o.frequency.exponentialRampToValueAtTime(38, t + 0.12);
        const g = c.createGain();
        g.gain.setValueAtTime(0.16, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.2);
        const s = c.createBufferSource(); s.buffer = this.noiseBuf;
        const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 700;
        const g2 = c.createGain();
        g2.gain.setValueAtTime(0.1, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
        s.connect(f); f.connect(g2); g2.connect(this.master);
        s.start(t); s.stop(t + 0.1);
      } catch (e) {}
    },
    crackle(n) { // lift-off pops / mild backfire
      if (!this.ok) return;
      const c = this.ctx;
      for (let i = 0; i < n; i++) {
        const t = c.currentTime + 0.02 + i * (0.05 + Math.random() * 0.05);
        const s = c.createBufferSource(); s.buffer = this.noiseBuf;
        s.playbackRate.value = 0.6 + Math.random() * 0.5;
        const f = c.createBiquadFilter(); f.type = 'lowpass';
        f.frequency.value = 380 + Math.random() * 320;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.09 + Math.random() * 0.05, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.002, t + 0.07);
        s.connect(f); f.connect(g); g.connect(this.master);
        s.start(t); s.stop(t + 0.1);
      }
    },
    beep(f = 660, dur = 0.09, type = 'square', vol = 0.06) {
      if (!this.ok) return;
      const c = this.ctx, o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = f;
      const t = c.currentTime;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t + dur + 0.02);
    },
    chirp() { // drift initiation tyre chirp
      if (!this.ok) return;
      const c = this.ctx, s = c.createBufferSource(); s.buffer = this.noiseBuf;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 2;
      const g = c.createGain(), t = c.currentTime;
      f.frequency.setValueAtTime(700, t);
      f.frequency.exponentialRampToValueAtTime(1900, t + 0.14);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.002, t + 0.16);
      s.connect(f); f.connect(g); g.connect(this.master);
      s.start(t); s.stop(t + 0.18);
    },
    bank() { // score banked jingle
      this.beep(1174, 0.07, 'sine', 0.05);
      setTimeout(() => this.beep(1568, 0.1, 'sine', 0.05), 70);
    },
    callout() {
      this.beep(880, 0.06, 'triangle', 0.05);
      setTimeout(() => this.beep(1318, 0.12, 'triangle', 0.05), 60);
    }
  };

  // ---------------------------------------------- fake-3D helpers
  // World point at height h, pushed radially away from the camera —
  // classic top-down parallax extrusion. Everything tall uses this.
  function liftW(x, y, h) {
    return { x: x + (x - cam.x) * KZ * h, y: y + (y - cam.y) * KZ * h };
  }
  // dusk key light for wall shading
  const LX = -0.507, LY = -0.862;
  function faceBright(nx, ny) {
    return 0.60 + 0.40 * Math.max(0, nx * LX + ny * LY);
  }
  function quadFill(g, a, b, c, d, col) {
    g.beginPath();
    g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.lineTo(c.x, c.y); g.lineTo(d.x, d.y);
    g.closePath();
    g.fillStyle = col; g.fill();
  }
  // extruded box: half-length hl along rot, half-depth hh across, z0..z1
  function boxPart(g, cx, cy, hl, hh, rot, z0, z1, wallHex, roofHex, opts) {
    const ca = Math.cos(rot), sa = Math.sin(rot);
    const loc = [[hl, hh], [hl, -hh], [-hl, -hh], [-hl, hh]];
    const nrm = [[1, 0], [0, -1], [-1, 0], [0, 1]];
    const base = [];
    for (const p of loc) base.push({ x: cx + p[0] * ca - p[1] * sa, y: cy + p[0] * sa + p[1] * ca });
    for (let i = 0; i < 4; i++) {
      const a = base[i], b = base[(i + 1) % 4];
      const nx = nrm[i][0] * ca - nrm[i][1] * sa, ny = nrm[i][0] * sa + nrm[i][1] * ca;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      if (nx * (cam.x - mx) + ny * (cam.y - my) <= 0) continue; // back face
      const a0 = liftW(a.x, a.y, z0), b0 = liftW(b.x, b.y, z0);
      const a1 = liftW(a.x, a.y, z1), b1 = liftW(b.x, b.y, z1);
      quadFill(g, a0, b0, b1, a1, shadeCol(wallHex, faceBright(nx, ny)));
      if (opts && opts.wallDeco) opts.wallDeco(g, i, a0, b0, b1, a1, nx, ny);
    }
    const top = base.map(p => liftW(p.x, p.y, z1));
    g.beginPath();
    g.moveTo(top[0].x, top[0].y);
    for (let i = 1; i < 4; i++) g.lineTo(top[i].x, top[i].y);
    g.closePath();
    g.fillStyle = roofHex; g.fill();
    g.strokeStyle = 'rgba(10,8,18,0.35)'; g.lineWidth = 1; g.stroke();
    if (opts && opts.roof) opts.roof(g, top, rot, z1);
  }
  // extruded cylinder: fat stroked line for the side, disc on top
  function cylPart(g, x, y, r, z0, z1, sideCol, topCol) {
    const a = liftW(x, y, z0), b = liftW(x, y, z1);
    g.strokeStyle = sideCol; g.lineWidth = r * 2; g.lineCap = 'butt';
    g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.stroke();
    g.fillStyle = topCol;
    g.beginPath(); g.arc(b.x, b.y, r, 0, TAU); g.fill();
  }

  // ---------------------------------------------- pre-rendered ground
  // Flat stuff (grass, asphalt, curbs, neon, prop shadows, light pools)
  // renders once offscreen; skid marks live on a second fading canvas.
  // Anything with HEIGHT is a prop drawn per-frame with the parallax.
  // The Nordschleife world (62k × 50k px) is far too big to prerender —
  // it renders dynamically per frame from the spatial grid instead
  // (bg/marks stay null, skid marks live in the `skids` array).
  let bg = null, bgctx = null, marks = null, mctx = null;
  let props = [];
  const skids = [];             // dyn tracks: {x1,y1,x2,y2,t} world segs

  function clearOfTrack(x, y, margin) {
    const P = TRACK.pts, N = TRACK.N;
    for (let i = 0; i < N; i += 4) {
      const dx = P[i].x - x, dy = P[i].y - y, r = P[i].w / 2 + margin;
      if (dx * dx + dy * dy < r * r) return false;
    }
    return true;
  }
  function stampShadow(x, y, rx, ry, a = 0.28) {
    if (!bgctx) return;
    bgctx.save();
    bgctx.fillStyle = 'rgba(16,6,26,' + a + ')';
    bgctx.beginPath(); bgctx.ellipse(x + 7, y + 10, rx, ry, 0, 0, TAU); bgctx.fill();
    bgctx.restore();
  }
  function stampGlow(x, y, r, col, a) {
    if (!bgctx) return;
    bgctx.save();
    const rg = bgctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, col); rg.addColorStop(1, 'rgba(0,0,0,0)');
    bgctx.globalAlpha = a; bgctx.fillStyle = rg;
    bgctx.beginPath(); bgctx.arc(x, y, r, 0, TAU); bgctx.fill();
    bgctx.restore();
  }

  function prerenderWorld() {
    const g = bgctx;
    const P = TRACK.pts, N = TRACK.N;
    const pal = stylePal();
    // dusk-lit grass
    const gr = g.createLinearGradient(0, 0, 0, bg.height);
    gr.addColorStop(0, pal.grass[0]); gr.addColorStop(0.55, pal.grass[1]); gr.addColorStop(1, pal.grass[2]);
    g.fillStyle = gr; g.fillRect(0, 0, bg.width, bg.height);
    for (let i = 0; i < 10; i++) { // warm sun patches
      const x = rnd(bg.width), y = rnd(bg.height), r = rnd(200, 460);
      const rg = g.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, 'rgba(' + pal.sun + ',0.06)'); rg.addColorStop(1, 'rgba(' + pal.sun + ',0)');
      g.fillStyle = rg; g.beginPath(); g.arc(x, y, r, 0, TAU); g.fill();
    }
    g.globalAlpha = 0.06;
    for (let i = 0; i < 5200; i++) {
      g.fillStyle = Math.random() < 0.5 ? '#e8ffe0' : '#0d1f18';
      g.fillRect(rnd(bg.width), rnd(bg.height), 2, 2);
    }
    g.globalAlpha = 1;

    // ribbon path
    const ribbon = new Path2D();
    ribbon.moveTo(P[0].lx, P[0].ly);
    for (let i = 1; i < N; i++) ribbon.lineTo(P[i].lx, P[i].ly);
    ribbon.lineTo(P[0].lx, P[0].ly);
    for (let i = N - 1; i >= 0; i--) ribbon.lineTo(P[i].rx, P[i].ry);
    ribbon.closePath();

    // elevation shadow, then asphalt
    g.save(); g.translate(9, 13);
    g.fillStyle = 'rgba(8,4,18,0.35)'; g.fill(ribbon); g.restore();
    g.fillStyle = '#413d4e'; g.fill(ribbon);
    g.save(); g.clip(ribbon); // dusk light wash on asphalt
    const ag = g.createLinearGradient(0, 0, 0, bg.height);
    ag.addColorStop(0, pal.wash[0]);
    ag.addColorStop(0.5, pal.wash[1]);
    ag.addColorStop(1, pal.wash[2]);
    g.fillStyle = ag; g.fillRect(0, 0, bg.width, bg.height);
    // banking cue lines on hard corners
    g.strokeStyle = 'rgba(255,255,255,0.05)'; g.lineWidth = 2;
    for (let i = 0; i < N; i += 6) {
      if (Math.abs(P[i].curv) > 0.15) {
        g.beginPath(); g.moveTo(P[i].lx, P[i].ly); g.lineTo(P[i].rx, P[i].ry); g.stroke();
      }
    }
    g.restore();

    // worn racing polish down the middle
    const inner = new Path2D();
    const iw = 0.27; // fraction of full width each side of centre
    inner.moveTo(P[0].x + P[0].nx * P[0].w * iw, P[0].y + P[0].ny * P[0].w * iw);
    for (let i = 1; i < N; i++)
      inner.lineTo(P[i].x + P[i].nx * P[i].w * iw, P[i].y + P[i].ny * P[i].w * iw);
    inner.lineTo(P[0].x + P[0].nx * P[0].w * iw, P[0].y + P[0].ny * P[0].w * iw);
    for (let i = N - 1; i >= 0; i--)
      inner.lineTo(P[i].x - P[i].nx * P[i].w * iw, P[i].y - P[i].ny * P[i].w * iw);
    inner.closePath();
    g.fillStyle = 'rgba(12,10,20,0.15)'; g.fill(inner);

    // white edge lines just inside the neon
    g.strokeStyle = 'rgba(255,255,255,0.35)'; g.lineWidth = 3;
    for (const side of [1, -1]) {
      g.beginPath();
      for (let i = 0; i < N; i++) {
        const hw = P[i].w / 2 - 8;
        const x = P[i].x + P[i].nx * side * hw;
        const y = P[i].y + P[i].ny * side * hw;
        if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
      }
      g.closePath(); g.stroke();
    }

    // curbs on corners (chunkier for the wide track)
    for (let i = 0; i < N; i += 3) {
      if (Math.abs(P[i].curv) < 0.10) continue;
      for (const s of [1, -1]) {
        const ex = s > 0 ? P[i].lx : P[i].rx, ey = s > 0 ? P[i].ly : P[i].ry;
        g.save();
        g.translate(ex, ey); g.rotate(Math.atan2(P[i].ty, P[i].tx));
        g.fillStyle = ((i / 3) | 0) % 2 ? pal.curb[0] : pal.curb[1];
        g.fillRect(-9, s > 0 ? -3 : -8, 18, 11);
        g.restore();
      }
    }

    // centre dashes
    g.strokeStyle = 'rgba(255,236,246,0.15)'; g.lineWidth = 3.2;
    g.setLineDash([22, 34]);
    g.beginPath(); g.moveTo(P[0].x, P[0].y);
    for (let i = 1; i < N; i++) g.lineTo(P[i].x, P[i].y);
    g.closePath(); g.stroke();
    g.setLineDash([]);

    // direction chevrons
    g.strokeStyle = 'rgba(255,214,110,0.55)'; g.lineWidth = 4; g.lineCap = 'round';
    for (let i = 0; i < N; i += 90) {
      const p = P[i];
      g.save(); g.translate(p.x, p.y); g.rotate(Math.atan2(p.ty, p.tx));
      g.beginPath();
      g.moveTo(-6, -10); g.lineTo(7, 0); g.lineTo(-6, 10);
      g.moveTo(-19, -10); g.lineTo(-6, 0); g.lineTo(-19, 10);
      g.stroke(); g.restore();
    }

    // painted kanji in the wide drift zone
    let wi = 0; for (let i = 0; i < N; i++) if (P[i].w > P[wi].w) wi = i;
    g.save();
    g.translate(P[wi].x, P[wi].y); g.rotate(Math.atan2(P[wi].ty, P[wi].tx));
    g.globalAlpha = 0.12; g.fillStyle = '#ffe9f4';
    g.font = '700 76px "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(pal.kanji, 0, 0);
    g.restore();

    // start / finish checker band
    {
      const p = P[TRACK.startIdx], hw = p.w / 2 - 4;
      g.save();
      g.translate(p.x, p.y); g.rotate(Math.atan2(p.ty, p.tx));
      for (let a = -hw; a < hw; a += 10) {
        for (let r = 0; r < 3; r++) {
          g.fillStyle = ((a / 10 + r) & 1) ? '#101018' : '#f2f0ea';
          g.fillRect(-15 + r * 10, a, 10, 10);
        }
      }
      g.restore();
    }

    // neon edge lighting — per style: sakura pink/cyan, sodium amber/ember
    const le = new Path2D(), re = new Path2D();
    le.moveTo(P[0].lx, P[0].ly); re.moveTo(P[0].rx, P[0].ry);
    for (let i = 1; i < N; i++) { le.lineTo(P[i].lx, P[i].ly); re.lineTo(P[i].rx, P[i].ry); }
    le.closePath(); re.closePath();
    g.lineJoin = 'round';
    g.shadowColor = pal.neonL[0]; g.shadowBlur = 16;
    g.strokeStyle = pal.neonL[1]; g.lineWidth = 3; g.stroke(le);
    g.shadowColor = pal.neonR[0];
    g.strokeStyle = pal.neonR[1]; g.stroke(re);
    g.shadowBlur = 0;
    g.strokeStyle = pal.neonL[2]; g.lineWidth = 1.1; g.stroke(le);
    g.strokeStyle = pal.neonR[2]; g.stroke(re);

    // small bushes / stones (flat ground clutter)
    for (let k = 0; k < 300; k++) {
      const x = rnd(20, bg.width - 20), y = rnd(20, bg.height - 20);
      if (!clearOfTrack(x, y, 20)) continue;
      g.fillStyle = Math.random() < 0.6 ? 'rgba(70,110,80,0.8)' : 'rgba(120,110,130,0.7)';
      g.beginPath(); g.arc(x, y, rnd(2, 5), 0, TAU); g.fill();
    }
  }

  // ---------------------------------------------- 3D props
  // per-style world palette: Ebisu keeps the sakura dusk, Meihan gets a
  // dry-grass sodium-vapour evening — same renderer, different soul
  const STYLE_PAL = {
    sakura: {
      grass: ['#3b4839', '#294034', '#20342d'], sun: '255,150,120',
      wash: ['rgba(255,120,160,0.10)', 'rgba(90,60,140,0.06)', 'rgba(20,10,40,0.16)'],
      curb: ['#ff5a66', '#f5f0ea'], kanji: '恵比寿',
      neonL: ['#ff5fb4', '#ff6fc0', '#ffdcef'], neonR: ['#31d5ff', '#3fd8ff', '#dcf9ff'],
      tree: { cols: ['#ff9ec9', '#ffb3d6', '#f77fb4', '#ffc7de', '#ff8fbe'],
              trunk: ['#4a2a3a', '#5a3448'], hi: 'rgba(255,224,238,0.85)' }
    },
    meihan: {
      grass: ['#4a4a34', '#3d442f', '#2f3a2b'], sun: '255,180,90',
      wash: ['rgba(255,150,60,0.10)', 'rgba(140,90,60,0.06)', 'rgba(28,16,32,0.18)'],
      curb: ['#e04a30', '#f0e8d8'], kanji: '名阪',
      neonL: ['#ffb14d', '#ffc06a', '#ffe9c8'], neonR: ['#ff6a3d', '#ff8a5e', '#ffd9c8'],
      tree: { cols: ['#4c7a44', '#5b8a4d', '#3f6a3a', '#6b9a58', '#457540'],
              trunk: ['#3a2c22', '#4a382b'], hi: 'rgba(214,244,196,0.55)' }
    }
  };
  function stylePal() { return STYLE_PAL[TRACK.style] || STYLE_PAL.sakura; }

  function makeTree(x, y, s) {
    const TP = stylePal().tree;   // captured at build — props are per-world
    const layers = [];
    const hs = [s * 0.95, s * 1.45, s * 1.95];
    for (let li = 0; li < 3; li++) {
      const blobs = [];
      const nB = li === 2 ? 4 : 6;
      for (let b = 0; b < nB; b++) {
        const a = rnd(TAU), r = rnd(0.12, 0.55) * s * (1 - li * 0.22);
        blobs.push({
          dx: Math.cos(a) * r, dy: Math.sin(a) * r,
          r: rnd(0.30, 0.5) * s * (1 - li * 0.16),
          col: shadeCol(TP.cols[(Math.random() * TP.cols.length) | 0], 0.72 + li * 0.16)
        });
      }
      layers.push({ h: hs[li], blobs });
    }
    const hi = [];
    for (let b = 0; b < 3; b++)
      hi.push({ dx: rnd(-0.3, 0.3) * s, dy: rnd(-0.3, 0.3) * s, r: rnd(0.12, 0.2) * s });
    stampShadow(x, y, s * 1.1, s * 0.72, 0.30);
    props.push({
      cx: x, cy: y, cr: s * 2.4 + 26,
      draw(g) {
        cylPart(g, x, y, s * 0.14, 0, s * 0.9, TP.trunk[0], TP.trunk[1]);
        for (const L of layers) {
          for (const b of L.blobs) {
            const p = liftW(x + b.dx, y + b.dy, L.h);
            g.fillStyle = b.col;
            g.beginPath(); g.arc(p.x, p.y, b.r, 0, TAU); g.fill();
          }
        }
        g.fillStyle = TP.hi;
        for (const b of hi) {
          const p = liftW(x + b.dx, y + b.dy, s * 1.95);
          g.beginPath(); g.arc(p.x, p.y, b.r, 0, TAU); g.fill();
        }
      }
    });
  }

  function makeTireStack(x, y, col) {
    stampShadow(x, y, 9, 6, 0.3);
    props.push({
      cx: x, cy: y, cr: 18,
      draw(g) {
        for (let t = 0; t < 3; t++) {
          const z0 = t * 4.2, z1 = z0 + 4.2;
          cylPart(g, x, y, 7, z0, z1, '#15161c', t === 2 ? col : shadeCol(col, 0.78));
        }
        const p = liftW(x, y, 12.6);
        g.fillStyle = '#101116';
        g.beginPath(); g.arc(p.x, p.y, 3.4, 0, TAU); g.fill();
      }
    });
  }

  function genProps() {
    const P = TRACK.pts, N = TRACK.N;
    const startP = P[TRACK.startIdx];
    const trackRot = Math.atan2(startP.ty, startP.tx);

    // --- sakura trees lining the circuit + scattered background
    for (let i = 0; i < N; i += 12) {
      for (const s of [1, -1]) {
        if (Math.random() < 0.45) continue;
        const p = P[i], d = p.w / 2 + 64 + rnd(110);
        const x = p.x + p.nx * s * d, y = p.y + p.ny * s * d;
        if (x < 40 || y < 40 || x > bg.width - 40 || y > bg.height - 40) continue;
        if (!clearOfTrack(x, y, 32)) continue;
        makeTree(x, y, rnd(15, 27));
      }
    }
    for (let k = 0; k < 240; k++) {
      const x = rnd(60, bg.width - 60), y = rnd(60, bg.height - 60);
      if (!clearOfTrack(x, y, 74)) continue;
      makeTree(x, y, rnd(11, 22));
    }

    // --- light poles (skip near the start gantry)
    for (let i = 0; i < N; i += 34) {
      const p = P[i];
      if (Math.hypot(p.x - startP.x, p.y - startP.y) < 130) continue;
      const side = ((i / 34) | 0) % 2 ? 1 : -1;
      const d = p.w / 2 + 30;
      const x = p.x + p.nx * side * d, y = p.y + p.ny * side * d;
      if (!clearOfTrack(x, y, 8)) continue;
      const ax = x - p.nx * side * 18, ay = y - p.ny * side * 18;
      stampGlow(ax, ay, 66, 'rgba(255,205,140,1)', 0.13);
      stampShadow(x, y, 4, 3, 0.3);
      props.push({
        cx: x, cy: y, cr: 30,
        draw(g) {
          cylPart(g, x, y, 2.3, 0, 58, '#31353f', '#454a58');
          const a = liftW(x, y, 56), b = liftW(ax, ay, 55);
          g.strokeStyle = '#31353f'; g.lineWidth = 3; g.lineCap = 'round';
          g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.stroke();
          g.save();
          g.shadowColor = '#ffd9a0'; g.shadowBlur = 14;
          g.fillStyle = '#ffe6b8';
          g.beginPath(); g.arc(b.x, b.y, 3.2, 0, TAU); g.fill();
          g.restore();
        }
      });
    }

    // --- guardrails along the outside of corners
    const visited = new Array(N).fill(false);
    for (let i = 0; i < N; i++) {
      if (visited[i] || Math.abs(P[i].curv) < 0.06) continue;
      let a = i;
      while (Math.abs(P[(a - 1 + N) % N].curv) > 0.04 && !visited[(a - 1 + N) % N]) a = (a - 1 + N) % N;
      const run = [];
      let j = a, cs = 0;
      while (Math.abs(P[j].curv) > 0.04 && !visited[j] && run.length < N) {
        visited[j] = true; run.push(j); cs += P[j].curv; j = (j + 1) % N;
      }
      if (run.length < 10) continue;
      const side = cs > 0 ? -1 : 1; // outer side of the turn
      const pts = [];
      for (let k = 0; k < run.length; k += 2) {
        const p = P[run[k]];
        pts.push({ x: p.x + p.nx * side * (p.w / 2 + 14), y: p.y + p.ny * side * (p.w / 2 + 14) });
      }
      for (let c0 = 0; c0 < pts.length - 1; c0 += 11) {
        const seg = pts.slice(c0, Math.min(pts.length, c0 + 12));
        if (seg.length < 2) continue;
        let mx = 0, my = 0;
        for (const q of seg) { mx += q.x; my += q.y; }
        mx /= seg.length; my /= seg.length;
        let mr = 0;
        for (const q of seg) mr = Math.max(mr, Math.hypot(q.x - mx, q.y - my));
        props.push({
          cx: mx, cy: my, cr: mr + 30,
          draw(g) {
            for (let k = 0; k < seg.length; k += 2)
              cylPart(g, seg[k].x, seg[k].y, 1.6, 0, 9, '#23262e', '#3a3e48');
            g.beginPath();
            for (let k = 0; k < seg.length; k++) {
              const p = liftW(seg[k].x, seg[k].y, 7);
              if (k === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
            }
            for (let k = seg.length - 1; k >= 0; k--) {
              const p = liftW(seg[k].x, seg[k].y, 11.5);
              g.lineTo(p.x, p.y);
            }
            g.closePath();
            g.fillStyle = '#c9d2df'; g.fill();
            g.beginPath();
            for (let k = 0; k < seg.length; k++) {
              const p = liftW(seg[k].x, seg[k].y, 11.5);
              if (k === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
            }
            g.strokeStyle = 'rgba(240,246,255,0.9)'; g.lineWidth = 1.2; g.stroke();
            g.save();
            g.shadowColor = '#ff4444'; g.shadowBlur = 6; g.fillStyle = '#ff5555';
            for (let k = 1; k < seg.length; k += 3) {
              const p = liftW(seg[k].x, seg[k].y, 9.4);
              g.fillRect(p.x - 1.2, p.y - 1.2, 2.4, 2.4);
            }
            g.restore();
          }
        });
      }
    }

    // --- tyre stacks: hairpin inner + sweeper outer
    let hi2 = 0, wi = 0;
    for (let i = 0; i < N; i++) {
      if (Math.abs(P[i].curv) > Math.abs(P[hi2].curv)) hi2 = i;
      if (P[i].w > P[wi].w) wi = i;
    }
    const tireCols = ['#ff4444', '#f2f0ea', '#ffd23e'];
    for (let k = -3; k <= 3; k++) {
      const p = P[(hi2 + k * 7 + N * 2) % N];
      const s = Math.sign(p.curv) || 1;
      makeTireStack(p.x + p.nx * s * (p.w / 2 + 18), p.y + p.ny * s * (p.w / 2 + 18),
        tireCols[(k + 3) % 3]);
    }
    for (let k = -4; k <= 4; k++) {
      const p = P[(wi + k * 8 + N * 2) % N];
      const s = -(Math.sign(p.curv) || 1);
      makeTireStack(p.x + p.nx * s * (p.w / 2 + 20), p.y + p.ny * s * (p.w / 2 + 20),
        tireCols[(k + 4) % 3]);
    }
    // Meihan signature: the sweeper's outside is one long tyre wall —
    // interleaved between the shared stacks for a near-continuous barrier
    if (TRACK.style === 'meihan') {
      for (let k = -33; k <= 33; k += 2) {
        const p = P[(wi + k * 4 + N * 4) % N];
        const s = -(Math.sign(p.curv) || 1);
        makeTireStack(p.x + p.nx * s * (p.w / 2 + 20), p.y + p.ny * s * (p.w / 2 + 20),
          tireCols[((k + 33) / 2) % 3]);
      }
    }

    // --- start gantry (drives UNDER the beam — the 3D showpiece)
    {
      const p = startP, hw = p.w / 2, rot = trackRot;
      const pil = [
        { x: p.x + p.nx * (hw + 16), y: p.y + p.ny * (hw + 16) },
        { x: p.x - p.nx * (hw + 16), y: p.y - p.ny * (hw + 16) }
      ];
      bgctx.save();
      bgctx.translate(p.x, p.y); bgctx.rotate(rot + Math.PI / 2);
      bgctx.fillStyle = 'rgba(16,6,26,0.16)';
      bgctx.fillRect(-(hw + 22), 2, (hw + 22) * 2, 14);
      bgctx.restore();
      for (const q of pil) stampShadow(q.x, q.y, 9, 7, 0.3);
      props.push({
        cx: p.x, cy: p.y, cr: hw + 70, bias: -1,   // sorted "nearest": beam over cars
        draw(g) {
          for (const q of pil)
            boxPart(g, q.x, q.y, 6, 6, rot, 0, 54, '#59607a', '#7b84a4');
          boxPart(g, p.x, p.y, hw + 22, 7, rot + Math.PI / 2, 44, 58, '#454a63', '#666e92', {
            roof(g2, top, r2, z1) {
              const c = liftW(p.x, p.y, z1);
              g2.save();
              g2.translate(c.x, c.y); g2.rotate(rot + Math.PI / 2);
              g2.fillStyle = '#ffd166';
              g2.font = '900 13px system-ui, sans-serif';
              g2.textAlign = 'center'; g2.textBaseline = 'middle';
              g2.fillText(TRACKS[TRACK.id].name + ' · ' + stylePal().kanji, 0, 0);
              g2.restore();
            }
          });
          for (let i = 0; i < 2; i++) {
            const e = liftW(pil[i].x, pil[i].y, 58);
            g.save();
            g.shadowColor = i ? '#3fd8ff' : '#ff7ab8'; g.shadowBlur = 12;
            g.fillStyle = i ? '#8fe9ff' : '#ffb0d8';
            g.beginPath(); g.arc(e.x, e.y, 3, 0, TAU); g.fill();
            g.restore();
          }
        }
      });
    }

    // --- torii gate in the sweeper infield (Ebisu only — Meihan is a
    // paddock-and-tyres kind of place)
    if (TRACK.style === 'sakura') {
      const p = P[wi];
      const s = Math.sign(p.curv) || 1;
      let d = p.w / 2 + 96;
      let tx = p.x + p.nx * s * d, ty = p.y + p.ny * s * d;
      if (!clearOfTrack(tx, ty, 30)) { d += 50; tx = p.x + p.nx * s * d; ty = p.y + p.ny * s * d; }
      const rot = Math.atan2(p.ty, p.tx);
      const ca = Math.cos(rot), sa = Math.sin(rot);
      const pil = [
        { x: tx + ca * 32, y: ty + sa * 32 },
        { x: tx - ca * 32, y: ty - sa * 32 }
      ];
      for (const q of pil) stampShadow(q.x, q.y, 7, 5, 0.3);
      props.push({
        cx: tx, cy: ty, cr: 84,
        draw(g) {
          for (const q of pil) cylPart(g, q.x, q.y, 4.6, 0, 44, '#8f1d1d', '#c22a2a');
          boxPart(g, tx, ty, 40, 3.4, rot, 27, 33, '#a81f1f', '#c22a2a');
          boxPart(g, tx, ty, 52, 5, rot, 42, 51, '#a81f1f', '#d13030', {
            roof(g2, top) {
              g2.beginPath();
              g2.moveTo(top[0].x, top[0].y);
              for (let i = 1; i < 4; i++) g2.lineTo(top[i].x, top[i].y);
              g2.closePath();
              g2.strokeStyle = '#151318'; g2.lineWidth = 2.4; g2.stroke();
            }
          });
        }
      });
    }

    // --- paddock garages + vending machines + grandstand near start
    {
      const p = startP, hw = p.w / 2, rot = trackRot;
      let pitSide = 1;
      {
        const cx = p.x + p.nx * (hw + 120), cy = p.y + p.ny * (hw + 120);
        if (!clearOfTrack(cx, cy, 40)) pitSide = -1;
      }
      const deco = (g2, i, a0, b0, b1, a1) => {  // shutter seams
        g2.strokeStyle = 'rgba(0,0,0,0.25)'; g2.lineWidth = 1;
        g2.beginPath();
        for (let f = 0.2; f < 0.95; f += 0.2) {
          g2.moveTo(lerp(a0.x, b0.x, f), lerp(a0.y, b0.y, f));
          g2.lineTo(lerp(a1.x, b1.x, f), lerp(a1.y, b1.y, f));
        }
        g2.stroke();
      };
      for (let k = -1; k <= 1; k++) {
        const cx = p.x + p.tx * k * 150 + p.nx * pitSide * (hw + 120);
        const cy = p.y + p.ty * k * 150 + p.ny * pitSide * (hw + 120);
        if (!clearOfTrack(cx, cy, 26)) continue;
        stampShadow(cx, cy, 70, 48, 0.32);
        props.push({
          cx, cy, cr: 104,
          draw(g) {
            boxPart(g, cx, cy, 62, 40, rot, 0, 46, '#4c5468', '#5d667f', {
              wallDeco: deco,
              roof(g2, top, r2, z1) {
                const c = liftW(cx, cy, z1);
                g2.save();
                g2.translate(c.x, c.y); g2.rotate(rot);
                g2.fillStyle = 'rgba(255,255,255,0.55)';
                g2.font = '800 15px system-ui, sans-serif';
                g2.textAlign = 'center'; g2.textBaseline = 'middle';
                g2.fillText('ピット PIT', 0, 0);
                g2.restore();
              }
            });
            boxPart(g, cx + 22, cy - 14, 8, 6, rot, 46, 54, '#39404f', '#4a5162');
          }
        });
      }
      const vCols = ['#ff3b4d', '#3fd8ff', '#ffd166'];
      for (let k = 0; k < 3; k++) {
        const cx = p.x + p.tx * (206 + k * 15) + p.nx * pitSide * (hw + 70);
        const cy = p.y + p.ty * (206 + k * 15) + p.ny * pitSide * (hw + 70);
        if (!clearOfTrack(cx, cy, 10)) continue;
        const vc = vCols[k];
        stampGlow(cx, cy, 34, 'rgba(120,220,255,1)', 0.10);
        stampShadow(cx, cy, 7, 5, 0.3);
        props.push({
          cx, cy, cr: 22,
          draw(g) {
            boxPart(g, cx, cy, 5, 4, rot, 0, 15, '#20242e', '#2a2f3a', {
              wallDeco(g2, i, a0, b0, b1, a1) {
                g2.save();
                g2.shadowColor = vc; g2.shadowBlur = 10;
                g2.fillStyle = vc; g2.globalAlpha = 0.9;
                g2.beginPath();
                g2.moveTo(lerp(a0.x, a1.x, 0.25), lerp(a0.y, a1.y, 0.25));
                g2.lineTo(lerp(b0.x, b1.x, 0.25), lerp(b0.y, b1.y, 0.25));
                g2.lineTo(lerp(b0.x, b1.x, 0.85), lerp(b0.y, b1.y, 0.85));
                g2.lineTo(lerp(a0.x, a1.x, 0.85), lerp(a0.y, a1.y, 0.85));
                g2.closePath(); g2.fill();
                g2.restore();
              }
            });
          }
        });
      }
      // grandstand on the opposite side, a little down the straight
      {
        const sSide = -pitSide;
        const p2 = P[(TRACK.startIdx + 30) % N];
        const cx = p2.x + p2.nx * sSide * (p2.w / 2 + 112);
        const cy = p2.y + p2.ny * sSide * (p2.w / 2 + 112);
        const rot2 = Math.atan2(p2.ty, p2.tx);
        if (clearOfTrack(cx, cy, 30)) {
          const crowd = [];
          const cCols = ['#ffd166', '#ff7ab8', '#55e0ff', '#f2f0ea', '#b06bff', '#7dffb0'];
          for (let rx = -108; rx <= 108; rx += 9)
            for (let ry = -24; ry <= 24; ry += 8)
              if (Math.random() < 0.75)
                crowd.push({ x: rx + rnd(-2, 2), y: ry + rnd(-2, 2), c: cCols[(Math.random() * 6) | 0] });
          const ca2 = Math.cos(rot2), sa2 = Math.sin(rot2);
          stampShadow(cx, cy, 128, 46, 0.32);
          props.push({
            cx, cy, cr: 156,
            draw(g) {
              boxPart(g, cx, cy, 118, 32, rot2, 0, 14, '#3d4354', '#454c60');
              for (const q of crowd) {
                const wx = cx + q.x * ca2 - q.y * sa2, wy = cy + q.x * sa2 + q.y * ca2;
                const l = liftW(wx, wy, 15.5);
                g.fillStyle = q.c;
                g.fillRect(l.x - 1.4, l.y - 1.4, 2.8, 2.8);
              }
              for (const qx of [-100, 100]) for (const qy of [-24, 24]) {
                const wx = cx + qx * ca2 - qy * sa2, wy = cy + qx * sa2 + qy * ca2;
                cylPart(g, wx, wy, 2, 14, 32, '#2a2d36', '#3a3e48');
              }
              boxPart(g, cx, cy, 122, 36, rot2, 32, 39, '#59607a', '#666e92', {
                roof(g2, top, r3, z1) {
                  const c = liftW(cx, cy, z1);
                  g2.save();
                  g2.translate(c.x, c.y); g2.rotate(rot2);
                  g2.globalAlpha = 0.85;
                  for (let b = -120; b < 120; b += 24) {
                    g2.fillStyle = ((b / 24) & 1) ? '#ff5a66' : '#f5f0ea';
                    g2.fillRect(b, -34, 24, 68);
                  }
                  g2.restore();
                }
              });
            }
          });
        }
      }
    }
  }
  // ---------------------------------------------- Nordschleife props

  function genPropsNring() {

  // ---------------------------------------------- minimap builder
  const MMW = 148;
  function buildMinimap() {
    const m = document.createElement('canvas');
    const sc = MMW / TRACK.worldW;
    m.width = MMW; m.height = Math.max(24, Math.round(TRACK.worldH * sc));
    const g = m.getContext('2d');
    const P = TRACK.pts, N = TRACK.N;
    const thick = TRACK.dyn ? 3.4 : 7;   // 20 km of line needs a finer pen
    for (const pass of [0, 1]) {
      g.beginPath();
      for (let i = 0; i <= N; i++) {
        const p = P[i % N];
        i ? g.lineTo(p.x * sc, p.y * sc) : g.moveTo(p.x * sc, p.y * sc);
      }
      g.strokeStyle = pass ? 'rgba(214,196,255,0.85)' : 'rgba(8,4,16,0.9)';
      g.lineWidth = pass ? 1.2 : thick;
      g.lineJoin = 'round'; g.lineCap = 'round'; g.stroke();
    }
    const sp2 = P[TRACK.startIdx];
    g.strokeStyle = '#ffd166'; g.lineWidth = 2;
    g.beginPath();
    g.moveTo((sp2.x - sp2.nx * 70) * sc, (sp2.y - sp2.ny * 70) * sc);
    g.lineTo((sp2.x + sp2.nx * 70) * sc, (sp2.y + sp2.ny * 70) * sc);
    g.stroke();

  }

  // ---------------------------------------------- dynamic track render
  // (Nordschleife) — the world is 62,000 px wide, so ground, armco and
  // forest draw per-frame from the spatial grid, viewport-culled.
  function viewHalfExtents(pad = 0) {
    const rotated = Math.abs(cam.rot || 0) > 0.001;
    const half = rotated ? Math.hypot(W, H) / cam.z / 2 : 0;
    return {
      x: (rotated ? half : W / cam.z / 2) + pad,
      y: (rotated ? half : H / cam.z / 2) + pad
    };
  }
  function nringVisibleRuns(pad) {
    const view = viewHalfExtents(pad);
    const vw = view.x, vh = view.y;
    const cs = TRACK.gridCell;
    const x0 = Math.floor((cam.x - vw) / cs), x1 = Math.floor((cam.x + vw) / cs);
    const y0 = Math.floor((cam.y - vh) / cs), y1 = Math.floor((cam.y + vh) / cs);
    const set = new Set();
    for (let gx = x0; gx <= x1; gx++)
      for (let gy = y0; gy <= y1; gy++) {
        const arr = TRACK.grid.get(gx + ',' + gy);
        if (arr) for (const i of arr) set.add(i);
      }
    if (!set.size) return [];
    const idx = [...set].sort((a, b) => a - b);
    // group into consecutive runs (wrap-aware), extended 1 for seams
    const runs = [];
    let run = [idx[0]];
    for (let k = 1; k < idx.length; k++) {
      if (idx[k] === idx[k - 1] + 1) run.push(idx[k]);
      else { runs.push(run); run = [idx[k]]; }
    }
    runs.push(run);
    if (runs.length > 1) {
      const first = runs[0], lastR = runs[runs.length - 1];
      if (first[0] === 0 && lastR[lastR.length - 1] === TRACK.N - 1) {
        runs[0] = lastR.concat(first); runs.pop();
      }
    }
    for (const r of runs) {
      r.unshift((r[0] - 1 + TRACK.N) % TRACK.N);
      r.push((r[r.length - 1] + 1) % TRACK.N);
    }
    return runs;
  }
  function drawNringGround() {
    const P = TRACK.pts, N = TRACK.N;
    const view = viewHalfExtents(90);
    const vw = view.x, vh = view.y;
    // Eifel meadow under everything
    ctx.fillStyle = '#2f4a33';
    ctx.fillRect(cam.x - vw, cam.y - vh, vw * 2, vh * 2);
    // deterministic mottling so the grass isn't a flat slab
    const cs2 = 640;
    const mx0 = Math.floor((cam.x - vw) / cs2), mx1 = Math.floor((cam.x + vw) / cs2);
    const my0 = Math.floor((cam.y - vh) / cs2), my1 = Math.floor((cam.y + vh) / cs2);
    for (let gx = mx0; gx <= mx1; gx++)
      for (let gy = my0; gy <= my1; gy++) {
        const hh = h01(gx * 733 + gy * 97);
        if (hh < 0.5) continue;
        ctx.fillStyle = hh > 0.78 ? 'rgba(26,52,32,0.55)' : 'rgba(64,94,56,0.35)';
        ctx.beginPath();
        ctx.ellipse(gx * cs2 + cs2 * h01(gx + gy * 3), gy * cs2 + cs2 * h01(gx * 7 - gy),
          cs2 * (0.3 + hh * 0.5), cs2 * (0.24 + hh * 0.3), hh * 3, 0, TAU);
        ctx.fill();
      }
    const runs = nringVisibleRuns(420);
    for (const run of runs) {
      // asphalt ribbon + soft elevation shadow
      ctx.save(); ctx.translate(8, 11);
      ctx.beginPath();
      for (let k = 0; k < run.length; k++) {
        const p = P[run[k]];
        k ? ctx.lineTo(p.lx, p.ly) : ctx.moveTo(p.lx, p.ly);
      }
      for (let k = run.length - 1; k >= 0; k--) ctx.lineTo(P[run[k]].rx, P[run[k]].ry);
      ctx.closePath();
      ctx.fillStyle = 'rgba(8,6,16,0.30)'; ctx.fill();
      ctx.restore();
      ctx.beginPath();
      for (let k = 0; k < run.length; k++) {
        const p = P[run[k]];
        k ? ctx.lineTo(p.lx, p.ly) : ctx.moveTo(p.lx, p.ly);
      }
      for (let k = run.length - 1; k >= 0; k--) ctx.lineTo(P[run[k]].rx, P[run[k]].ry);
      ctx.closePath();
      ctx.fillStyle = '#454754'; ctx.fill();
      // concrete banking ONLY at the two real bowls: the Caracciola-
      // Karussell (idx ~1776) and Schwalbenschwanz mini-Karussell
      // (~2349) — other tight hairpins (Wehrseifen) are plain asphalt
      for (let k = 1; k < run.length - 1; k++) {
        const i = run[k], p = P[i];
        if (Math.abs(p.curv) < 1.2) continue;
        const rel = (i - TRACK.startIdx + N) % N;
        if (Math.abs(rel - 1776) > 26 && Math.abs(rel - 2349) > 26) continue;
        const s = Math.sign(p.curv);
        const q = P[run[k + 1]];
        ctx.beginPath();
        ctx.moveTo(p.x + p.nx * s * p.w * 0.5, p.y + p.ny * s * p.w * 0.5);
        ctx.lineTo(p.x + p.nx * s * p.w * 0.06, p.y + p.ny * s * p.w * 0.06);
        ctx.lineTo(q.x + q.nx * s * q.w * 0.06, q.y + q.ny * s * q.w * 0.06);
        ctx.lineTo(q.x + q.nx * s * q.w * 0.5, q.y + q.ny * s * q.w * 0.5);
        ctx.closePath();
        ctx.fillStyle = '#8d8a84'; ctx.fill();
        ctx.strokeStyle = 'rgba(40,38,40,0.5)'; ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(p.x + p.nx * s * p.w * 0.48, p.y + p.ny * s * p.w * 0.48);
        ctx.lineTo(p.x + p.nx * s * p.w * 0.08, p.y + p.ny * s * p.w * 0.08);
        ctx.stroke();
      }
      // white edge lines
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
      for (const side of [1, -1]) {
        ctx.beginPath();
        for (let k = 0; k < run.length; k++) {
          const p = P[run[k]], hw = p.w / 2 - 7;
          const x = p.x + p.nx * side * hw, y = p.y + p.ny * side * hw;
          k ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        ctx.stroke();
      }
      // centre dash
      ctx.strokeStyle = 'rgba(255,255,255,0.13)'; ctx.lineWidth = 3;
      ctx.setLineDash([26, 40]);
      ctx.beginPath();
      for (let k = 0; k < run.length; k++) {
        const p = P[run[k]];
        k ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      // FIA curbs on corners
      for (let k = 1; k < run.length - 1; k += 1) {
        const i = run[k], p = P[i];
        if (Math.abs(p.curv) < 0.30) continue;
        for (const s of [1, -1]) {
          const ex = s > 0 ? p.lx : p.rx, ey = s > 0 ? p.ly : p.ry;
          ctx.save();
          ctx.translate(ex, ey); ctx.rotate(Math.atan2(p.ty, p.tx));
          for (let b = 0; b < 4; b++) {
            ctx.fillStyle = ((i * 4 + b) & 1) ? '#d5382f' : '#f2efe8';
            ctx.fillRect(-40 + b * 20, s > 0 ? -2.5 : -6.5, 20, 9);
          }
          ctx.restore();
        }
      }
      for (let k = 0; k < run.length; k++) {
        const i = run[k];
        // direction chevrons every ~500 m
        if (i % 6 === 0) {
          const p = P[i];
          ctx.strokeStyle = 'rgba(255,214,110,0.5)'; ctx.lineWidth = 4; ctx.lineCap = 'round';
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.ty, p.tx));
          ctx.beginPath();
          ctx.moveTo(-6, -10); ctx.lineTo(7, 0); ctx.lineTo(-6, 10);
          ctx.stroke(); ctx.restore();
        }
        // start/finish checker band
        if (i === TRACK.startIdx) {
          const p = P[i], hw = p.w / 2 - 4;
          ctx.save();
          ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.ty, p.tx));
          for (let a = -hw; a < hw; a += 10)
            for (let r = 0; r < 3; r++) {
              ctx.fillStyle = ((a / 10 + r) & 1) ? '#101018' : '#f2f0ea';
              ctx.fillRect(-15 + r * 10, a, 10, 10);
            }
          ctx.restore();
        }
      }
    }
    // corner boards (flat, blue, real names at the real corners)
    for (const [i0, name] of NRING_SIGNS) {
      const i = nringSignIdx(i0);
      const p = P[i];
      if (Math.abs(p.x - cam.x) > vw + 400 || Math.abs(p.y - cam.y) > vh + 400) continue;
      const s = -(Math.sign(p.curv) || 1);   // outside of the corner
      const d = p.w / 2 + 30;
      const x = p.x + p.nx * s * d, y = p.y + p.ny * s * d;
      ctx.save();
      ctx.translate(x, y); ctx.rotate(Math.atan2(p.ty, p.tx));
      const tw = name.length * 7.6 + 18;
      rr(ctx, -tw / 2, -9, tw, 18, 4);
      ctx.fillStyle = 'rgba(18,54,120,0.92)'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.4; ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = '800 11px system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(name, 0, 0.5);
      ctx.restore();
    }
  }
  function drawSkids() {
    if (!skids.length) return;
    ctx.save();
    ctx.lineWidth = 5.2; ctx.lineCap = 'round';
    for (const s of skids) {
      const age = G.playT - s.t;
      ctx.strokeStyle = 'rgba(18,17,24,' + (0.5 * clamp(1 - age / 45, 0, 1)).toFixed(3) + ')';
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
      ctx.stroke();

  // armco + Eifel forest as depth-sorted scenery, generated on the fly
  function pushNringScenery(list) {
    const P = TRACK.pts;
    const runs = nringVisibleRuns(460);
    for (const run of runs) {
      // continuous silver armco on BOTH sides — the Nordschleife ribbon
      for (const side of [1, -1]) {
        const segPts = [];
        for (let k = 0; k < run.length; k++) {
          const p = P[run[k]];
          segPts.push({
            x: p.x + p.nx * side * (p.w / 2 + 13),
            y: p.y + p.ny * side * (p.w / 2 + 13)
          });
        }
        let mx = 0, my = 0;
        for (const q of segPts) { mx += q.x; my += q.y; }
        mx /= segPts.length; my /= segPts.length;
        list.push({
          d: (mx - cam.x) ** 2 + (my - cam.y) ** 2 + 1e7,   // behind cars mostly
          draw(g) {
            // ground-level rail line: keeps the armco visible at screen
            // centre where the parallax band collapses to zero width
            g.beginPath();
            for (let k = 0; k < segPts.length; k++)
              k ? g.lineTo(segPts[k].x, segPts[k].y) : g.moveTo(segPts[k].x, segPts[k].y);
            g.strokeStyle = '#8b93a1'; g.lineWidth = 2.6; g.lineJoin = 'round'; g.stroke();
            g.strokeStyle = 'rgba(235,241,250,0.65)'; g.lineWidth = 1.0; g.stroke();
            for (let k = 0; k < segPts.length; k += 2)
              cylPart(g, segPts[k].x, segPts[k].y, 1.5, 0, 8, '#262a31', '#3a3e48');
            g.beginPath();
            for (let k = 0; k < segPts.length; k++) {
              const p2 = liftW(segPts[k].x, segPts[k].y, 6.5);
              k ? g.lineTo(p2.x, p2.y) : g.moveTo(p2.x, p2.y);
            }
            for (let k = segPts.length - 1; k >= 0; k--) {
              const p2 = liftW(segPts[k].x, segPts[k].y, 10.5);
              g.lineTo(p2.x, p2.y);
            }
            g.closePath();
            g.fillStyle = '#b6bfcc'; g.fill();
            g.beginPath();
            for (let k = 0; k < segPts.length; k++) {
              const p2 = liftW(segPts[k].x, segPts[k].y, 10.5);
              k ? g.lineTo(p2.x, p2.y) : g.moveTo(p2.x, p2.y);
            }
            g.strokeStyle = 'rgba(238,244,252,0.85)'; g.lineWidth = 1.1; g.stroke();
          }
        });
      }
      // forest: pre-planted, clearance-checked conifers/broadleaf
      for (let k = 1; k < run.length - 1; k++) {
        const bucket = TRACK.treeByIdx.get(run[k]);
        if (!bucket) continue;
        for (const tr of bucket) {
          const tx = tr.x, ty = tr.y, s = tr.s, conifer = tr.con;
          list.push({
            d: (tx - cam.x) ** 2 + (ty - cam.y) ** 2,
            draw(g) {
              g.fillStyle = 'rgba(12,20,14,0.35)';
              g.beginPath(); g.ellipse(tx + 6, ty + 8, s * 0.95, s * 0.6, 0, 0, TAU); g.fill();
              cylPart(g, tx, ty, s * 0.10, 0, s * 0.7, '#3a2c22', '#4a382b');
              if (conifer) {
                const greens = ['#1d3f27', '#25502f', '#2e6039'];
                for (let li = 0; li < 3; li++) {
                  const c2 = liftW(tx, ty, s * (0.7 + li * 0.55));
                  g.fillStyle = greens[li];
                  g.beginPath(); g.arc(c2.x, c2.y, s * (0.72 - li * 0.18), 0, TAU); g.fill();
                }
              } else {
                const c2 = liftW(tx, ty, s * 1.1);
                g.fillStyle = '#3e6a35';
                g.beginPath(); g.arc(c2.x, c2.y, s * 0.78, 0, TAU); g.fill();
                const c3 = liftW(tx - s * 0.2, ty - s * 0.2, s * 1.5);
                g.fillStyle = '#4b7c3e';
                g.beginPath(); g.arc(c3.x, c3.y, s * 0.5, 0, TAU); g.fill();
              }
            }
          });
        }
      }
    }
  }

  // petals now carry altitude z and truly fall through the 3D air
  function petalBurst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = rnd(TAU), sp = rnd(30, 130);
      petals.push({
        x, y, z: 6, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,

  function spawnPetalAmbient() {

    petals.push({
      x: cam.x + rnd(-0.55, 0.55) * vw, y: cam.y + rnd(-0.55, 0.55) * vh,

  function spawnSmokeAt(x, y, inten) {
    // signature hook: at high combo, tyre smoke becomes sakura petals
    const petalChance = score.mult >= 5 ? 0.72 : score.mult >= 3 ? 0.42 : 0;
    if (Math.random() < petalChance) {
      petals.push({
        x, y, z: 4, vx: rnd(-50, 50), vy: rnd(-50, 50), vz: rnd(30, 80),
        life: rnd(1.2, 2.1), max: 2.1, rot: rnd(TAU), vr: rnd(-5, 5),
        s: rnd(2.4, 4.4), ph: rnd(TAU), amb: false
      });
    } else {
      smoke.push({
        x: x + rnd(-3, 3), y: y + rnd(-3, 3),
        vx: rnd(-24, 24), vy: rnd(-24, 24),
        life: rnd(0.5, 0.95), max: 0.95,

  function spawnDust() {
    dust.push({
      x: car.x + rnd(-8, 8), y: car.y + rnd(-8, 8),
      vx: -car.vx * 0.12 + rnd(-20, 20), vy: -car.vy * 0.12 + rnd(-20, 20),
      life: rnd(0.4, 0.8), max: 0.8, size: rnd(3, 6)
    });
  }
  function updateParticles(dt) {
    for (let i = smoke.length - 1; i >= 0; i--) {
      const p = smoke[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.size += 16 * dt; p.rot += p.vr * dt; p.life -= dt;
      if (p.life <= 0) smoke.splice(i, 1);
    }
    for (let i = petals.length - 1; i >= 0; i--) {
      const p = petals[i];
      p.ph += dt * 3;
      p.x += (p.vx + Math.sin(p.ph) * 24) * dt;
      p.y += p.vy * dt;
      if (!p.amb && p.z > 0) p.vz -= 120 * dt; // burst gravity
      p.z += p.vz * dt;
      if (p.z <= 0) { p.z = 0; p.vz = 0; p.life = Math.min(p.life, 0.8); }
      p.rot += p.vr * dt; p.life -= dt;
      if (p.amb) {
        // drifted out of view or touched down -> recycle just upwind of
        // the frame instead of dying (keeps the sakura fall continuous)
        const vw = W / cam.z * 0.62, vh = H / cam.z * 0.62;
        if (p.z <= 0 || Math.abs(p.x - cam.x) > vw || Math.abs(p.y - cam.y) > vh) {
          p.x = cam.x + vw * 0.96; p.y = cam.y + rnd(-vh, vh);
          p.z = rnd(36, 68); p.vz = -rnd(9, 15); p.life = p.max;
        }
        continue;
      }
      if (p.life <= 0) petals.splice(i, 1);
    }
    for (let i = dust.length - 1; i >= 0; i--) {
      const p = dust[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) dust.splice(i, 1);
    }
    for (let i = pops.length - 1; i >= 0; i--) {
      const p = pops[i];
      p.t += dt; p.y -= 26 * dt;
      if (p.t > 1.5) pops.splice(i, 1);
    }
    callout.t += dt;
    // ambient sakura only where there are sakura trees
    if (TRACK.style === 'sakura') {
      let amb = 0;
      for (const p of petals) if (p.amb) amb++;
      while (amb < 30) { spawnPetalAmbient(); amb++; }
    } else {
      for (let i = petals.length - 1; i >= 0; i--) if (petals[i].amb) petals.splice(i, 1);
    }
  }
