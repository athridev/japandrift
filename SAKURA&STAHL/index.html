      vx: 0, vy: 0, steer: 0, slip: 0, drifting: false, speed: 0,
      prog: TRACK.startIdx, off: false, deep: false,
      prevEb: false, inThr: 0, thrRaw: 0, inEb: false, brakeOn: false, shiftT: 0,
      pwl: null, pwr: null, roll: 0, pitch: 0, smokeAcc: 0, spinLock: false,
      rpm: 0, gearI: 0, gear: 1, gearHold: 0.82, flash: 0, wallT: 0, wallZone: false
    };
    score.total = 0; score.chain = 0; score.mult = 1; score.chainT = 0;
    score.grace = 0; score.best = 0; score.wallCalled = false; score.passes = 0;
    lap.run = 0; lap.cur = 0; lap.best = null; lap.last = null; lap.count = 0;
    lap.cp = 0; lap.prevFrac = 0; lap.rec = []; lap.ghost = null; lap.gi = 0;
    lap.gspec = null; lastGhostPos = null;
    const ts = tsave();
    if (G.mode === 'tt' && Number.isFinite(ts.bestLap)) {
      // the record TIME must survive even if its ghost is corrupt —
      // otherwise the first slower lap would overwrite a real best
      lap.best = ts.bestLap;
      const g = decGhost(ts.ghost);
      if (g) {
        lap.ghost = g;
        lap.gspec = CARS.find(s2 => s2.id === (ts.ghost && ts.ghost.car)) || spec;
      }
    }
    ts.sel = G.sel; SAVE.data.mode = G.mode; SAVE.data.track = G.track; SAVE.write();
    smoke.length = 0; dust.length = 0; pops.length = 0;
    for (let i = petals.length - 1; i >= 0; i--) if (!petals[i].amb) petals.splice(i, 1);
    callout = { en: '', jp: '', t: 99 };
    cornerToast = { name: '', t: 99 };
    if (mctx) mctx.clearRect(0, 0, marks.width, marks.height);
    skids.length = 0;
    spawnTraffic();
    cam.x = p.x; cam.y = p.y; cam.z = 1.1;
    cam.rot = TRACK.dyn ? -Math.PI / 2 - car.h : 0;
    G.wrong = 0; G.wrongDir = false; G.shake = 0;
    SND.init(); SND.setCar(spec);
    G.state = 'count'; G.cd = 3.6; G.cdLast = 4;
  }
  function respawn() {
    if (!car) return;
    const p = TRACK.pts[car.prog];
    car.x = p.x; car.y = p.y; car.h = Math.atan2(p.ty, p.tx);
    car.vx = 0; car.vy = 0; car.pwl = null; car.pwr = null;
    car.slip = 0; car.drifting = false; car.spinLock = false;
    car.wallT = 0; car.smokeAcc = 0; car.inEb = false; car.brakeOn = false;
    car.steer = 0; car.roll = 0; car.pitch = 0; car.speed = 0;
    car.rpm = 0; car.gearI = 0; car.gear = 1; car.gearHold = 0.82; car.shiftT = 0;
    score.chain = 0; score.mult = 1; score.chainT = 0; score.grace = 0;
    score.wallCalled = false;
  }

  // ---------------------------------------------- tourist traffic
  // Touristenfahrten: the Nordschleife's public lapping day. A field of
  // slower drivers — JDM tourists and GT weekend warriors — circulates
  // the full 20.7 km. They brake into corners like real drivers, keep
  // right and flick the indicator on when you close in ('Ring etiquette),
  // and the quick ones swing left to pass the slow ones. Contact is soft
  // but costs your combo — thread the gap cleanly and the pass pays.
  const TRAFFIC_N = 14;
  let traffic = [];
  function trafficOn() { return TRACK.id === 'nring' && G.mode === 'free'; }
  function trafficPlace(t) {
    const P = TRACK.pts, N = TRACK.N;
    const i0 = Math.floor(t.idx) % N, f = t.idx - Math.floor(t.idx);
    const a = P[i0], b = P[(i0 + 1) % N];
    const nx = lerp(a.nx, b.nx, f), ny = lerp(a.ny, b.ny, f);
    t.x = lerp(a.x, b.x, f) + nx * t.lat;
    t.y = lerp(a.y, b.y, f) + ny * t.lat;
    return { a, b, f };
  }
  function spawnTraffic() {
    traffic = [];
    if (!trafficOn()) return;
    const N = TRACK.N;
    for (let i = 0; i < TRAFFIC_N; i++) {
      const t = {
        spec: CARS[(Math.random() * CARS.length) | 0],
        idx: (((i + 0.3 + Math.random() * 0.4) / TRAFFIC_N) * N) % N,
        lat: 0, latT: 0, home: rnd(-24, 44),   // slight keep-right bias
        v: 220, pace: rnd(0.52, 0.86),
        x: 0, y: 0, h: 0, steerV: 0, braking: false,
        blink: 0, hitT: 0, whooshT: 0, wasAhead: null
      };
      t.lat = t.latT = t.home;
      const s = trafficPlace(t);
      t.h = Math.atan2(lerp(s.a.ty, s.b.ty, s.f), lerp(s.a.tx, s.b.tx, s.f));
      traffic.push(t);
    }
  }
  function updateTraffic(dt) {
    if (!traffic.length || !car) return;
    const P = TRACK.pts, N = TRACK.N;
    for (const t of traffic) {
      t.blink = Math.max(0, t.blink - dt);
      t.hitT = Math.max(0, t.hitT - dt);
      t.whooshT = Math.max(0, t.whooshT - dt);
      const i0 = Math.floor(t.idx) % N;
      // corner speed: read the curvature ahead and brake into it
      let curv = 0;
      const look = 4 + Math.min(14, (t.v / 60) | 0);
      for (let k = 1; k <= look; k++) curv = Math.max(curv, Math.abs(P[(i0 + k) % N].curv));
      let tv = t.pace * lerp(690, 195, clamp(curv / 0.8, 0, 1));
      // 'Ring etiquette: keep right + indicator when the player closes in
      let latT = t.home;
      const rel = (i0 - car.prog + N) % N;      // samples this car is ahead
      if (rel < N / 2 && rel < 36 && car.speed > t.v + 40) {
        latT = P[i0].w / 2 - 42;
        t.blink = 0.5;
      }
      // traffic-on-traffic: follow the car ahead or swing left and pass
      for (const o of traffic) {
        if (o === t) continue;
        const gap = (Math.floor(o.idx) - i0 + N) % N;
        if (gap > 0 && gap < 20) {
          if (t.pace > o.pace + 0.08 && gap < 14) latT = -(P[i0].w / 2 - 46);
          if (gap < 7 && Math.abs(o.lat - t.lat) < 34) tv = Math.min(tv, o.v - 10);
        }
      }
      t.latT = latT;
      t.braking = tv < t.v - 40;
      t.v = Math.max(60, t.v + clamp(tv - t.v, -560 * dt, 230 * dt));
      t.idx += (t.v * dt) / (P[i0].segLen || 80);
      while (t.idx >= N) t.idx -= N;
      while (t.idx < 0) t.idx += N;
      const dLat = (t.latT - t.lat) * clamp(dt * 1.6, 0, 1);
      t.lat += dLat;
      const s = trafficPlace(t);
      const th = Math.atan2(lerp(s.a.ty, s.b.ty, s.f), lerp(s.a.tx, s.b.tx, s.f));
      t.h += angNorm(th - t.h) * clamp(dt * 7, 0, 1);
      t.steerV = clamp(dLat * 0.4, -1, 1);

      // ----- player interaction: whoosh, contact, overtake scoring
      const dx = t.x - car.x, dy = t.y - car.y, d2 = dx * dx + dy * dy;
      if (d2 < 120 * 120) {
        const tvx = Math.cos(t.h) * t.v, tvy = Math.sin(t.h) * t.v;
        const rv = Math.hypot(car.vx - tvx, car.vy - tvy);
        if (d2 > 40 * 40 && d2 < 95 * 95 && rv > 170 && t.whooshT <= 0 && G.state === 'play') {
          SND.whoosh(clamp(rv / 520, 0.3, 1));
          t.whooshT = 2.2;
        }
        const d = Math.sqrt(d2) || 1;
        if (d < 34) {
          const nx2 = dx / d, ny2 = dy / d;
          car.x -= nx2 * (34 - d) * 0.8; car.y -= ny2 * (34 - d) * 0.8;
          const rel2 = (car.vx - tvx) * nx2 + (car.vy - tvy) * ny2;
          if (rel2 > 0) { car.vx -= nx2 * rel2 * 0.85; car.vy -= ny2 * rel2 * 0.85; }
          if (t.hitT <= 0) {
            t.hitT = 1;
            G.shake = Math.max(G.shake, 2.2);
            SND.thud(); rumble(0.7, 150);
            if (score.chain > 1) {
              addPop(car.x, car.y - 30, 'CONTACT! 接触', '#ff6a6a', 18);
              score.chain = 0; score.mult = 1; score.chainT = 0; score.grace = 0;
            }
          }
        }
      }
      // overtake scoring: latch which side of the player each car is on.
      // The latch ALWAYS resyncs on a flip; only a genuine near-player
      // ahead→behind crossover scores. A far flip (the 10 km antipode,
      // or a tourist lapping a parked player) resyncs silently, and a
      // per-tourist cooldown stops the brake-and-repass shuttle farm.
      const aheadNow = rel < N / 2;
      if (t.wasAhead === null) t.wasAhead = aheadNow;
      else if (t.wasAhead !== aheadNow) {
        if (t.wasAhead && !aheadNow && Math.min(rel, N - rel) < 90 &&
            G.state === 'play' && G.playT - (t.lastPassT || -99) > 20) {
          t.lastPassT = G.playT;
          score.passes++;
          score.total += 500;
          addPop(t.x, t.y - 28, 'PASS! +500', '#7dffb0', 16);
          if (score.passes === 3) { setCallout('TRAFFIC SLAYER!', '追い越し職人！'); SND.callout(); }
          else if (score.passes === 10) { setCallout('FLOW MASTER!', '流れの達人！'); SND.callout(); }
          else SND.bank();
        }
        t.wasAhead = aheadNow;
      }
    }
  }

  function switchTrack(id) {
    if (!TRACKS[id] || G.track === id) return;
    G.track = id;
    setTrack(G.track); buildWorld();
    const sp = TRACK.pts[TRACK.startIdx];
    cam.x = sp.x; cam.y = sp.y; cam.rot = 0;  // snap the attract cam
    G.menuI = TRACK.startIdx; G.menuD = 0;
    const sv = tsave().sel;
    G.sel = Number.isInteger(sv) ? clamp(sv, 0, roster().length - 1) : 0;
    SND.beep(520, 0.05, 'square', 0.045);
  }

  function onPress(k) {
    if (k === 'mute') { SND.toggleMute(); return; }
    switch (G.state) {
      case 'title':
        if (k === 'enter') G.state = 'track';
        break;
      case 'track':
        if (k === 'left' || k === 'right' || k === 'up' || k === 'down') {
          const ids = Object.keys(TRACKS);
          const dir = (k === 'left' || k === 'up') ? -1 : 1;
          const i = (ids.indexOf(G.track) + dir + ids.length) % ids.length;
          switchTrack(ids[i]);
        }
        if (k === 'enter') { SAVE.set('track', G.track); G.state = 'garage'; }
        if (k === 'esc' || k === 'back') G.state = 'title';
        break;
      case 'garage': {
        const R = roster();
        if (k === 'left') { G.sel = (G.sel + R.length - 1) % R.length; SND.beep(520, 0.05, 'square', 0.045); }
        if (k === 'right') { G.sel = (G.sel + 1) % R.length; SND.beep(520, 0.05, 'square', 0.045); }
        if (k === 'enter') G.state = 'mode';
        if (k === 'esc' || k === 'back') G.state = 'track';
        break;
      }
      case 'mode':
        if (k === 'left' || k === 'right' || k === 'up' || k === 'down')
          G.mode = G.mode === 'free' ? 'tt' : 'free';
        if (k === 'enter') newRace();
        if (k === 'esc' || k === 'back') G.state = 'garage';
        break;
      case 'count':
        if (k === 'esc') G.state = 'mode';
        break;
      case 'play':
        if (k === 'esc') G.state = 'pause';
        if (k === 'reset') respawn();
        break;
      case 'pause':
        if (k === 'esc' || k === 'enter') G.state = 'play';
        if (k === 'reset') { respawn(); G.state = 'play'; }
        if (k === 'back') { G.state = 'title'; car = null; }
        break;
    }
  }

  // ---------------------------------------------- car physics
  function stepCar(dt) {
    const c = car, P = c.spec.phys;
    const ts = touchState();
    const gp = padState();
    const st = clamp(((keys.left || ts.left) ? -1 : 0) + ((keys.right || ts.right) ? 1 : 0) + gp.st, -1, 1);
    const thr = Math.max((keys.up || ts.up) ? 1 : 0, gp.thr);      // analog 0..1
    const brk = Math.max((keys.down || ts.down) ? 1 : 0, gp.brk);  // analog 0..1
    const eb = !!(keys.eb || ts.eb || gp.eb);
    c.inThr = lerp(c.inThr, thr, clamp(dt * 6, 0, 1));
    c.thrRaw = thr;                                       // un-lerped, for BOV lift
    c.inEb = eb; c.brakeOn = brk > 0.15 && c.speed > 40;

    const rate = st !== 0 ? 7.5 : 11;
    c.steer = clamp(c.steer + clamp(st - c.steer, -rate * dt, rate * dt), -1, 1);

    const cos = Math.cos(c.h), sin = Math.sin(c.h);
    let vf = c.vx * cos + c.vy * sin;      // forward speed
    let vr = -c.vx * sin + c.vy * cos;     // lateral (slide) speed
    const speed = Math.hypot(c.vx, c.vy);
    updateGearbox(c, dt, speed, thr, brk, up => { if (G.state === 'play') SND.shift(up); });

    // longitudinal (thr / brk are analog). Past ~65° of slip the driven
    // wheels point sideways: engine thrust can no longer straighten the
    // velocity vector — without this fade, holding gas pins slip at ~1.45
    // and the spin-out threshold (2.35) is unreachable.
    const a1 = Math.abs(c.slip);
    const satStart = eb ? 0.75 : 1.2;   // locked rears saturate much earlier
    const satRamp = eb ? 0.4 : 0.5;
    const sideways = clamp((a1 - satStart) / satRamp, 0, 1) * clamp((2.9 - a1) / 0.25, 0, 1);
    const shiftCut = (c.shiftT || 0) > 0.08 ? 0.1 : 1;   // clutch out mid-shift
    const thrEff = thr * (1 - 0.9 * sideways) * shiftCut; // recovers near full reverse
    if (thr && vf < P.maxSpeed) vf += P.accel * gearboxPull(c) * thrEff * dt;
    if (brk) { if (vf > 25) vf -= P.brake * brk * dt; else vf -= P.accel * 0.45 * brk * dt; }
    vf -= vf * P.drag * dt;
    vf = clamp(vf, -P.maxSpeed * 0.3, P.maxSpeed);

    // velocity as (speed, slip-angle). Grip ROTATES the velocity vector
    // toward the nose instead of deleting lateral energy — that's what
    // lets a drift sustain. Scrub is a slip-proportional speed loss.
    let sp = Math.hypot(vf, vr);
    let sa = Math.atan2(vr, vf);
    const slip = sa;
    const wasDrift = c.drifting;
    c.drifting = Math.abs(slip) > 0.19 && Math.abs(slip) < 2.6 && sp > 100;
    if (c.drifting && !wasDrift) SND.chirp();

    let grip = P.grip;
    if (eb) grip *= P.ebrakeGrip;
    else if (c.drifting) grip *= P.driftGrip;
    const tgt = vf >= 0 ? 0 : Math.PI * (sa >= 0 ? 1 : -1);
    // tyre saturation: past ~70° off the travel direction the tyres are
    // fully sliding and can't pull the car straight any more — this is
    // what lets an overcooked e-brake flick actually swap ends (SPIN!).
    // Deviation is measured from tgt, so reverse driving is unaffected.
    const sat = clamp((Math.abs(sa - tgt) - satStart) / satRamp, 0, 1);
    grip *= 1 - 0.92 * sat;
    sa = tgt + (sa - tgt) * Math.exp(-grip * dt);
    if (eb) sp -= sp * 0.55 * dt;
    if (c.drifting) sp -= sp * P.driftFriction * Math.abs(Math.sin(sa)) * dt;
    vf = Math.cos(sa) * sp;
    vr = Math.sin(sa) * sp;

    // steering + slide yaw (countersteer emerges naturally)
    const sf = clamp(speed / 230, 0, 1) * (1 - clamp(speed / (P.maxSpeed * 1.5), 0, 0.32));
    let yaw = c.steer * P.turn * sf;
    if (c.drifting) yaw += c.steer * P.driftTurn * clamp(Math.abs(slip) / 0.9, 0, 1);
    yaw += clamp(vr * 0.0035, -1, 1) * P.slideYaw;
    // reversed steering geometry only while genuinely BACKING UP —
    // flipping mid-spin (vf dips negative past 90° of slip) created a
    // dynamic barrier at ~1.6 rad that made spin-outs unreachable
    if (vf < -5 && Math.abs(sa) > 2.6) yaw = -yaw;
    c.h += yaw * dt;
    // handbrake flick to initiate the drift
    if (eb && !c.prevEb && speed > 150 && Math.abs(c.steer) > 0.25)
      c.h += Math.sign(c.steer) * P.kick;
    c.prevEb = eb;

    // recompose velocity in the PRE-rotation frame: heading turning ahead
    // of the velocity vector is exactly what creates slip next frame.
    c.vx = cos * vf - sin * vr;
    c.vy = sin * vf + cos * vr;
    const c2 = Math.cos(c.h), s2 = Math.sin(c.h);

    // weight transfer for the stacked-sprite lean
    c.pitch = lerp(c.pitch, brk + (eb ? 0.4 : 0) - c.inThr * 0.55, clamp(dt * 6, 0, 1));
    c.flash = Math.max(0, c.flash - dt);

    // progress + surface (soft-fail off-track)
    const ns = nearestSample(c.x, c.y, c.prog, 60);
    c.prog = ns.i;
    const hw = TRACK.pts[ns.i].w / 2;
    const shoulder = TRACK.dyn ? 180 : 150;
    let off = ns.d > hw + shoulder, deep = ns.d > hw + shoulder + 140;
    if (off && anyOnTrack(c.x, c.y)) { off = false; deep = false; } // fig-8 branch
    c.off = off; c.deep = deep;
    c.wallZone = !off && c.drifting && speed > 150 && (hw - ns.d) < 36 && (hw - ns.d) > 0;
    if (off) {
      if (speed > 70 && Math.random() < dt * 26) spawnDust();
      G.shake = Math.max(G.shake, deep ? 2.6 : 1.4);
    }
    c.x += c.vx * dt; c.y += c.vy * dt;
    c.x = clamp(c.x, 24, TRACK.worldW - 24);
    c.y = clamp(c.y, 24, TRACK.worldH - 24);
    c.speed = Math.hypot(c.vx, c.vy);
    c.slip = slip;
    c.roll = lerp(c.roll, clamp(vr / 220, -1, 1), clamp(dt * 8, 0, 1));

    // skid marks + smoke at the rear wheels (true per-car footprint)
    const CH = CHASSIS[c.spec.id] || { wb: [13.2, -13.8], tr: 8.6 };
    const bx = c.x + c2 * CH.wb[1], by = c.y + s2 * CH.wb[1];
    const wl = { x: bx + s2 * CH.tr, y: by - c2 * CH.tr };
    const wr = { x: bx - s2 * CH.tr, y: by + c2 * CH.tr };
    const skidding = (c.drifting || (eb && speed > 110)) && !off;
    if (skidding && c.pwl) {
      if (TRACK.dyn) {
        skids.push({ x1: c.pwl.x, y1: c.pwl.y, x2: wl.x, y2: wl.y, t: G.playT });
        skids.push({ x1: c.pwr.x, y1: c.pwr.y, x2: wr.x, y2: wr.y, t: G.playT });
        if (skids.length > 2600) skids.splice(0, skids.length - 2600);
      } else {
        mctx.strokeStyle = 'rgba(22,20,30,0.5)';
        mctx.lineWidth = 5.2; mctx.lineCap = 'round';
        mctx.beginPath();
        mctx.moveTo(c.pwl.x, c.pwl.y); mctx.lineTo(wl.x, wl.y);
        mctx.moveTo(c.pwr.x, c.pwr.y); mctx.lineTo(wr.x, wr.y);
        mctx.stroke();
      }
    }
    c.pwl = wl; c.pwr = wr;
    if (c.drifting && !off) {
      const inten = clamp(Math.abs(slip) / 0.8, 0, 1) * clamp(speed / 300, 0, 1.2);
      c.smokeAcc += inten * dt * 46;
      let side = 0;
      while (c.smokeAcc > 1) {
        c.smokeAcc--;
        const w = (side++ & 1) ? wl : wr;
        spawnSmokeAt(w.x, w.y, inten);
      }
    }

    // spin-out drops the combo (more forgiving in v2)
    if (Math.abs(slip) > 2.35 && speed > 80 && !c.spinLock) {
      c.spinLock = true;
      if (score.chain > 1) addPop(c.x, c.y - 30, 'SPIN! スピン', '#ff6a6a', 20);
      score.chain = 0; score.mult = 1; score.chainT = 0; score.grace = 0;
      score.wallCalled = false;
      SND.beep(160, 0.25, 'sawtooth', 0.06);
      rumble(0.75, 180);
    }
    if (Math.abs(slip) < 0.5) c.spinLock = false;
  }

  // ---------------------------------------------- per-frame play update
  function updatePlay(dt) {
    G.playT += dt;   // play-time clock: skid marks must not age in pause
    // fixed-ish 120 Hz substeps: integration error stays constant from
    // 30 to 144 Hz displays, and identical wall-time inputs give
    // identical trajectories (fair time-attack across devices).
    const steps = Math.max(1, Math.ceil(dt * 120 - 1e-6));  // eps: float dt
    const hh = dt / steps;
    for (let i = 0; i < steps; i++) stepCar(hh);
    updateTraffic(dt);

    // corner-name toast: crossing a marshal board flashes the real name
    if (TRACK.id === 'nring') {
      for (const [i0, name] of NRING_SIGNS) {
        const rel = (car.prog - nringSignIdx(i0) + TRACK.N) % TRACK.N;
        if (rel < 3 && cornerToast.name !== name) { cornerToast = { name, t: 0 }; break; }
      }
      cornerToast.t += dt;
    }

    // drift scoring: angle x speed x duration, chained combos
    // (spinLock gates accrual — a spin must not instantly re-chain)
    if (car.drifting && !car.spinLock && !car.off && car.speed > 105) {
      score.grace = 1.3;
      score.chainT += dt;
      const m = 1 + Math.min(8, Math.floor(score.chainT / 2.0));
      if (m > score.mult) {
        score.mult = m;
        if (m === 3) { setCallout('NICE DRIFT!', 'いいぞ！'); SND.callout(); }
        if (m === 5) { setCallout('ONI DRIFT!', '鬼ドリ！'); SND.callout(); }
        if (m === 7) { setCallout('KANSEI DORIFTO!!', '慣性ドリフト!!'); SND.callout(); }
      }
      const angleF = clamp(Math.abs(car.slip) / 1.05, 0, 1);
      const speedF = clamp(car.speed / 500, 0, 1.2);
      score.chain += 360 * angleF * speedF * dt;
      // wall-run bonus: drifting tight to the edge
      if (car.wallZone) {
        score.chain += 260 * dt;
        car.wallT += dt;
        if (!score.wallCalled && car.wallT > 0.4) {
          score.wallCalled = true;
          setCallout('WALL RUN!', '壁ドリ！'); SND.callout();
        }
      } else car.wallT = 0;
    } else if (score.grace > 0) {
      score.grace -= dt;
      if (score.grace <= 0 && score.chain > 1) {
        const banked = Math.round(score.chain * score.mult);
        score.total += banked;
        score.best = Math.max(score.best, banked);
        if (banked > (tsave().bestChain || 0)) { tsave().bestChain = banked; SAVE.write(); }
        rumble(0.3, 90);
        addPop(car.x, car.y - 34, '+' + banked.toLocaleString(), '#ffd166', 18);

    lap.run += dt; lap.cur += dt;
    const frac = ((car.prog - TRACK.startIdx + TRACK.N) % TRACK.N) / TRACK.N;
    const cps = [0.25, 0.5, 0.75];
    for (let i = 0; i < 3; i++)

    // crossing frames were frame-rate- and track-length-dependent;

    const step = df + (wrapped ? 1 : 0) - (backWrap ? 1 : 0);

  function wingDraw(g, spec, L) {
    const id = spec.id;
    if (id === 'ae86') {   // ducktail lip only
      const off = L(11);
      g.save(); g.translate(off.x, off.y);
      rr(g, -21.6, -8.6, 2.0, 17.2, 1);
      g.fillStyle = spec.accent; g.fill();
      g.restore();
      return;
    }
    if (spec.cat === 'gt') {   // huge GT3 plank on swan-neck mounts
      const px = PANEL_CUTS[id].deck - 2.2, span = 10.6, wingH = 19;
      for (const sy of [-1, 1]) {
        const off = L(15);
        g.save(); g.translate(off.x, off.y);
        g.fillStyle = '#14161c';
        g.fillRect(px + 0.4, sy * 4.6 - 1.0, 2.6, 2.0);
        g.restore();
      }
      const off = L(wingH);
      g.save(); g.translate(off.x, off.y);
      rr(g, px - 2.6, -span, 5.2, span * 2, 1.2);
      g.fillStyle = '#101218'; g.fill();
      g.strokeStyle = 'rgba(255,255,255,0.18)'; g.lineWidth = 0.7; g.stroke();
      // accent stripe on the flap + tall endplates
      g.fillStyle = spec.accent;
      g.fillRect(px - 2.6, -span + 1, 1.2, span * 2 - 2);
      g.fillStyle = '#181b22';
      g.fillRect(px - 3.4, -span - 1.4, 6.8, 1.6);
      g.fillRect(px - 3.4, span - 0.2, 6.8, 1.6);
      g.restore();
      return;
    }
    const px = id === 'r34' ? -17.5 : -17.0;
    const wingH = id === 'r34' ? 17.5 : (id === 'a80' ? 18.5 : 15.5);
    const span = id === 'r34' ? 9.4 : (id === 'a80' ? 9.8 : 8.6);
    for (const sy of [-1, 1]) {
      const off = L(12);
      g.save(); g.translate(off.x, off.y);
      g.fillStyle = '#1a1c24';
      g.fillRect(px - 0.9, sy * (span - 2.4) - 0.9, 1.8, 1.8);
      g.restore();
    }
    const off = L(wingH);
    g.save(); g.translate(off.x, off.y);
    rr(g, px - 2.2, -span, 4.4, span * 2, 1.6);
    g.fillStyle = spec.accent; g.fill();
    g.strokeStyle = 'rgba(255,255,255,0.15)'; g.lineWidth = 0.6; g.stroke();
    g.fillStyle = '#22242c';
    g.fillRect(px - 2.8, -span - 0.8, 5.6, 1.2);
    g.fillRect(px - 2.8, span - 0.4, 5.6, 1.2);
    g.restore();

  // main stacked renderer. o.lift(h) supplies the LOCAL-frame parallax
  // offset per height unit; roll/pitch add body lean on top.
  function drawCarStacked(g, spec, o = {}) {
    const steer = o.steer || 0, roll = o.roll || 0, pitch = o.pitch || 0;
    const lift = o.lift || (() => ({ x: 0, y: 0 }));
    const L = h => {
      const p = lift(h);
      return { x: p.x + pitch * h * 0.14, y: p.y + roll * h * 0.34 };
    };
    const brakeCol = o.brake ? '#ff5560' : '#c92634';
    const brakeGlow = o.brake ? 16 : 7;
    g.save();
    if (o.alpha != null) g.globalAlpha = o.alpha;

    // ground shadow — offset fixed in WORLD space (dusk-sun direction),
    // rotated into the car's local frame via its heading
    const hdg = o.hdg || 0;
    const shx = Math.cos(-hdg) * 1.6 - Math.sin(-hdg) * 2.1;
    const shy = Math.sin(-hdg) * 1.6 + Math.cos(-hdg) * 2.1;
    const dims = DIM[spec.id] || [BASE_L, BASE_W];
    g.fillStyle = 'rgba(10,6,18,0.38)';
    g.beginPath(); g.ellipse(shx, shy, dims[0] * 0.52, dims[1] * 0.57, 0, 0, TAU); g.fill();

    // wheels (front pair steers): tire carcass + alloy rim + hub slot,
    // per-car wheelbase/track/rim colour from CHASSIS for real stance
    {
      const CH = CHASSIS[spec.id] || CHASSIS.s15;
      const off = L(1.5);
      g.save(); g.translate(off.x, off.y);
      const wp = [[CH.wb[0], -CH.tr], [CH.wb[0], CH.tr], [CH.wb[1], -CH.tr], [CH.wb[1], CH.tr]];
      for (let i = 0; i < 4; i++) {
        g.save();
        g.translate(wp[i][0], wp[i][1]);
        if (i < 2) g.rotate(steer * 0.42);
        rr(g, -CH.wr, -CH.ww, CH.wr * 2, CH.ww * 2, 1.1);
        g.fillStyle = '#0e0e13'; g.fill();
        // sidewall sheen on the outboard shoulder
        g.fillStyle = 'rgba(255,255,255,0.07)';
        g.fillRect(-CH.wr + 0.5, wp[i][1] < 0 ? -CH.ww : CH.ww - 0.7, CH.wr * 2 - 1, 0.7);
        // alloy face
        rr(g, -CH.wr * 0.52, -CH.ww + 0.55, CH.wr * 1.04, CH.ww * 2 - 1.1, 0.8);
        g.fillStyle = CH.rim; g.fill();
        // hub / spoke shadow
        g.fillStyle = 'rgba(20,20,28,0.85)';
        g.fillRect(-0.7, -CH.ww + 0.8, 1.4, CH.ww * 2 - 1.6);
        g.restore();
      }
      g.restore();
    }

    // 1:1 proportions: the shell is authored on a 45×21 canvas and
    // scaled to the real car's footprint. Parallax lift offsets are
    // divided back out so the 3D lean stays in true world pixels.
    const { kx, ky } = carScale(spec.id);
    g.save();
    g.scale(kx, ky);
    const Ls = h => { const p = L(h); return { x: p.x / kx, y: p.y / ky }; };

    // stacked body slabs — the 3D shell
    for (let k = 0; k < 5; k++) {
      const h = 2.2 + k * 1.9;
      const off = Ls(h);
      g.save(); g.translate(off.x, off.y);
      bodyPath(g, spec.id);
      g.fillStyle = k === 4 ? spec.body : mixCol(spec.body2, spec.body, k / 4);
      g.fill();
      if (k === 4) { g.strokeStyle = 'rgba(8,8,14,0.5)'; g.lineWidth = 0.9; g.stroke(); }
      g.restore();
    }

    // deck details + lights on the top slab
    {
      const off = Ls(9.8);
      g.save(); g.translate(off.x, off.y);
      deckDetails(g, spec, brakeCol, brakeGlow);
      g.restore();
    }

    // greenhouse slabs + roof cap
    const HS = HOUSE[spec.id];
    for (let k = 0; k < 3; k++) {
      const h = 10 + k * 1.6;
      const off = Ls(h);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.x0, -HS.hw, HS.x1 - HS.x0, HS.hw * 2, HS.r);
      g.fillStyle = k === 2 ? '#1a2130' : '#10151f';
      g.fill();
      if (k === 2) {
        g.save(); g.globalAlpha *= 0.4; g.fillStyle = '#9fd0ff';
        g.fillRect(HS.x1 - 2.6, -HS.hw + 1.4, 1.5, HS.hw * 2 - 2.8);
        g.restore();
      }
      g.restore();
    }
    {
      const off = Ls(15);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.rx0, -HS.rhw, HS.rx1 - HS.rx0, HS.rhw * 2, HS.r * 0.8);
      g.fillStyle = spec.body; g.fill();
      g.strokeStyle = 'rgba(0,0,0,0.32)'; g.lineWidth = 0.6; g.stroke();
      // GT3 roof number roundel
      if (spec.num != null) {
        g.beginPath(); g.arc((HS.rx0 + HS.rx1) / 2, 0, 4.4, 0, TAU);
        g.fillStyle = '#f2f0ea'; g.fill();
        g.fillStyle = '#15161c';
        g.font = '900 5.6px system-ui, sans-serif';
        g.textAlign = 'center'; g.textBaseline = 'middle';
        g.fillText(spec.num, (HS.rx0 + HS.rx1) / 2, 0.3);
      }
      g.restore();
    }

    // mirrors
    {
      const off = Ls(11);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.x1 - 1.5, -HS.hw - 1.9, 2.0, 1.3, 0.4); g.fillStyle = '#20222c'; g.fill();
      rr(g, HS.x1 - 1.5, HS.hw + 0.6, 2.0, 1.3, 0.4); g.fill();
      g.restore();
    }

    wingDraw(g, spec, Ls);

    // exhaust tip + lift-off backfire flash
    {
      const off = Ls(3);
      g.save(); g.translate(off.x, off.y);
      g.fillStyle = '#3a3f4a';
      g.beginPath(); g.arc(-22.4, 5.6, 1.1, 0, TAU); g.fill();
      if ((o.flash || 0) > 0) {
        g.save();
        g.globalAlpha = clamp(o.flash * 10, 0, 1);
        g.shadowColor = '#ff9a3d'; g.shadowBlur = 12;
        g.fillStyle = '#ffcf6e';
        g.beginPath(); g.ellipse(-24.6, 5.6, 3.4, 1.7, 0, 0, TAU); g.fill();
        g.restore();
      }
      g.restore();
    }
    g.restore();   // per-car 1:1 scale
    g.restore();
  }

  // interpolated ghost sample at the current lap time — records are
  // 15-60 Hz depending on source, lerping removes the visible stepping.
  function ghostPos() {
    const gh = lap.ghost;
    if (!gh || gh.length < 2) return null;
    while (lap.gi < gh.length - 1 && gh[lap.gi + 1].t < lap.cur) lap.gi++;
    while (lap.gi > 0 && gh[lap.gi].t > lap.cur) lap.gi--;
    const a = gh[Math.min(lap.gi, gh.length - 1)];
    const b = gh[Math.min(lap.gi + 1, gh.length - 1)];
    const span = b.t - a.t;
    const k = span > 1e-6 ? clamp((lap.cur - a.t) / span, 0, 1) : 0;
    return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), h: a.h + angNorm(b.h - a.h) * k };
  }

  // world-space wrapper: converts the camera parallax into the car's
  // local frame so the whole stack leans away from screen centre.
  function drawCarWorld(g, x, y, h, spec, o) {
    const woX = (x - cam.x) * KZ, woY = (y - cam.y) * KZ;
    const ch = Math.cos(h), sh = Math.sin(h);
    o.hdg = h;
    o.lift = hh => ({ x: (woX * ch + woY * sh) * hh, y: (-woX * sh + woY * ch) * hh });
    g.save();
    g.translate(x, y); g.rotate(h);
    drawCarStacked(g, spec, o);
    g.restore();
  }

  // dusk headlight cones painted on the asphalt
  function drawBeams(c) {
    const ch = Math.cos(c.h), sh = Math.sin(c.h);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (const sy of [-1, 1]) {
      const nx = c.x + ch * 20 - sh * sy * 6.5;
      const ny = c.y + sh * 20 + ch * sy * 6.5;
      const fx = nx + ch * 175, fy = ny + sh * 175;
      const grd = ctx.createLinearGradient(nx, ny, fx, fy);
      grd.addColorStop(0, 'rgba(255,235,190,0.16)');
      grd.addColorStop(1, 'rgba(255,235,190,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(nx, ny);
      ctx.lineTo(fx - sh * 27, fy + ch * 27);
      ctx.lineTo(fx + sh * 27, fy - ch * 27);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // ---------------------------------------------- world render pass
  function renderWorld() {
    // base clear: regions past the world edge would otherwise keep last
    // frame's pixels and saturate under the additive sky overlay
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.fillStyle = '#170b22';
    ctx.fillRect(0, 0, W, H);
    const jx = G.shake > 0 ? (Math.random() * 2 - 1) * G.shake * 5 : 0;
    const jy = G.shake > 0 ? (Math.random() * 2 - 1) * G.shake * 5 : 0;
    ctx.setTransform(DPR, 0, 0, DPR, W / 2 * DPR, H / 2 * DPR);
    ctx.scale(cam.z, cam.z);
    ctx.rotate(cam.rot || 0);
    ctx.translate(-cam.x + jx, -cam.y + jy);
    ctx.imageSmoothingEnabled = true;
    if (TRACK.dyn) {
      drawNringGround();
      drawSkids();
    } else {
      ctx.drawImage(bg, 0, 0);
      ctx.drawImage(marks, 0, 0);
    }

    // dust (flat, on the grass)
    for (const p of dust) {
      ctx.globalAlpha = 0.30 * (p.life / p.max);
      ctx.fillStyle = '#b99a6f';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;

    const inRace = car && (G.state === 'count' || G.state === 'play' || G.state === 'pause');

    // headlight pools on the asphalt, under everything tall
    if (inRace) drawBeams(car);

    // depth-sorted draw list: props + ghost + player, painter far→near
    const view = viewHalfExtents(260);
    const vw = view.x, vh = view.y;
    const list = [];
    for (const pr of props) {
      if (Math.abs(pr.cx - cam.x) > vw + pr.cr || Math.abs(pr.cy - cam.y) > vh + pr.cr) continue;
      const d = pr.bias != null ? pr.bias : ((pr.cx - cam.x) ** 2 + (pr.cy - cam.y) ** 2);
      list.push({ d, draw: pr.draw });
    }
    if (TRACK.dyn) pushNringScenery(list);
    lastGhostPos = null;
    if (car && (G.state === 'play' || G.state === 'pause') && G.mode === 'tt') {
      const gp2 = ghostPos();
      if (gp2) {
        lastGhostPos = gp2;
        const gs = lap.gspec || car.spec;   // ghost keeps the car it was set in
        list.push({
          d: (gp2.x - cam.x) ** 2 + (gp2.y - cam.y) ** 2,
          draw: g => drawCarWorld(g, gp2.x, gp2.y, gp2.h, gs, { alpha: 0.34, glow: false })
        });
      }
    }
    if (inRace && traffic.length) {
      for (const t of traffic) {
        if (Math.abs(t.x - cam.x) > vw + 60 || Math.abs(t.y - cam.y) > vh + 60) continue;
        const tt = t;
        list.push({
          d: (tt.x - cam.x) ** 2 + (tt.y - cam.y) ** 2,
          draw: g => {
            drawCarWorld(g, tt.x, tt.y, tt.h, tt.spec, { steer: tt.steerV, brake: tt.braking });
            if (tt.blink > 0 && ((G.t * 5) | 0) % 2 === 0) {
              // right-side indicators: "seen you — passing side is left"
              const ch = Math.cos(tt.h), sh = Math.sin(tt.h);
              g.save();
              g.shadowColor = '#ffb14d'; g.shadowBlur = 9; g.fillStyle = '#ffcf6e';
              for (const lx of [19, -19]) {
                g.beginPath();
                g.arc(tt.x + ch * lx - sh * 9.5, tt.y + sh * lx + ch * 9.5, 2.3, 0, TAU);
                g.fill();
              }
              g.restore();
            }
          }
        });
      }
    }
    if (inRace) {
      list.push({
        d: (car.x - cam.x) ** 2 + (car.y - cam.y) ** 2,
        draw: g => drawCarWorld(g, car.x, car.y, car.h, car.spec, {
          steer: car.steer, roll: car.roll, pitch: car.pitch,
          brake: car.brakeOn || car.inEb, glow: true, flash: car.flash
        })
      });
    }
    list.sort((a, b) => b.d - a.d);
    for (const it of list) it.draw(ctx);

    // tyre smoke rises above the cars
    for (const p of smoke) {
      const a = p.life / p.max;
      const l = liftW(p.x, p.y, (1 - a) * 26);
      ctx.globalAlpha = 0.24 * a;
      ctx.fillStyle = '#e8e3ef';
      ctx.beginPath(); ctx.arc(l.x, l.y, p.size * (1.6 - a * 0.6), 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // sakura petals falling through the air
    for (const p of petals) {
      const a = clamp(p.life / p.max, 0, 1);
      const l = liftW(p.x, p.y, p.z);
      ctx.save();
      ctx.globalAlpha = (p.amb ? 0.75 : 0.9) * Math.min(1, a * 3);
      ctx.translate(l.x, l.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.amb ? '#ffb7d5' : '#ff9ecb';
      ctx.beginPath(); ctx.ellipse(0, 0, p.s, p.s * 0.55, 0, 0, TAU); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // score popups (world space)
    for (const p of pops) {
      const a = clamp(1.5 - p.t, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      txt(ctx, p.txt, p.x, p.y, p.size, p.color, 'center', 800, 10);
      ctx.restore();
    }
  }

  // anime speed lines during hard drifts
  function drawSpeedLines() {
    if (!car) return;
    const it = clamp((Math.abs(car.slip) - 0.38) / 0.5, 0, 1) * clamp((car.speed - 220) / 260, 0, 1);
    if (it <= 0.02) return;
    ctx.save();
    ctx.strokeStyle = '#fff';
    const cx = W / 2, cy = H / 2, R = Math.hypot(W, H) / 2;
    const n = Math.round(6 + it * 12);
    for (let i = 0; i < n; i++) {
      const a = rnd(TAU);
      const r1 = R * rnd(0.6, 1.0);
      const r2 = r1 - rnd(50, 170) * it;
      ctx.globalAlpha = rnd(0.04, 0.13) * it;
      ctx.lineWidth = rnd(1, 2.6);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
      ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawMinimap() {
    if (!car || H < 420) return;
    const w = W < 560 ? 110 : MMW;
    const h2 = mm.height * (w / mm.width);
    const x = W - w - 16, y = 118;
    ctx.save();
    ctx.globalAlpha = 0.92;
    rr(ctx, x - 8, y - 8, w + 16, h2 + 16, 10);
    ctx.fillStyle = 'rgba(18,10,32,0.55)';
    ctx.fill();
    ctx.drawImage(mm, x, y, w, h2);
    const k = w / TRACK.worldW;
    if (traffic.length) {
      ctx.fillStyle = '#ffb14d';
      for (const t of traffic) {
        ctx.beginPath(); ctx.arc(x + t.x * k, y + t.y * k, 1.5, 0, TAU); ctx.fill();
      }
    }
    if (lastGhostPos) {
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.arc(x + lastGhostPos.x * k, y + lastGhostPos.y * k, 2.2, 0, TAU); ctx.fill();
    }
    ctx.shadowColor = car.spec.glow; ctx.shadowBlur = 6;
    ctx.fillStyle = car.spec.glow;
    ctx.beginPath(); ctx.arc(x + car.x * k, y + car.y * k, 3.2, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + car.x * k, y + car.y * k, 1.4, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // attract-mode camera: slow glide around the circuit behind the menus
  function menuDrift(dt) {
    // constant px/s glide: advance by arc length, not sample index —
    // Catmull-Rom sample spacing varies, indexed stepping surged/crawled
    G.menuD = (G.menuD || 0) + dt * 150;
    let i = G.menuI || 0;
    for (let guard = 0; guard < TRACK.N; guard++) {
      const p0 = TRACK.pts[i % TRACK.N], p1 = TRACK.pts[(i + 1) % TRACK.N];
      const seg = Math.hypot(p1.x - p0.x, p1.y - p0.y) || 1;
      if (G.menuD < seg) break;
      G.menuD -= seg; i++;
    }
    G.menuI = i % TRACK.N;
    const p = TRACK.pts[G.menuI];
    const k = clamp(dt * 1.2, 0, 1);
    cam.x = lerp(cam.x, p.x, k);
    cam.y = lerp(cam.y, p.y, k);
    cam.z = lerp(cam.z, 0.9, k);
    cam.rot += angNorm(0 - cam.rot) * k;
  }

  // -------- track select: minimap silhouettes side by side
  function drawTrackSel() {
    ctx.fillStyle = 'rgba(14,5,28,0.55)';
    ctx.fillRect(0, 0, W, H);
    txt(ctx, 'コース COURSE', W / 2, H * 0.12, 28, '#fff', 'center', 900, 16, '#b06bff');
    const ids = Object.keys(TRACKS);
    const cw = Math.min(280, W * (ids.length > 2 ? 0.295 : 0.42)), ch = Math.min(250, H * 0.44);
    const gap = Math.min(30, W * 0.025);
    let x = W / 2 - (cw * ids.length + gap * (ids.length - 1)) / 2;
    const y = H * 0.24;
    for (const id of ids) {
      const t = TRACKS[id], on = G.track === id;
      panel(ctx, x, y, cw, ch, on ? '#ffd166' : 'rgba(255,255,255,0.25)', on ? '#ffd166' : null);
      // course silhouette
      if (!trackCache[id]) {
        const t2 = TRACKS[id].build();
        t2.id = id; t2.style = TRACKS[id].style;
        trackCache[id] = t2;
      }
      const tk = trackCache[id];
      if (tk) {
        const P = tk.pts, pad = 26;
        const sc = Math.min((cw - pad * 2) / tk.worldW, (ch - 108) / tk.worldH);
        const ox2 = x + cw / 2 - tk.worldW * sc / 2, oy2 = y + 16;
        ctx.save();
        ctx.beginPath();
        for (let i = 0; i <= tk.N; i += 2) {
          const p = P[i % tk.N];
          i ? ctx.lineTo(ox2 + p.x * sc, oy2 + p.y * sc) : ctx.moveTo(ox2 + p.x * sc, oy2 + p.y * sc);
        }
        ctx.strokeStyle = on ? '#ffd166' : 'rgba(214,196,255,0.7)';
        ctx.lineWidth = id === 'nring' ? 1.6 : 4;
        ctx.lineJoin = 'round'; ctx.shadowColor = on ? '#ffd166' : 'transparent';
        ctx.shadowBlur = on ? 8 : 0;
        ctx.stroke();
        ctx.restore();
      }
      // fonts scale with the card so three cards survive a phone screen;
      // tiny cards drop the jp name + blurb rather than spill over
      const nameFs = Math.max(10, Math.min(19, cw * 0.105));
      txt(ctx, t.name, x + cw / 2, y + ch - 74, nameFs, on ? '#ffd166' : '#fff', 'center', 900, on ? 8 : 0);
      txt(ctx, cw < 190 ? t.len : t.jp + ' · ' + t.len, x + cw / 2, y + ch - 50, 12, '#ffb7d5', 'center', 800);
      if (cw >= 190) wrapText(t.desc, x + cw / 2, y + ch - 28, cw - 30, 11, 'rgba(255,255,255,0.7)');
      const id2 = id;
      zones.push({
        x, y, w: cw, h: ch,
        act: () => {
          if (G.track === id2) onPress('enter');
          else switchTrack(id2);
        }
      });
      x += cw + gap;
    }
    const bw = 240, bx = W / 2 - bw / 2, by = Math.min(H - 70, y + ch + 40);
    panel(ctx, bx, by, bw, 48, '#7dffb0', '#7dffb0');
    txt(ctx, '選択 SELECT →', W / 2, by + 25, 18, '#7dffb0', 'center', 900, 8);
    zones.push({ x: bx, y: by, w: bw, h: 48, act: () => onPress('enter') });
    if (pad.connected)
      txt(ctx, 'STICK/D-PAD switch · A select · B back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
    else if (!G.touch)
      txt(ctx, '◀ ▶ switch · ENTER select · ESC back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
  }

  function drawGarage() {
    ctx.fillStyle = 'rgba(14,5,28,0.55)';
    ctx.fillRect(0, 0, W, H);
    const R = roster();
    G.sel = clamp(G.sel, 0, R.length - 1);
    txt(ctx, TRACKS[G.track].cat === 'gt' ? 'GTガレージ GT GARAGE' : 'ガレージ GARAGE',
      W / 2, H * 0.09, 28, '#fff', 'center', 900, 16, '#b06bff');
    const spec = R[G.sel];
    const cy = H * 0.33;
    const k = clamp(H / 640, 0.72, 1);        // compact rhythm on short screens
    const ck = clamp(H / 560, 0.7, 1);        // car preview shrink

    // turntable glow pad
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.shadowColor = spec.glow; ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(30,16,50,0.9)';
    ctx.beginPath(); ctx.ellipse(W / 2, cy + 22 * ck, 148 * ck, 42 * ck, 0, 0, TAU); ctx.fill();
    ctx.restore();

    // rotating stacked 3D preview — lean vector fixed in SCREEN space,
    // rotated into the car's local frame so the stack reads as a turntable
    const scl = Math.min(4.2, W / 270) * ck;
    const ang = G.t * 0.7;
    const vx = 0.75, vy = -0.6;
    const lx = vx * Math.cos(-ang) - vy * Math.sin(-ang);
    const ly = vx * Math.sin(-ang) + vy * Math.cos(-ang);
    ctx.save();
    ctx.translate(W / 2, cy);
    ctx.scale(scl, scl);
    ctx.rotate(ang);
    drawCarStacked(ctx, spec, {
      glow: true, hdg: ang,
      lift: h => ({ x: lx * h * 0.14, y: ly * h * 0.14 })
    });
    ctx.restore();

    txt(ctx, spec.name, W / 2, cy + 92 * k, 32, '#fff', 'center', 900, 14, spec.glow);
    txt(ctx, spec.jp + ' · ' + spec.tag, W / 2, cy + 120 * k, 13, '#ffb7d5', 'center', 800);

    // stat bars
    const rows = [['POWER', spec.stats.power], ['GRIP', spec.stats.grip], ['DRIFT', spec.stats.drift]];
    const bw2 = Math.min(300, W * 0.62);
    rows.forEach((r, ri) => {
      const by = cy + 146 * k + ri * 24 * k, bx = W / 2 - bw2 / 2;
      txt(ctx, r[0], bx, by, 11, 'rgba(255,255,255,0.7)', 'left', 800);
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.fillRect(bx + 58, by - 5, bw2 - 58, 8);
      ctx.save();
      ctx.shadowColor = spec.glow; ctx.shadowBlur = 8;
      ctx.fillStyle = spec.glow;
      ctx.fillRect(bx + 58, by - 5, (bw2 - 58) * (r[1] / 5), 8);
      ctx.restore();
    });
    txt(ctx, spec.desc, W / 2, cy + 226 * k, 13, '#cfd8ff', 'center', 700);

    // carousel dots
    for (let i = 0; i < R.length; i++) {
      ctx.fillStyle = i === G.sel ? R[i].glow : 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(W / 2 + (i - (R.length - 1) / 2) * 20, cy + 248 * k, i === G.sel ? 5 : 3.4, 0, TAU);
      ctx.fill();
    }

    // arrows
    const ar = 32;
    const arms = [
      [W / 2 - Math.min(250, W * 0.40), '◀', () => onPress('left')],
      [W / 2 + Math.min(250, W * 0.40), '▶', () => onPress('right')]
    ];
    for (const [sx, lbl, act] of arms) {
      panel(ctx, sx - ar, cy - ar, ar * 2, ar * 2, spec.glow);
      txt(ctx, lbl, sx, cy + 2, 22, '#fff', 'center', 900);
      zones.push({ x: sx - ar - 14, y: cy - ar - 14, w: ar * 2 + 28, h: ar * 2 + 28, act });
    }

    // select
    const bw = 220, bx2 = W / 2 - bw / 2, by2 = Math.min(H - 62, cy + 266 * k);
    panel(ctx, bx2, by2, bw, 46, '#ffd166', '#ffd166');
    txt(ctx, '決定 SELECT →', W / 2, by2 + 24, 17, '#ffd166', 'center', 900, 8);
    zones.push({ x: bx2, y: by2, w: bw, h: 46, act: () => onPress('enter') });
    if (pad.connected)
      txt(ctx, 'STICK/D-PAD choose · A select · B back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
    else if (!G.touch)
      txt(ctx, '◀ ▶ choose · ENTER select · ESC back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
  }

  function drawMode() {
    ctx.fillStyle = 'rgba(14,5,28,0.55)';
    ctx.fillRect(0, 0, W, H);
    txt(ctx, 'モード MODE', W / 2, H * 0.16, 28, '#fff', 'center', 900, 16, '#b06bff');
    const isN = G.track === 'nring';
    const defs = [
      isN
        ? ['free', 'ツーリスト走行', 'TOURIST DRIVE', 'lapping day — hunt and pass the traffic']
        : ['free', 'フリー走行', 'FREESTYLE', 'chain drifts, chase the combo'],
      ['tt', 'タイムアタック', 'TIME ATTACK',
        isN ? 'closed track, zero traffic — race your ghost' : 'race your ghost for the lap record']
    ];
    const cw = Math.min(300, W * 0.42), ch = 168;
    const gap = Math.min(40, W * 0.04);
    const totW = cw * 2 + gap;
    let x = W / 2 - totW / 2;
    const y = H * 0.30;
    for (const [id, jp, en, desc] of defs) {
      const on = G.mode === id;
      panel(ctx, x, y, cw, ch, on ? '#ffd166' : 'rgba(255,255,255,0.25)', on ? '#ffd166' : null);
      txt(ctx, jp, x + cw / 2, y + 46, 22, on ? '#ffd166' : '#cfd8ff', 'center', 900, on ? 10 : 0);
      txt(ctx, en, x + cw / 2, y + 78, 17, '#fff', 'center', 800);
      wrapText(desc, x + cw / 2, y + 112, cw - 36, 13, 'rgba(255,255,255,0.7)');
      const id2 = id;
      zones.push({
        x, y, w: cw, h: ch,
        act: () => { if (G.mode === id2) onPress('enter'); else { G.mode = id2; SND.beep(520, 0.05, 'square', 0.045); } }
      });
      x += cw + gap;
    }
    const bw = 240, bx = W / 2 - bw / 2, by = y + ch + 44;
    panel(ctx, bx, by, bw, 48, '#7dffb0', '#7dffb0');
    txt(ctx, '発進 START →', W / 2, by + 25, 18, '#7dffb0', 'center', 900, 8);
    zones.push({ x: bx, y: by, w: bw, h: 48, act: () => onPress('enter') });
    if (pad.connected)
      txt(ctx, 'STICK/D-PAD switch · A start · B back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
    else if (!G.touch)
      txt(ctx, '◀ ▶ switch · ENTER start · ESC back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
  }
  function wrapText(str, cx, y, maxW, size, color) {
    ctx.font = FONT(700, size);
    const words = str.split(' ');
    let line = '', ly = y;
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && line) {
        txt(ctx, line, cx, ly, size, color, 'center', 700);
        line = w; ly += size + 5;
      } else line = test;
    }
    if (line) txt(ctx, line, cx, ly, size, color, 'center', 700);
  }

  function drawTouch() {
    if (!touchControlsEnabled() || !(G.state === 'play' || G.state === 'count')) return;
    layoutTouch();
    const st = touchState();
    for (const b of touchBtns) {
      ctx.save();
      ctx.globalAlpha = st[b.id] ? 0.5 : 0.25;
      ctx.fillStyle = st[b.id] ? '#ffd166' : '#ffffff';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
      ctx.globalAlpha = 0.85;
      txt(ctx, b.label, b.x, b.y + 1, b.r * 0.52, '#1a0e2e', 'center', 900);
      ctx.restore();
    }
    // pause tap-target — without it a phone player can never pause,
    // respawn (pause menu has it) or leave a race
    {
      const px = W / 2, py = 30;
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      rr(ctx, px - 22, py - 15, 44, 30, 8); ctx.fill();
      ctx.globalAlpha = 0.8; ctx.fillStyle = '#1a0e2e';
      ctx.fillRect(px - 6, py - 7, 4, 14);
      ctx.fillRect(px + 2, py - 7, 4, 14);
      ctx.restore();
      zones.push({ x: px - 34, y: 0, w: 68, h: 54, act: () => onPress('esc') });
    }
  }

  // ---------------------------------------------- render + main loop
  function render() {
    renderWorld();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    skyOverlay();
    zones = [];
    switch (G.state) {
      case 'title': drawTitle(); break;
      case 'track': drawTrackSel(); break;
      case 'garage': drawGarage(); break;
      case 'mode': drawMode(); break;
      case 'count': drawHUD(); drawCountdown(); drawTouch(); break;
      case 'play': drawSpeedLines(); drawHUD(); drawTouch(); break;
      case 'pause': drawHUD(); drawPause(); break;
    }
  }

  let last = performance.now();
  // tick = one simulated+rendered frame; frame() re-arms itself on rAF.
  // Split so tests can pump deterministic frames while the tab is hidden.
  function tick(now) {
    // clamp BOTH ends: a non-monotonic timestamp (suspend/resume, test
    // pumps) must never produce a negative dt — it inverts every clamp
    let dt = clamp((now - last) / 1000, 0, 0.05);
    last = now;
    G.t += dt;
    padMenus();
    switch (G.state) {
      case 'play':
        updatePlay(dt);
        break;
      case 'count': {
        G.cd -= dt;
        const n = Math.ceil(Math.max(0, G.cd));
        if (n !== G.cdLast) {
          G.cdLast = n;
          if (n > 0) SND.beep(440, 0.12, 'square', 0.06);
          else { SND.beep(880, 0.4, 'square', 0.07); }
        }
        // camera settles onto the grid + idle rev
        const k = clamp(dt * 3, 0, 1);
        if (TRACK.dyn) {
          const lead = 150;
          cam.x = lerp(cam.x, car.x + Math.cos(car.h) * lead, k);
          cam.y = lerp(cam.y, car.y + Math.sin(car.h) * lead, k);
          cam.rot += angNorm((-Math.PI / 2 - car.h) - cam.rot) * k;
          cam.z = lerp(cam.z, 1.24, k);
        } else {
          cam.x = lerp(cam.x, car.x, k); cam.y = lerp(cam.y, car.y, k);
          cam.rot += angNorm(0 - cam.rot) * k;
          cam.z = lerp(cam.z, 1.24, k);
        }
        const gas = Math.max((keys.up || touchState().up) ? 1 : 0, padState().thr);
        car.rpm = 0.25 + 0.2 * Math.sin(G.t * 9) + gas * 0.4;
        car.inThr = lerp(car.inThr, gas, clamp(dt * 6, 0, 1));
        updateTraffic(dt);    // tourists keep lapping through the countdown
        updateParticles(dt);
        if (G.cd <= -0.6) G.state = 'play';
        break;
      }
      case 'pause':
        break;
      default:
        menuDrift(dt);
        updateParticles(dt);
    }
    SND.update(dt, car, G.state === 'play' || G.state === 'count');
    render();
  }
  function frame(now) {
    tick(now);
    requestAnimationFrame(frame);
  }

  if (window.__EBISU_TEST || (typeof location !== 'undefined' && location.hash === '#test')) {
    window.__dbg = {
      get G() { return G; }, get car() { return car; },
      get score() { return score; }, get lap() { return lap; },
      get TRACK() { return TRACK; }, get traffic() { return traffic; },
      cam, props, CARS, onPress, fmtT, SND, SAVE, switchTrack, tick
    };
  }
  requestAnimationFrame(frame);
  }

  if (typeof window !== 'undefined') startGame();
</script>
</body>
