name: Apply Japan Drift OTP Reset Patch

on:
  push:
    paths:
      - .github/workflows/apply-japandrift-otp-reset.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Load and apply saved OTP reset patch
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/athridev/japandrift/f6610a7dd8c4b0d32c7c4e6b51c966a4270a5d29/.github/workflows/apply-japandrift-otp-reset.yml" > /tmp/source-workflow.yml
          awk "found && /^PATCH_B64$/ {exit} found {print} /<<'PATCH_B64'/ {found=1}" /tmp/source-workflow.yml > /tmp/japandrift-otp-reset.patch.gz.b64
          test -s /tmp/japandrift-otp-reset.patch.gz.b64
          base64 -d /tmp/japandrift-otp-reset.patch.gz.b64 | gunzip > /tmp/japandrift-otp-reset.patch
          git apply --index --whitespace=nowarn /tmp/japandrift-otp-reset.patch
          rm -f .github/workflows/apply-japandrift-otp-reset.yml
          git add -A
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git commit -m "Fix Japan Drift OTP reset flow"
          git push
