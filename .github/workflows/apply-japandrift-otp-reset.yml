name: Apply Japan Drift OTP Reset Patch

on:
  push:
    paths:
      - .github/workflows/apply-japandrift-otp-reset.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply OTP reset patch file
        shell: bash
        run: |
          set -euo pipefail
          git apply --index --whitespace=nowarn .github/patches/otp-reset.patch
          rm -f .github/workflows/apply-japandrift-otp-reset.yml .github/patches/otp-reset.patch
          git add -A
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git commit -m "Fix Japan Drift OTP reset flow"
          git push
