'use strict';
/* =====================================================================
   EBISU CIRCUIT v2 — 恵比寿サーキット
   Single-file arcade drift game. Vanilla JS + Canvas + Web Audio.
   v2: fake-3D top-down renderer (camera-parallax extrusion + sprite-
   stacked cars with body roll), 5 badge-free JDM legend lookalikes,
   per-car engine synth with gears / turbo whine / BOV / lift-off pops,
   much wider circuit, guardrails, start gantry, torii, paddock, poles.
   v2.1: 120 Hz fixed-substep physics, reachable spin-outs (tyre
   saturation), frame-rate-proof wrong-way, gamepad + rumble, minimap,
   localStorage save (best lap + ghost + chain + mute + selection),
   interpolated ghost playback, M mute, blur auto-pause, compact garage.
   v2.2: mechanical gearshifts (hard rev drop, ignition cut, driveline
   clunk, rev-match blip), turbo whine + spool whoosh + flutter/BOV,
   NA induction growl, engine roughness wobble; underglow removed.
   v2.3: real gearbox pacing (hysteresis, shift cooldown, torque cut,
   limiter over-swing), lift-off flutter fixed (raw-pedal edge detect)
   with a longer surge whose stutter slows as it dies — tolololo.
   v2.4: per-car gear ratios, rpm/speed/load shift logic, natural
   downshifts, and lower-gear torque pull for more believable drift runs.
   ===================================================================== */

// ------------------------------------------------ tiny math
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const angNorm = a => { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; };
const fmtT = t => {
  if (t == null) return '--:--.---';
  // round FIRST, then split — 59.9999 must read 1:00.000, not 0:60.000
  const ms = Math.max(0, Math.round(t * 1000));
  const m = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  return m + ':' + String(sec).padStart(2, '0') + '.' + String(ms % 1000).padStart(3, '0');
};
// hex -> [r,g,b]
function hexRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}
// mix two hex colors, t=0 -> a, t=1 -> b
function mixCol(a, b, t) {
  const A = hexRgb(a), B = hexRgb(b);
  return 'rgb(' + Math.round(lerp(A[0], B[0], t)) + ',' +
    Math.round(lerp(A[1], B[1], t)) + ',' + Math.round(lerp(A[2], B[2], t)) + ')';
}
// multiply hex brightness
function shadeCol(h, m) {
  const c = hexRgb(h);
  return 'rgb(' + Math.round(clamp(c[0] * m, 0, 255)) + ',' +
    Math.round(clamp(c[1] * m, 0, 255)) + ',' + Math.round(clamp(c[2] * m, 0, 255)) + ')';
}

// ------------------------------------------------ fake-3D constant
// A point at height h is drawn pushed away from the camera centre by
// (p - cam) * KZ * h  — classic top-down parallax extrusion.
const KZ = 0.00125;

// ------------------------------------------------ track definition
// Control points [x, y, width] — closed Catmull-Rom loop.
// v2: widths up ~75% so long, lazy drifts fit. Layout homage to Ebisu:
// figure-eight crossover, tight east hairpin, huge banked west sweeper.
const CTRL = [
  [1350, 1250, 150],  // approach crossover from SW
  [1550,  950, 150],  // leave crossover to NE
  [1850,  700, 152],
  [2250,  620, 156],  // start/finish straight
  [2600,  780, 164],
  [2720, 1080, 176],  // hairpin apex (east)
  [2560, 1350, 164],
  [2200, 1420, 156],
  [1850, 1330, 150],
  [1600, 1120, 146],  // approach crossover from SE
  [1350,  900, 150],  // leave crossover to NW
  [1050,  700, 156],
  [ 680,  620, 172],
  [ 380,  800, 204],  // wide drift zone begins
  [ 300, 1120, 226],  // big sweeper apex (banked)
  [ 430, 1420, 220],
  [ 760, 1560, 208],
  [1100, 1480, 178]
];

function buildTrack() {
  const SEG = 40, n = CTRL.length, pts = [];
  for (let i = 0; i < n; i++) {
    const p0 = CTRL[(i - 1 + n) % n], p1 = CTRL[i],
          p2 = CTRL[(i + 1) % n],     p3 = CTRL[(i + 2) % n];
    for (let j = 0; j < SEG; j++) {
      const t = j / SEG, t2 = t * t, t3 = t2 * t;
      const q = (a, b, c, d) =>
        0.5 * (2 * b + (c - a) * t + (2 * a - 5 * b + 4 * c - d) * t2 + (3 * b - a - 3 * c + d) * t3);
      pts.push({
        x: q(p0[0], p1[0], p2[0], p3[0]),
        y: q(p0[1], p1[1], p2[1], p3[1]),
        w: q(p0[2], p1[2], p2[2], p3[2])
      });
    }
  }
  const N = pts.length;

  // shift world so everything has margin for scenery
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  for (const p of pts) {
    minX = Math.min(minX, p.x - p.w); maxX = Math.max(maxX, p.x + p.w);
    minY = Math.min(minY, p.y - p.w); maxY = Math.max(maxY, p.y + p.w);
  }
  const M = 360, ox = M - minX, oy = M - minY;
  for (const p of pts) { p.x += ox; p.y += oy; }
  const worldW = (maxX - minX) + 2 * M, worldH = (maxY - minY) + 2 * M;

  // tangents / normals
  for (let i = 0; i < N; i++) {
    const a = pts[(i - 1 + N) % N], b = pts[(i + 1) % N];
    let tx = b.x - a.x, ty = b.y - a.y;
    const l = Math.hypot(tx, ty) || 1; tx /= l; ty /= l;
    const p = pts[i];
    p.tx = tx; p.ty = ty; p.nx = -ty; p.ny = tx;
  }
  // length + curvature (heading delta over ±5 samples)
  let total = 0;
  for (let i = 0; i < N; i++) {
    const a = pts[i], b = pts[(i + 1) % N];
    a.segLen = Math.hypot(b.x - a.x, b.y - a.y);
    total += a.segLen;
  }
  for (let i = 0; i < N; i++) {
    const a = pts[(i - 5 + N) % N], b = pts[(i + 5) % N];
    pts[i].curv = angNorm(Math.atan2(b.ty, b.tx) - Math.atan2(a.ty, a.tx));
  }
  // edge points
  for (const p of pts) {
    const hw = p.w / 2;
    p.lx = p.x + p.nx * hw; p.ly = p.y + p.ny * hw;
    p.rx = p.x - p.nx * hw; p.ry = p.y - p.ny * hw;
  }
  // start/finish on the top-right straight
  const sx = 2050 + ox, sy = 660 + oy;
  let startIdx = 0, bd = 1e18;
  for (let i = 0; i < N; i++) {
    const d = (pts[i].x - sx) ** 2 + (pts[i].y - sy) ** 2;
    if (d < bd) { bd = d; startIdx = i; }
  }
  return { pts, N, total, worldW, worldH, startIdx };
}
const TRACK = buildTrack();

// nearest centreline sample. from == null → full scan, else windowed
// search around a known progress index (handles the fig-8 crossover).
function nearestSample(x, y, from, win) {
  const P = TRACK.pts, N = TRACK.N;
  let bi = 0, bd = 1e18;
  if (from == null) {
    for (let i = 0; i < N; i++) {
      const d = (P[i].x - x) ** 2 + (P[i].y - y) ** 2;
      if (d < bd) { bd = d; bi = i; }
    }
  } else {
    for (let k = -win; k <= win; k++) {
      const i = (from + k + N) % N;
      const d = (P[i].x - x) ** 2 + (P[i].y - y) ** 2;
      if (d < bd) { bd = d; bi = i; }
    }
  }
  return { i: bi, d: Math.sqrt(bd) };
}
// coarse global "am I on ANY asphalt" test (crossover branch safety)
function anyOnTrack(x, y) {
  const P = TRACK.pts, N = TRACK.N;
  for (let i = 0; i < N; i += 4) {
    const dx = P[i].x - x, dy = P[i].y - y;
    const hw = P[i].w / 2 + 3;
    if (dx * dx + dy * dy < hw * hw) return true;
  }
  return false;
}

// ------------------------------------------------ the five legends

const DEFAULT_GEARBOX = {
  tops: [0.26, 0.45, 0.64, 0.82, 1],
  ratios: [3.45, 2.08, 1.42, 1.05, 0.82],
  idle: 0.15, redline: 1.02, up: 0.92, down: 0.36,
  shiftDelay: 0.42, minHold: 1.12
};
const GEARBOX_BY_CAR = {
  ae86: {
    tops: [0.24, 0.43, 0.62, 0.80, 1],
    ratios: [3.59, 2.02, 1.38, 1.00, 0.86],
    up: 0.94, down: 0.39, shiftDelay: 0.38, minHold: 1.14
  },
  s15: {
    tops: [0.25, 0.44, 0.63, 0.82, 1],
    ratios: [3.32, 1.90, 1.31, 1.00, 0.76],
    up: 0.91, down: 0.35, shiftDelay: 0.40, minHold: 1.12
  },
  fd: {
    tops: [0.27, 0.46, 0.65, 0.83, 1],
    ratios: [3.48, 2.02, 1.39, 1.00, 0.72],
    up: 0.96, down: 0.37, shiftDelay: 0.36, minHold: 1.04
  },
  r34: {
    tops: [0.25, 0.43, 0.62, 0.81, 1],
    ratios: [3.83, 2.36, 1.69, 1.31, 1.00],
    up: 0.90, down: 0.34, shiftDelay: 0.42, minHold: 1.20
  },
  a80: {
    tops: [0.27, 0.47, 0.66, 0.84, 1],
    ratios: [3.83, 2.36, 1.53, 1.00, 0.79],
    up: 0.91, down: 0.34, shiftDelay: 0.44, minHold: 1.20
  }
};
for (const c of CARS) c.gearbox = Object.assign({}, DEFAULT_GEARBOX, GEARBOX_BY_CAR[c.id] || {});

function carGearbox(spec) {
  return spec.gearbox || DEFAULT_GEARBOX;
}
function gearTopSpeed(spec, gearI) {
  const gb = carGearbox(spec);
  return spec.phys.maxSpeed * gb.tops[clamp(gearI, 0, gb.tops.length - 1)];
}
function gearRpmTarget(c, speed, gearI, throttle) {
  const gb = carGearbox(c.spec);
  const top = Math.max(1, gearTopSpeed(c.spec, gearI));
  const prevTop = gearI > 0 ? gearTopSpeed(c.spec, gearI - 1) : 0;
  const low = prevTop * 0.5;
  const band = Math.max(1, top - low);
  let rpm = gb.idle + (gb.redline - gb.idle) * clamp((speed - low) / band, 0, 1.12);
  if (speed < 55) rpm = Math.max(rpm, gb.idle + throttle * 0.46);
  return clamp(rpm, gb.idle * 0.8, gb.redline + 0.1);
}
function gearboxPull(c) {
  const gb = carGearbox(c.spec);
  const ratios = gb.ratios;
  const first = ratios[0];
  const last = ratios[ratios.length - 1];
  const ratio = ratios[clamp(c.gearI || 0, 0, ratios.length - 1)];
  const ratioN = clamp((ratio - last) / Math.max(0.01, first - last), 0, 1);
  const rpm = c.rpm || gb.idle;
  const torqueBand = 0.62 + 0.38 * clamp((rpm - 0.20) / 0.55, 0, 1);
  const limiterFade = 0.24 * clamp((rpm - 0.96) / 0.16, 0, 1);
  return clamp((0.62 + ratioN * 0.38) * (torqueBand - limiterFade), 0.42, 1.02);
}
function updateGearbox(c, dt, speed, throttle, brake, onShift) {
  const gb = carGearbox(c.spec);
  const maxGear = gb.tops.length - 1;
  c.gearI = clamp(c.gearI || 0, 0, maxGear);
  c.shiftT = Math.max(0, (c.shiftT || 0) - dt);
  c.gearHold = Math.max(0, (c.gearHold || 0) - dt);
  if (speed < 32 && c.gearI > 0) {
    c.gearI = 0;
    c.shiftT = 0;
    c.gearHold = 0.18;
    c.rpm = lerp(c.rpm || gb.idle, gearRpmTarget(c, speed, 0, throttle), clamp(dt * 14, 0, 1));
    c.gear = 1;
    return;
  }

  const rpmNow = gearRpmTarget(c, speed, c.gearI, throttle);
  const loaded = throttle > 0.28;
  const upAt = gb.up + (throttle < 0.55 ? 0.04 : 0) - (c.drifting ? 0.02 : 0);
  const downAt = gb.down + (throttle > 0.55 ? 0.05 : 0) + (brake > 0.25 ? 0.03 : 0);
  let shiftDir = 0;

  if (c.shiftT <= 0 && c.gearHold <= 0) {
    if (loaded && c.gearI < maxGear && rpmNow >= upAt) {
      shiftDir = 1;
    } else if (c.gearI > 0) {
      const prevTop = gearTopSpeed(c.spec, c.gearI - 1);
      if (rpmNow <= downAt || speed < prevTop * 0.52) shiftDir = -1;
    }
  }

  if (shiftDir) {
    c.gearI = clamp(c.gearI + shiftDir, 0, maxGear);
    c.shiftT = gb.shiftDelay;
    c.gearHold = gb.minHold + gb.shiftDelay;
    if (speed > 35 && onShift) onShift(shiftDir > 0);
  }

  let rpmT = gearRpmTarget(c, speed, c.gearI, throttle);
  if (shiftDir > 0) rpmT = Math.min(rpmT, Math.max(gb.idle, rpmNow * 0.64));
  if (shiftDir < 0) rpmT = Math.max(rpmT, Math.min(gb.redline + 0.08, rpmNow + 0.22));
  c.rpm = lerp(c.rpm || gb.idle, rpmT, clamp(dt * (c.shiftT > 0 ? 12 : 8), 0, 1));
  c.gear = c.gearI + 1;
}

}

// =====================================================================
function startGame() {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let DPR = 1, W = 0, H = 0;
  function resize() {
    DPR = clamp(window.devicePixelRatio || 1, 1, 1.75);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------------------------------------------- persistence
  // localStorage can be missing or throwing (sandboxed iframe, private
  // mode) — every touch is guarded and the game runs fine without it.
  const SAVE = {
    key: 'ebisu2.save',
    data: {},
    load() {
      try {
        const raw = localStorage.getItem(this.key);
        if (raw) this.data = JSON.parse(raw) || {};
      } catch (e) { this.data = {}; }
      return this.data;
    },
    write() {
      try { localStorage.setItem(this.key, JSON.stringify(this.data)); } catch (e) {}
    },
    set(k, v) { this.data[k] = v; this.write(); }
  };
  SAVE.load();
  // ghost codec: every 4th sample (~15 Hz) + the final one, as small ints.
  // Playback lerps between samples, so the downsample is invisible.
  function encGhost(rec, carId) {
    const pts = [];
    for (let i = 0; i < rec.length; i += 4) {
      const p = rec[i];
      pts.push([Math.round(p.t * 1000), Math.round(p.x * 10), Math.round(p.y * 10), Math.round(p.h * 1000)]);
    }
    const lastP = rec[rec.length - 1];
    if (lastP) pts.push([Math.round(lastP.t * 1000), Math.round(lastP.x * 10), Math.round(lastP.y * 10), Math.round(lastP.h * 1000)]);
    return { car: carId, pts };
  }
  function decGhost(g) {
    if (!g || !Array.isArray(g.pts) || g.pts.length < 2) return null;
    const rec = [];
    for (const q of g.pts) {
      if (!Array.isArray(q) || q.length < 4) return null;
      const p = { t: q[0] / 1000, x: q[1] / 10, y: q[2] / 10, h: q[3] / 1000 };
      if (![p.t, p.x, p.y, p.h].every(Number.isFinite)) return null;
      rec.push(p);
    }
    return rec;
  }

  // ---------------------------------------------- global state
  const G = {
    state: 'title',        // title | garage | mode | count | play | pause
    mode: SAVE.data.mode === 'tt' ? 'tt' : 'free',
    sel: Number.isInteger(SAVE.data.sel) && SAVE.data.sel >= 0 && SAVE.data.sel < CARS.length ? SAVE.data.sel : 0,
    t: 0, cd: 0, cdLast: 4,
    shake: 0, wrong: 0,
    touch: false, padT: -99
  };
  const cam = { x: TRACK.pts[TRACK.startIdx].x, y: TRACK.pts[TRACK.startIdx].y, z: 1 };

  // ---------------------------------------------- input
  const keys = {};

    ArrowUp: 'up', KeyW: 'up', ArrowDown: 'down', KeyS: 'down',
    ArrowLeft: 'left', KeyA: 'left', ArrowRight: 'right', KeyD: 'right',
    Space: 'eb', ShiftLeft: 'eb', ShiftRight: 'eb',

    const k = KEYMAP[e.code];

    e.preventDefault();

    SND.init();
  });
  window.addEventListener('keyup', e => {
    const k = KEYMAP[e.code];
    if (k) { e.preventDefault(); keys[k] = false; }
  });
  window.addEventListener('contextmenu', e => e.preventDefault());
  // Kill every remaining browser gesture a game button could trigger:
  // long-press callout/selection loupe, double-tap zoom, pinch zoom,
  // pull-to-refresh, edge swipes eating a held control. Non-passive
  // preventDefault on the raw touch events is the only reliable way —
  // CSS touch-action alone still lets iOS Safari run some of these.
  const eatTouch = e => { if (e.cancelable) e.preventDefault(); };

    eatTouch(e);

    // touch pointer still tracked in ptrs lost its pointerup — drop it
    if (e.touches.length === 1) {

  document.addEventListener('touchend', eatTouch, { passive: false });
  document.addEventListener('gesturestart', eatTouch, { passive: false });
  document.addEventListener('gesturechange', eatTouch, { passive: false });
  document.addEventListener('dblclick', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  // stuck-key + tab-away safety: drop all inputs and shelve the race
  function focusLost() {
    for (const k in keys) keys[k] = false;
    ptrs.clear();
    if (G.state === 'play') G.state = 'pause';
    else if (G.state === 'count') G.state = 'mode';
  }
  window.addEventListener('blur', focusLost);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) focusLost();

  });

  // pointers (touch + mouse). Play-state buttons are hit-tested per frame,
  // menu zones are hit-tested on pointerdown.
  const ptrs = new Map();
  let zones = [];               // rebuilt every menu frame
  let swipe = null;             // garage swipe-to-change-car tracker
  function ptPos(e) {
    return { x: e.clientX, y: e.clientY };
  }
  window.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (e.pointerType === 'touch') G.touch = true;
    const p = ptPos(e);
    p.t = e.pointerType; p.ts = performance.now();
    // sticky control assignment: the button you land on is yours until
    // you lift the finger — sliding off it can NOT drop the input, and a
    // lost/hijacked pointer can never wedge a button on (see ptrEnd).
    p.btn = touchBtnAt(p.x, p.y);
    ptrs.set(e.pointerId, p);
    SND.init();
    wakeGamepads();

      if (e.clientX >= z.x && e.clientX <= z.x + z.w &&
          e.clientY >= z.y && e.clientY <= z.y + z.h) { z.act(); hitZone = true; break; }
    }

    const p = ptrs.get(e.pointerId);

  });

    ptrs.delete(e.pointerId);

      const dx = e.clientX - swipe.x, dy = e.clientY - swipe.y;
      if (performance.now() - swipe.t < 600 && Math.abs(dx) > 48 && Math.abs(dy) < 80)

  window.addEventListener('pointercancel', ptrEnd);

  // on-screen touch buttons (only shown once a touch is seen, then hidden
  // automatically while a controller is connected).
  let touchBtns = [], touchLW = 0, touchLH = 0;
  function layoutTouch() {
    const r = Math.min(W, H) * 0.075, pad = r * 0.5;

    touchBtns = [
      { id: 'left',  x: pad + r,             y: H - pad - r, r, label: '◀' },
      { id: 'right', x: pad + r * 3.3,       y: H - pad - r, r, label: '▶' },
      { id: 'eb',    x: W - pad - r * 3.6,   y: H - pad - r * 2.9, r: r * 0.9, label: 'ドリ' },
      { id: 'down',  x: W - pad - r * 3.6,   y: H - pad - r, r: r * 0.9, label: 'ブ' },
      { id: 'up',    x: W - pad - r,         y: H - pad - r, r: r * 1.15, label: 'GAS' }

        const L = touchBtns[0], R = touchBtns[1];

  }

  // ---------------------------------------------- gamepad
  // Auto-detected through events plus per-frame polling (Safari/iOS can
  // expose a paired controller late, often after its first button press).
  // LS/dpad steer, RT gas, LT brake, A/X/LB/RB handbrake, A select, B back,
  // Y respawn, START pause. Values merge with keyboard + touch in stepCar.
  const pad = {
    st: 0, thr: 0, brk: 0, eb: false,
    connected: false, index: null, id: '',
    prev: {}, navX: 0, lastInput: -99, lastSeen: -99

    const btns = gp.buttons || [];

    return false;

  function padActivate(gp) {
    if (!gp) return null;

    pad.connected = true; pad.index = gp.index; pad.id = gp.id || 'Controller'; pad.lastSeen = G.t;
    if (changed) { pad.prev = {}; pad.navX = 0; G.padT = G.t; }
    if (padHasInput(gp)) { pad.lastInput = G.t; G.padT = G.t; }

  }

  }

    const ax = padAxis(gp, 0);
    const dx = (padBtn(gp, 14) ? -1 : 0) + (padBtn(gp, 15) ? 1 : 0);
    pad.st = dx || ax;
    pad.thr = clamp(Math.max(padVal(gp, 7), padBtn(gp, 12) ? 1 : 0), 0, 1);
    pad.brk = clamp(Math.max(padVal(gp, 6), padBtn(gp, 13) ? 1 : 0), 0, 1);
    pad.eb = padBtn(gp, 0) || padBtn(gp, 2) || padBtn(gp, 4) || padBtn(gp, 5);
    if (pad.st !== 0 || pad.thr > 0.05 || pad.brk > 0.05 || pad.eb) {

  }

  }
  function padMenus() {
    const gp = padPoll();
    if (!gp) return;
    const inMenu = G.state === 'title' || G.state === 'garage' || G.state === 'mode';
    const inPlay = G.state === 'play' || G.state === 'count';
    padEdge(gp, 9, 'start', inPlay || G.state === 'pause' ? 'esc' : 'enter');
    padEdge(gp, 0, 'a', G.state === 'pause' ? 'enter' : (inMenu ? 'enter' : null));
    padEdge(gp, 1, 'b', G.state === 'pause' ? 'back' : (inMenu ? 'esc' : null));
    padEdge(gp, 3, 'y', G.state === 'play' || G.state === 'pause' ? 'reset' : null);
    if (inMenu) {
      padEdge(gp, 14, 'dl', 'left');
      padEdge(gp, 15, 'dr', 'right');
      padEdge(gp, 12, 'du', 'up');
      padEdge(gp, 13, 'dd', 'down');
      padEdge(gp, 4, 'lb', 'left');
      padEdge(gp, 5, 'rb', 'right');
      const ax = padAxis(gp, 0, 0.24);
      if (Math.abs(ax) > 0.55 && pad.navX === 0) { pad.navX = Math.sign(ax); onPress(ax > 0 ? 'right' : 'left'); }
      if (Math.abs(ax) < 0.3) pad.navX = 0;

    const gp = padPoll();

    }
  }

  // ---------------------------------------------- audio (Web Audio synth v2)
  // Per-car engine voice: 2 firing oscillators + sub + filtered exhaust
  // noise through a soft waveshaper. RPM comes from a 5-speed gear model
  // (stepCar computes it), so the pitch saws through shifts like a real
  // gearbox. Turbo cars get a spool whine + blow-off valve; lift-off at
  // high rpm crackles. Tyre screech + low skid rumble + wind on top.
  const SND = {
    ctx: null, ok: false, rpm: 0, boost: 0, prevThr: 0,
    shiftT: 0, shiftDir: 0,
    muted: !!SAVE.data.mute,
    init() {
      if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }

        const AC = window.AudioContext || window.webkitAudioContext;
        const c = this.ctx = new AC();

        this.o1g.gain.value = 0.5; this.o2g.gain.value = 0.4; this.osg.gain.value = 0.35;
        this.osc1.connect(this.o1g); this.osc2.connect(this.o2g); this.oscSub.connect(this.osg);
        this.o1g.connect(this.engFilt); this.o2g.connect(this.engFilt); this.osg.connect(this.engFilt);
        this.osc1.start(); this.osc2.start(); this.oscSub.start();

        this.ex = c.createBufferSource(); this.ex.buffer = buf; this.ex.loop = true;
        this.ex.playbackRate.value = 0.9;

        this.exFilt.frequency.value = 300; this.exFilt.Q.value = 0.9;

        this.naGain.connect(this.engFilt); this.na.start();

        this.scrFilt.frequency.value = 1100; this.scrFilt.Q.value = 1.4;
        this.scrGain = c.createGain(); this.scrGain.gain.value = 0;
        this.scr.connect(this.scrFilt); this.scrFilt.connect(this.scrGain);
        this.scrGain.connect(this.master); this.scr.start();

        this.wind.connect(this.windFilt); this.windFilt.connect(this.windGain);
        this.windGain.connect(this.master); this.wind.start();

        this.setCar(CARS[0]);

      } catch (e) { this.ok = false; }
    },
    setCar(spec) {

    tg(param, v, t = 0.05) { // smooth set, avoids clicks

    toggleMute() {

    },
    update(dt, car, playing) {
      if (!this.ok) return;
      const E = this.car;
      // rpm from the car's gear model, idle in menus
      let rpmT = 0.14;
      if (playing && car) rpmT = clamp(car.rpm, 0.12, 1.05);
      if (this.shiftT > 0) {

        // do this hard — the cruise lerp below is far too soft for it);
        // downshifts get a rev-match blip on top before settling
        this.shiftT -= dt;

        this.rpm = lerp(this.rpm, rpmT, clamp(dt * 14, 0, 1));

        this.rpm = lerp(this.rpm, rpmT, clamp(dt * 9, 0, 1));
      }
      if (E) {
        const f = E.base * (0.55 + this.rpm * E.mul);
        this.tg(this.osc1.frequency, f);
        this.tg(this.osc2.frequency, E.rotary ? f * 1.5 : f);
        this.tg(this.oscSub.frequency, f * 0.5);
        this.tg(this.engFilt.frequency, 260 + this.rpm * E.filt);
        this.tg(this.exFilt.frequency, 140 + this.rpm * 900);
        // combustion roughness: slow detune wobble, calmer at high rpm
        this.tg(this.osc1.detune, Math.sin(performance.now() * 0.013) * (9 - this.rpm * 5), 0.05);

      // upshift ignition cut: gain slams to 12% for the first ~100 ms
      const cut = (this.shiftDir > 0 && this.shiftT > 0.1) ? 0.12 : 1;
      this.tg(this.engGain.gain, playing ? (0.05 + this.rpm * 0.052 + thr * 0.014) * cut : 0,
        this.shiftT > 0 ? 0.025 : 0.1);
      // NA induction growl (silent on turbo cars)
      if (E) {
        this.tg(this.naGain.gain,
          playing ? thr * 0.055 * (1 - clamp(E.turbo || 0, 0, 1)) * (0.4 + this.rpm * 0.8) * cut : 0, 0.08);
        this.tg(this.naFilt.frequency, 350 + this.rpm * 2200, 0.06);
      }

      // turbo spool + whine + BOV + lift-off pops
      if (E) {
        const tAmt = E.turbo || 0;
        const bT = tAmt > 0 ? thr * tAmt * clamp(this.rpm * 1.5, 0, 1) : 0;
        const tau = bT > this.boost ? 0.45 : 0.12;
        this.boost += (bT - this.boost) * clamp(dt / tau, 0, 1);
        const whF = 750 + this.boost * 4400;
        this.tg(this.tOsc.frequency, whF, 0.08);
        this.tg(this.tOsc2.frequency, whF * 1.004, 0.08);
        // whine emerges non-linearly — quiet spool, screaming top-end
        this.tg(this.tGain.gain, Math.pow(this.boost, 1.4) * 0.042 * tAmt, 0.08);

        this.tg(this.twGain.gain, this.boost * this.boost * 0.05 * tAmt, 0.1);
        this.tg(this.twFilt.frequency, 500 + this.boost * 2600, 0.1);
        // lift detection MUST read the raw pedal: the lerped inThr glides
        // down over ~250 ms and never produces the >0.55 -> <0.18 edge,
        // which silently killed every lift-off BOV/flutter
        const raw = playing && car ? (car.thrRaw != null ? car.thrRaw : thr) : 0;
        const lift = this.prevThr > 0.55 && raw < 0.18;
        if (lift && playing) {
          if (this.boost > 0.28) { this.flutter(this.boost); this.boost *= 0.22; }
          else if (this.boost > 0.12) { this.bov(this.boost); this.boost *= 0.3; }
          if (this.rpm > 0.55 && (E.pops || 0) > 0 && Math.random() < E.pops) {
            this.crackle(2 + Math.round(Math.random() * 2 * E.pops));
            if (car) car.flash = 0.1;
          }
        }
        this.prevThr = raw;
      }

      // screech follows drift intensity
      let scr = 0;
      if (playing && car) {
        const it = clamp(Math.abs(car.slip) / 0.9, 0, 1) * clamp(car.speed / 260, 0, 1);
        if (car.drifting || (car.inEb && car.speed > 110)) scr = it;
      }
      this.tg(this.scrGain.gain, scr * 0.13, 0.06);
      this.tg(this.scrFilt.frequency, 850 + scr * 500 + Math.sin(performance.now() * 0.02) * 90, 0.05);
      this.tg(this.rumGain.gain, scr * 0.09, 0.08);
      // wind
      const wN = playing && car ? clamp(car.speed / 640, 0, 1) : 0;
      this.tg(this.windGain.gain, wN * 0.035, 0.2);
    },
    shift(up) {
      // real gearchange: ignition cut + hard rev drop (handled per-frame
      // in update via shiftT), driveline clunk, flutter/BOV between
      // gears on boosted cars, exhaust bark on the NA car
      if (!this.ok) return;
      this.shiftDir = up ? 1 : -1;
      this.shiftT = up ? 0.30 : 0.26;
      this.clunk(up);
      const E = this.car || {};
      if (up) {
        if ((E.turbo || 0) > 0.4 && this.boost > 0.3) {
          this.flutter(this.boost * 0.9); this.boost *= 0.4;
        } else if ((E.turbo || 0) === 0 && this.rpm > 0.62) {
          this.crackle(1);                                  // NA bark
        }
        if (this.rpm > 0.72 && (E.pops || 0) > 0.3 && Math.random() < 0.5)
          this.crackle(1);                                  // shift brap
      }
    },
    clunk(up) { // driveline thock on clutch re-engagement
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime + (up ? 0.2 : 0.06);
        const o = c.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(up ? 120 : 100, t);
        o.frequency.exponentialRampToValueAtTime(55, t + 0.05);
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.07, t + 0.006);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.09);
        const s2 = c.createBufferSource(); s2.buffer = this.noiseBuf;
        const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
        const g2 = c.createGain();
        g2.gain.setValueAtTime(0.035, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
        s2.connect(f); f.connect(g2); g2.connect(this.master);
        s2.start(t); s2.stop(t + 0.06);
      } catch (e) {}
    },
    flutter(inten) { // compressor surge — "to-lo-lo-lo-lo" on lift
      if (!this.ok) return;
      try {
        const c = this.ctx, t = c.currentTime;
        const dur = 0.38 + clamp(inten, 0, 1) * 0.18;    // big boost = long surge
        const s2 = c.createBufferSource(); s2.buffer = this.noiseBuf;
        s2.playbackRate.value = 1.15;
        const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.7;
        f.frequency.setValueAtTime(2400, t);
        f.frequency.exponentialRampToValueAtTime(850, t + dur);
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.13 * clamp(inten, 0.45, 1), t + 0.012);
        g.gain.setValueAtTime(0.11 * clamp(inten, 0.45, 1), t + dur * 0.45);
        g.gain.exponentialRampToValueAtTime(0.002, t + dur);
        // the chop IS the tolololo — and it slows down as the surge dies
        const chop = c.createGain(); chop.gain.value = 0.5;
        const lfo = c.createOscillator(); lfo.type = 'square';
        lfo.frequency.setValueAtTime(29, t);
        lfo.frequency.linearRampToValueAtTime(17, t + dur);
        const lg = c.createGain(); lg.gain.value = 0.5;
        lfo.connect(lg); lg.connect(chop.gain);
        s2.connect(f); f.connect(g); g.connect(chop); chop.connect(this.master);
        s2.start(t); lfo.start(t);
        s2.stop(t + dur + 0.03); lfo.stop(t + dur + 0.03);
      } catch (e) {}
    },
    bov(inten) { // blow-off valve "psshh"
      if (!this.ok) return;
      const c = this.ctx, s = c.createBufferSource(); s.buffer = this.noiseBuf;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.1;
      const g = c.createGain(), t = c.currentTime;
      f.frequency.setValueAtTime(2600, t);
      f.frequency.exponentialRampToValueAtTime(900, t + 0.28);
      g.gain.setValueAtTime(0.11 * clamp(inten, 0.3, 1), t);
      g.gain.exponentialRampToValueAtTime(0.002, t + 0.3);
      s.connect(f); f.connect(g); g.connect(this.master);
      s.start(t); s.stop(t + 0.32);
    },
    crackle(n) { // lift-off pops / mild backfire
      if (!this.ok) return;
      const c = this.ctx;
      for (let i = 0; i < n; i++) {
        const t = c.currentTime + 0.02 + i * (0.05 + Math.random() * 0.05);
        const s = c.createBufferSource(); s.buffer = this.noiseBuf;
        s.playbackRate.value = 0.6 + Math.random() * 0.5;
        const f = c.createBiquadFilter(); f.type = 'lowpass';
        f.frequency.value = 380 + Math.random() * 320;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.09 + Math.random() * 0.05, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.002, t + 0.07);
        s.connect(f); f.connect(g); g.connect(this.master);
        s.start(t); s.stop(t + 0.1);
      }
    },
    beep(f = 660, dur = 0.09, type = 'square', vol = 0.06) {
      if (!this.ok) return;
      const c = this.ctx, o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = f;
      const t = c.currentTime;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t + dur + 0.02);
    },
    chirp() { // drift initiation tyre chirp
      if (!this.ok) return;
      const c = this.ctx, s = c.createBufferSource(); s.buffer = this.noiseBuf;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 2;
      const g = c.createGain(), t = c.currentTime;
      f.frequency.setValueAtTime(700, t);
      f.frequency.exponentialRampToValueAtTime(1900, t + 0.14);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.002, t + 0.16);
      s.connect(f); f.connect(g); g.connect(this.master);
      s.start(t); s.stop(t + 0.18);
    },
    bank() { // score banked jingle
      this.beep(1174, 0.07, 'sine', 0.05);
      setTimeout(() => this.beep(1568, 0.1, 'sine', 0.05), 70);
    },
    callout() {
      this.beep(880, 0.06, 'triangle', 0.05);
      setTimeout(() => this.beep(1318, 0.12, 'triangle', 0.05), 60);
    }
  };

  // ---------------------------------------------- fake-3D helpers
  // World point at height h, pushed radially away from the camera —
  // classic top-down parallax extrusion. Everything tall uses this.
  function liftW(x, y, h) {
    return { x: x + (x - cam.x) * KZ * h, y: y + (y - cam.y) * KZ * h };
  }
  // dusk key light for wall shading
  const LX = -0.507, LY = -0.862;
  function faceBright(nx, ny) {
    return 0.60 + 0.40 * Math.max(0, nx * LX + ny * LY);
  }
  function quadFill(g, a, b, c, d, col) {
    g.beginPath();
    g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.lineTo(c.x, c.y); g.lineTo(d.x, d.y);
    g.closePath();
    g.fillStyle = col; g.fill();
  }
  // extruded box: half-length hl along rot, half-depth hh across, z0..z1
  function boxPart(g, cx, cy, hl, hh, rot, z0, z1, wallHex, roofHex, opts) {
    const ca = Math.cos(rot), sa = Math.sin(rot);
    const loc = [[hl, hh], [hl, -hh], [-hl, -hh], [-hl, hh]];
    const nrm = [[1, 0], [0, -1], [-1, 0], [0, 1]];
    const base = [];
    for (const p of loc) base.push({ x: cx + p[0] * ca - p[1] * sa, y: cy + p[0] * sa + p[1] * ca });
    for (let i = 0; i < 4; i++) {
      const a = base[i], b = base[(i + 1) % 4];
      const nx = nrm[i][0] * ca - nrm[i][1] * sa, ny = nrm[i][0] * sa + nrm[i][1] * ca;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      if (nx * (cam.x - mx) + ny * (cam.y - my) <= 0) continue; // back face
      const a0 = liftW(a.x, a.y, z0), b0 = liftW(b.x, b.y, z0);
      const a1 = liftW(a.x, a.y, z1), b1 = liftW(b.x, b.y, z1);
      quadFill(g, a0, b0, b1, a1, shadeCol(wallHex, faceBright(nx, ny)));
      if (opts && opts.wallDeco) opts.wallDeco(g, i, a0, b0, b1, a1, nx, ny);
    }
    const top = base.map(p => liftW(p.x, p.y, z1));
    g.beginPath();
    g.moveTo(top[0].x, top[0].y);
    for (let i = 1; i < 4; i++) g.lineTo(top[i].x, top[i].y);
    g.closePath();
    g.fillStyle = roofHex; g.fill();
    g.strokeStyle = 'rgba(10,8,18,0.35)'; g.lineWidth = 1; g.stroke();
    if (opts && opts.roof) opts.roof(g, top, rot, z1);
  }
  // extruded cylinder: fat stroked line for the side, disc on top
  function cylPart(g, x, y, r, z0, z1, sideCol, topCol) {
    const a = liftW(x, y, z0), b = liftW(x, y, z1);
    g.strokeStyle = sideCol; g.lineWidth = r * 2; g.lineCap = 'butt';
    g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.stroke();
    g.fillStyle = topCol;
    g.beginPath(); g.arc(b.x, b.y, r, 0, TAU); g.fill();
  }

  // ---------------------------------------------- pre-rendered ground
  // Flat stuff (grass, asphalt, curbs, neon, prop shadows, light pools)
  // renders once offscreen; skid marks live on a second fading canvas.
  // Anything with HEIGHT is a prop drawn per-frame with the parallax.
  const bg = document.createElement('canvas');
  bg.width = Math.round(TRACK.worldW); bg.height = Math.round(TRACK.worldH);
  const bgctx = bg.getContext('2d');
  const marks = document.createElement('canvas');
  marks.width = bg.width; marks.height = bg.height;
  const mctx = marks.getContext('2d');

  function clearOfTrack(x, y, margin) {
    const P = TRACK.pts, N = TRACK.N;
    for (let i = 0; i < N; i += 4) {
      const dx = P[i].x - x, dy = P[i].y - y, r = P[i].w / 2 + margin;
      if (dx * dx + dy * dy < r * r) return false;
    }
    return true;
  }
  function stampShadow(x, y, rx, ry, a = 0.28) {
    bgctx.save();
    bgctx.fillStyle = 'rgba(16,6,26,' + a + ')';
    bgctx.beginPath(); bgctx.ellipse(x + 7, y + 10, rx, ry, 0, 0, TAU); bgctx.fill();
    bgctx.restore();
  }
  function stampGlow(x, y, r, col, a) {
    bgctx.save();
    const rg = bgctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, col); rg.addColorStop(1, 'rgba(0,0,0,0)');
    bgctx.globalAlpha = a; bgctx.fillStyle = rg;
    bgctx.beginPath(); bgctx.arc(x, y, r, 0, TAU); bgctx.fill();
    bgctx.restore();
  }

  function prerenderWorld() {
    const g = bgctx;
    const P = TRACK.pts, N = TRACK.N;
    // dusk-lit grass
    const gr = g.createLinearGradient(0, 0, 0, bg.height);
    gr.addColorStop(0, '#3b4839'); gr.addColorStop(0.55, '#294034'); gr.addColorStop(1, '#20342d');
    g.fillStyle = gr; g.fillRect(0, 0, bg.width, bg.height);
    for (let i = 0; i < 10; i++) { // warm sun patches
      const x = rnd(bg.width), y = rnd(bg.height), r = rnd(200, 460);
      const rg = g.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, 'rgba(255,150,120,0.06)'); rg.addColorStop(1, 'rgba(255,150,120,0)');
      g.fillStyle = rg; g.beginPath(); g.arc(x, y, r, 0, TAU); g.fill();
    }
    g.globalAlpha = 0.06;
    for (let i = 0; i < 5200; i++) {
      g.fillStyle = Math.random() < 0.5 ? '#e8ffe0' : '#0d1f18';
      g.fillRect(rnd(bg.width), rnd(bg.height), 2, 2);
    }
    g.globalAlpha = 1;

    // ribbon path
    const ribbon = new Path2D();
    ribbon.moveTo(P[0].lx, P[0].ly);
    for (let i = 1; i < N; i++) ribbon.lineTo(P[i].lx, P[i].ly);
    ribbon.lineTo(P[0].lx, P[0].ly);
    for (let i = N - 1; i >= 0; i--) ribbon.lineTo(P[i].rx, P[i].ry);
    ribbon.closePath();

    // elevation shadow, then asphalt
    g.save(); g.translate(9, 13);
    g.fillStyle = 'rgba(8,4,18,0.35)'; g.fill(ribbon); g.restore();
    g.fillStyle = '#413d4e'; g.fill(ribbon);
    g.save(); g.clip(ribbon); // dusk light wash on asphalt
    const ag = g.createLinearGradient(0, 0, 0, bg.height);
    ag.addColorStop(0, 'rgba(255,120,160,0.10)');
    ag.addColorStop(0.5, 'rgba(90,60,140,0.06)');
    ag.addColorStop(1, 'rgba(20,10,40,0.16)');
    g.fillStyle = ag; g.fillRect(0, 0, bg.width, bg.height);
    // banking cue lines on hard corners
    g.strokeStyle = 'rgba(255,255,255,0.05)'; g.lineWidth = 2;
    for (let i = 0; i < N; i += 6) {
      if (Math.abs(P[i].curv) > 0.15) {
        g.beginPath(); g.moveTo(P[i].lx, P[i].ly); g.lineTo(P[i].rx, P[i].ry); g.stroke();
      }
    }
    g.restore();

    // worn racing polish down the middle
    const inner = new Path2D();
    const iw = 0.27; // fraction of full width each side of centre
    inner.moveTo(P[0].x + P[0].nx * P[0].w * iw, P[0].y + P[0].ny * P[0].w * iw);
    for (let i = 1; i < N; i++)
      inner.lineTo(P[i].x + P[i].nx * P[i].w * iw, P[i].y + P[i].ny * P[i].w * iw);
    inner.lineTo(P[0].x + P[0].nx * P[0].w * iw, P[0].y + P[0].ny * P[0].w * iw);
    for (let i = N - 1; i >= 0; i--)
      inner.lineTo(P[i].x - P[i].nx * P[i].w * iw, P[i].y - P[i].ny * P[i].w * iw);
    inner.closePath();
    g.fillStyle = 'rgba(12,10,20,0.15)'; g.fill(inner);

    // white edge lines just inside the neon
    g.strokeStyle = 'rgba(255,255,255,0.35)'; g.lineWidth = 3;
    for (const side of [1, -1]) {
      g.beginPath();
      for (let i = 0; i < N; i++) {
        const hw = P[i].w / 2 - 8;
        const x = P[i].x + P[i].nx * side * hw;
        const y = P[i].y + P[i].ny * side * hw;
        if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
      }
      g.closePath(); g.stroke();
    }

    // curbs on corners (chunkier for the wide track)
    for (let i = 0; i < N; i += 3) {
      if (Math.abs(P[i].curv) < 0.10) continue;
      for (const s of [1, -1]) {
        const ex = s > 0 ? P[i].lx : P[i].rx, ey = s > 0 ? P[i].ly : P[i].ry;
        g.save();
        g.translate(ex, ey); g.rotate(Math.atan2(P[i].ty, P[i].tx));
        g.fillStyle = ((i / 3) | 0) % 2 ? '#ff5a66' : '#f5f0ea';
        g.fillRect(-9, s > 0 ? -3 : -8, 18, 11);
        g.restore();
      }
    }

    // centre dashes
    g.strokeStyle = 'rgba(255,236,246,0.15)'; g.lineWidth = 3.2;
    g.setLineDash([22, 34]);
    g.beginPath(); g.moveTo(P[0].x, P[0].y);
    for (let i = 1; i < N; i++) g.lineTo(P[i].x, P[i].y);
    g.closePath(); g.stroke();
    g.setLineDash([]);

    // direction chevrons
    g.strokeStyle = 'rgba(255,214,110,0.55)'; g.lineWidth = 4; g.lineCap = 'round';
    for (let i = 0; i < N; i += 90) {
      const p = P[i];
      g.save(); g.translate(p.x, p.y); g.rotate(Math.atan2(p.ty, p.tx));
      g.beginPath();
      g.moveTo(-6, -10); g.lineTo(7, 0); g.lineTo(-6, 10);
      g.moveTo(-19, -10); g.lineTo(-6, 0); g.lineTo(-19, 10);
      g.stroke(); g.restore();
    }

    // painted kanji in the wide drift zone
    let wi = 0; for (let i = 0; i < N; i++) if (P[i].w > P[wi].w) wi = i;
    g.save();
    g.translate(P[wi].x, P[wi].y); g.rotate(Math.atan2(P[wi].ty, P[wi].tx));
    g.globalAlpha = 0.12; g.fillStyle = '#ffe9f4';
    g.font = '700 76px "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('恵比寿', 0, 0);
    g.restore();

    // start / finish checker band
    {
      const p = P[TRACK.startIdx], hw = p.w / 2 - 4;
      g.save();
      g.translate(p.x, p.y); g.rotate(Math.atan2(p.ty, p.tx));
      for (let a = -hw; a < hw; a += 10) {
        for (let r = 0; r < 3; r++) {
          g.fillStyle = ((a / 10 + r) & 1) ? '#101018' : '#f2f0ea';
          g.fillRect(-15 + r * 10, a, 10, 10);
        }
      }
      g.restore();
    }

    // neon edge lighting — pink left / cyan right
    const le = new Path2D(), re = new Path2D();
    le.moveTo(P[0].lx, P[0].ly); re.moveTo(P[0].rx, P[0].ry);
    for (let i = 1; i < N; i++) { le.lineTo(P[i].lx, P[i].ly); re.lineTo(P[i].rx, P[i].ry); }
    le.closePath(); re.closePath();
    g.lineJoin = 'round';
    g.shadowColor = '#ff5fb4'; g.shadowBlur = 16;
    g.strokeStyle = '#ff6fc0'; g.lineWidth = 3; g.stroke(le);
    g.shadowColor = '#31d5ff';
    g.strokeStyle = '#3fd8ff'; g.stroke(re);
    g.shadowBlur = 0;
    g.strokeStyle = '#ffdcef'; g.lineWidth = 1.1; g.stroke(le);
    g.strokeStyle = '#dcf9ff'; g.stroke(re);

    // small bushes / stones (flat ground clutter)
    for (let k = 0; k < 300; k++) {
      const x = rnd(20, bg.width - 20), y = rnd(20, bg.height - 20);
      if (!clearOfTrack(x, y, 20)) continue;
      g.fillStyle = Math.random() < 0.6 ? 'rgba(70,110,80,0.8)' : 'rgba(120,110,130,0.7)';
      g.beginPath(); g.arc(x, y, rnd(2, 5), 0, TAU); g.fill();
    }
  }
  prerenderWorld();

  // ---------------------------------------------- 3D props
  const SAKURA = ['#ff9ec9', '#ffb3d6', '#f77fb4', '#ffc7de', '#ff8fbe'];
  const props = [];

  function makeTree(x, y, s) {
    const layers = [];
    const hs = [s * 0.95, s * 1.45, s * 1.95];
    for (let li = 0; li < 3; li++) {
      const blobs = [];
      const nB = li === 2 ? 4 : 6;
      for (let b = 0; b < nB; b++) {
        const a = rnd(TAU), r = rnd(0.12, 0.55) * s * (1 - li * 0.22);
        blobs.push({
          dx: Math.cos(a) * r, dy: Math.sin(a) * r,
          r: rnd(0.30, 0.5) * s * (1 - li * 0.16),
          col: shadeCol(SAKURA[(Math.random() * SAKURA.length) | 0], 0.72 + li * 0.16)
        });
      }
      layers.push({ h: hs[li], blobs });
    }
    const hi = [];
    for (let b = 0; b < 3; b++)
      hi.push({ dx: rnd(-0.3, 0.3) * s, dy: rnd(-0.3, 0.3) * s, r: rnd(0.12, 0.2) * s });
    stampShadow(x, y, s * 1.1, s * 0.72, 0.30);
    props.push({
      cx: x, cy: y, cr: s * 2.4 + 26,
      draw(g) {
        cylPart(g, x, y, s * 0.14, 0, s * 0.9, '#4a2a3a', '#5a3448');
        for (const L of layers) {
          for (const b of L.blobs) {
            const p = liftW(x + b.dx, y + b.dy, L.h);
            g.fillStyle = b.col;
            g.beginPath(); g.arc(p.x, p.y, b.r, 0, TAU); g.fill();
          }
        }
        g.fillStyle = 'rgba(255,224,238,0.85)';
        for (const b of hi) {
          const p = liftW(x + b.dx, y + b.dy, s * 1.95);
          g.beginPath(); g.arc(p.x, p.y, b.r, 0, TAU); g.fill();
        }
      }
    });
  }

  function makeTireStack(x, y, col) {
    stampShadow(x, y, 9, 6, 0.3);
    props.push({
      cx: x, cy: y, cr: 18,
      draw(g) {
        for (let t = 0; t < 3; t++) {
          const z0 = t * 4.2, z1 = z0 + 4.2;
          cylPart(g, x, y, 7, z0, z1, '#15161c', t === 2 ? col : shadeCol(col, 0.78));
        }
        const p = liftW(x, y, 12.6);
        g.fillStyle = '#101116';
        g.beginPath(); g.arc(p.x, p.y, 3.4, 0, TAU); g.fill();
      }
    });
  }

  function genProps() {
    const P = TRACK.pts, N = TRACK.N;
    const startP = P[TRACK.startIdx];
    const trackRot = Math.atan2(startP.ty, startP.tx);

    // --- sakura trees lining the circuit + scattered background
    for (let i = 0; i < N; i += 12) {
      for (const s of [1, -1]) {
        if (Math.random() < 0.45) continue;
        const p = P[i], d = p.w / 2 + 64 + rnd(110);
        const x = p.x + p.nx * s * d, y = p.y + p.ny * s * d;
        if (x < 40 || y < 40 || x > bg.width - 40 || y > bg.height - 40) continue;
        if (!clearOfTrack(x, y, 32)) continue;
        makeTree(x, y, rnd(15, 27));
      }
    }
    for (let k = 0; k < 240; k++) {
      const x = rnd(60, bg.width - 60), y = rnd(60, bg.height - 60);
      if (!clearOfTrack(x, y, 74)) continue;
      makeTree(x, y, rnd(11, 22));
    }

    // --- light poles (skip near the start gantry)
    for (let i = 0; i < N; i += 34) {
      const p = P[i];
      if (Math.hypot(p.x - startP.x, p.y - startP.y) < 130) continue;
      const side = ((i / 34) | 0) % 2 ? 1 : -1;
      const d = p.w / 2 + 30;
      const x = p.x + p.nx * side * d, y = p.y + p.ny * side * d;
      if (!clearOfTrack(x, y, 8)) continue;
      const ax = x - p.nx * side * 18, ay = y - p.ny * side * 18;
      stampGlow(ax, ay, 66, 'rgba(255,205,140,1)', 0.13);
      stampShadow(x, y, 4, 3, 0.3);
      props.push({
        cx: x, cy: y, cr: 30,
        draw(g) {
          cylPart(g, x, y, 2.3, 0, 58, '#31353f', '#454a58');
          const a = liftW(x, y, 56), b = liftW(ax, ay, 55);
          g.strokeStyle = '#31353f'; g.lineWidth = 3; g.lineCap = 'round';
          g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.stroke();
          g.save();
          g.shadowColor = '#ffd9a0'; g.shadowBlur = 14;
          g.fillStyle = '#ffe6b8';
          g.beginPath(); g.arc(b.x, b.y, 3.2, 0, TAU); g.fill();
          g.restore();
        }
      });
    }

    // --- guardrails along the outside of corners
    const visited = new Array(N).fill(false);
    for (let i = 0; i < N; i++) {
      if (visited[i] || Math.abs(P[i].curv) < 0.06) continue;
      let a = i;
      while (Math.abs(P[(a - 1 + N) % N].curv) > 0.04 && !visited[(a - 1 + N) % N]) a = (a - 1 + N) % N;
      const run = [];
      let j = a, cs = 0;
      while (Math.abs(P[j].curv) > 0.04 && !visited[j] && run.length < N) {
        visited[j] = true; run.push(j); cs += P[j].curv; j = (j + 1) % N;
      }
      if (run.length < 10) continue;
      const side = cs > 0 ? -1 : 1; // outer side of the turn
      const pts = [];
      for (let k = 0; k < run.length; k += 2) {
        const p = P[run[k]];
        pts.push({ x: p.x + p.nx * side * (p.w / 2 + 14), y: p.y + p.ny * side * (p.w / 2 + 14) });
      }
      for (let c0 = 0; c0 < pts.length - 1; c0 += 11) {
        const seg = pts.slice(c0, Math.min(pts.length, c0 + 12));
        if (seg.length < 2) continue;
        let mx = 0, my = 0;
        for (const q of seg) { mx += q.x; my += q.y; }
        mx /= seg.length; my /= seg.length;
        let mr = 0;
        for (const q of seg) mr = Math.max(mr, Math.hypot(q.x - mx, q.y - my));
        props.push({
          cx: mx, cy: my, cr: mr + 30,
          draw(g) {
            for (let k = 0; k < seg.length; k += 2)
              cylPart(g, seg[k].x, seg[k].y, 1.6, 0, 9, '#23262e', '#3a3e48');
            g.beginPath();
            for (let k = 0; k < seg.length; k++) {
              const p = liftW(seg[k].x, seg[k].y, 7);
              if (k === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
            }
            for (let k = seg.length - 1; k >= 0; k--) {
              const p = liftW(seg[k].x, seg[k].y, 11.5);
              g.lineTo(p.x, p.y);
            }
            g.closePath();
            g.fillStyle = '#c9d2df'; g.fill();
            g.beginPath();
            for (let k = 0; k < seg.length; k++) {
              const p = liftW(seg[k].x, seg[k].y, 11.5);
              if (k === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
            }
            g.strokeStyle = 'rgba(240,246,255,0.9)'; g.lineWidth = 1.2; g.stroke();
            g.save();
            g.shadowColor = '#ff4444'; g.shadowBlur = 6; g.fillStyle = '#ff5555';
            for (let k = 1; k < seg.length; k += 3) {
              const p = liftW(seg[k].x, seg[k].y, 9.4);
              g.fillRect(p.x - 1.2, p.y - 1.2, 2.4, 2.4);
            }
            g.restore();
          }
        });
      }
    }

    // --- tyre stacks: hairpin inner + sweeper outer
    let hi2 = 0, wi = 0;
    for (let i = 0; i < N; i++) {
      if (Math.abs(P[i].curv) > Math.abs(P[hi2].curv)) hi2 = i;
      if (P[i].w > P[wi].w) wi = i;
    }
    const tireCols = ['#ff4444', '#f2f0ea', '#ffd23e'];
    for (let k = -3; k <= 3; k++) {
      const p = P[(hi2 + k * 7 + N * 2) % N];
      const s = Math.sign(p.curv) || 1;
      makeTireStack(p.x + p.nx * s * (p.w / 2 + 18), p.y + p.ny * s * (p.w / 2 + 18),
        tireCols[(k + 3) % 3]);
    }
    for (let k = -4; k <= 4; k++) {
      const p = P[(wi + k * 8 + N * 2) % N];
      const s = -(Math.sign(p.curv) || 1);
      makeTireStack(p.x + p.nx * s * (p.w / 2 + 20), p.y + p.ny * s * (p.w / 2 + 20),
        tireCols[(k + 4) % 3]);
    }

    // --- start gantry (drives UNDER the beam — the 3D showpiece)
    {
      const p = startP, hw = p.w / 2, rot = trackRot;
      const pil = [
        { x: p.x + p.nx * (hw + 16), y: p.y + p.ny * (hw + 16) },
        { x: p.x - p.nx * (hw + 16), y: p.y - p.ny * (hw + 16) }
      ];
      bgctx.save();
      bgctx.translate(p.x, p.y); bgctx.rotate(rot + Math.PI / 2);
      bgctx.fillStyle = 'rgba(16,6,26,0.16)';
      bgctx.fillRect(-(hw + 22), 2, (hw + 22) * 2, 14);
      bgctx.restore();
      for (const q of pil) stampShadow(q.x, q.y, 9, 7, 0.3);
      props.push({
        cx: p.x, cy: p.y, cr: hw + 70, bias: -1,   // sorted "nearest": beam over cars
        draw(g) {
          for (const q of pil)
            boxPart(g, q.x, q.y, 6, 6, rot, 0, 54, '#59607a', '#7b84a4');
          boxPart(g, p.x, p.y, hw + 22, 7, rot + Math.PI / 2, 44, 58, '#454a63', '#666e92', {
            roof(g2, top, r2, z1) {
              const c = liftW(p.x, p.y, z1);
              g2.save();
              g2.translate(c.x, c.y); g2.rotate(rot + Math.PI / 2);
              g2.fillStyle = '#ffd166';
              g2.font = '900 13px system-ui, sans-serif';
              g2.textAlign = 'center'; g2.textBaseline = 'middle';
              g2.fillText('EBISU CIRCUIT · 恵比寿', 0, 0);
              g2.restore();
            }
          });
          for (let i = 0; i < 2; i++) {
            const e = liftW(pil[i].x, pil[i].y, 58);
            g.save();
            g.shadowColor = i ? '#3fd8ff' : '#ff7ab8'; g.shadowBlur = 12;
            g.fillStyle = i ? '#8fe9ff' : '#ffb0d8';
            g.beginPath(); g.arc(e.x, e.y, 3, 0, TAU); g.fill();
            g.restore();
          }
        }
      });
    }

    // --- torii gate in the sweeper infield
    {
      const p = P[wi];
      const s = Math.sign(p.curv) || 1;
      let d = p.w / 2 + 96;
      let tx = p.x + p.nx * s * d, ty = p.y + p.ny * s * d;
      if (!clearOfTrack(tx, ty, 30)) { d += 50; tx = p.x + p.nx * s * d; ty = p.y + p.ny * s * d; }
      const rot = Math.atan2(p.ty, p.tx);
      const ca = Math.cos(rot), sa = Math.sin(rot);
      const pil = [
        { x: tx + ca * 32, y: ty + sa * 32 },
        { x: tx - ca * 32, y: ty - sa * 32 }
      ];
      for (const q of pil) stampShadow(q.x, q.y, 7, 5, 0.3);
      props.push({
        cx: tx, cy: ty, cr: 84,
        draw(g) {
          for (const q of pil) cylPart(g, q.x, q.y, 4.6, 0, 44, '#8f1d1d', '#c22a2a');
          boxPart(g, tx, ty, 40, 3.4, rot, 27, 33, '#a81f1f', '#c22a2a');
          boxPart(g, tx, ty, 52, 5, rot, 42, 51, '#a81f1f', '#d13030', {
            roof(g2, top) {
              g2.beginPath();
              g2.moveTo(top[0].x, top[0].y);
              for (let i = 1; i < 4; i++) g2.lineTo(top[i].x, top[i].y);
              g2.closePath();
              g2.strokeStyle = '#151318'; g2.lineWidth = 2.4; g2.stroke();
            }
          });
        }
      });
    }

    // --- paddock garages + vending machines + grandstand near start
    {
      const p = startP, hw = p.w / 2, rot = trackRot;
      let pitSide = 1;
      {
        const cx = p.x + p.nx * (hw + 120), cy = p.y + p.ny * (hw + 120);
        if (!clearOfTrack(cx, cy, 40)) pitSide = -1;
      }
      const deco = (g2, i, a0, b0, b1, a1) => {  // shutter seams
        g2.strokeStyle = 'rgba(0,0,0,0.25)'; g2.lineWidth = 1;
        g2.beginPath();
        for (let f = 0.2; f < 0.95; f += 0.2) {
          g2.moveTo(lerp(a0.x, b0.x, f), lerp(a0.y, b0.y, f));
          g2.lineTo(lerp(a1.x, b1.x, f), lerp(a1.y, b1.y, f));
        }
        g2.stroke();
      };
      for (let k = -1; k <= 1; k++) {
        const cx = p.x + p.tx * k * 150 + p.nx * pitSide * (hw + 120);
        const cy = p.y + p.ty * k * 150 + p.ny * pitSide * (hw + 120);
        if (!clearOfTrack(cx, cy, 26)) continue;
        stampShadow(cx, cy, 70, 48, 0.32);
        props.push({
          cx, cy, cr: 104,
          draw(g) {
            boxPart(g, cx, cy, 62, 40, rot, 0, 46, '#4c5468', '#5d667f', {
              wallDeco: deco,
              roof(g2, top, r2, z1) {
                const c = liftW(cx, cy, z1);
                g2.save();
                g2.translate(c.x, c.y); g2.rotate(rot);
                g2.fillStyle = 'rgba(255,255,255,0.55)';
                g2.font = '800 15px system-ui, sans-serif';
                g2.textAlign = 'center'; g2.textBaseline = 'middle';
                g2.fillText('ピット PIT', 0, 0);
                g2.restore();
              }
            });
            boxPart(g, cx + 22, cy - 14, 8, 6, rot, 46, 54, '#39404f', '#4a5162');
          }
        });
      }
      const vCols = ['#ff3b4d', '#3fd8ff', '#ffd166'];
      for (let k = 0; k < 3; k++) {
        const cx = p.x + p.tx * (206 + k * 15) + p.nx * pitSide * (hw + 70);
        const cy = p.y + p.ty * (206 + k * 15) + p.ny * pitSide * (hw + 70);
        if (!clearOfTrack(cx, cy, 10)) continue;
        const vc = vCols[k];
        stampGlow(cx, cy, 34, 'rgba(120,220,255,1)', 0.10);
        stampShadow(cx, cy, 7, 5, 0.3);
        props.push({
          cx, cy, cr: 22,
          draw(g) {
            boxPart(g, cx, cy, 5, 4, rot, 0, 15, '#20242e', '#2a2f3a', {
              wallDeco(g2, i, a0, b0, b1, a1) {
                g2.save();
                g2.shadowColor = vc; g2.shadowBlur = 10;
                g2.fillStyle = vc; g2.globalAlpha = 0.9;
                g2.beginPath();
                g2.moveTo(lerp(a0.x, a1.x, 0.25), lerp(a0.y, a1.y, 0.25));
                g2.lineTo(lerp(b0.x, b1.x, 0.25), lerp(b0.y, b1.y, 0.25));
                g2.lineTo(lerp(b0.x, b1.x, 0.85), lerp(b0.y, b1.y, 0.85));
                g2.lineTo(lerp(a0.x, a1.x, 0.85), lerp(a0.y, a1.y, 0.85));
                g2.closePath(); g2.fill();
                g2.restore();
              }
            });
          }
        });
      }
      // grandstand on the opposite side, a little down the straight
      {
        const sSide = -pitSide;
        const p2 = P[(TRACK.startIdx + 30) % N];
        const cx = p2.x + p2.nx * sSide * (p2.w / 2 + 112);
        const cy = p2.y + p2.ny * sSide * (p2.w / 2 + 112);
        const rot2 = Math.atan2(p2.ty, p2.tx);
        if (clearOfTrack(cx, cy, 30)) {
          const crowd = [];
          const cCols = ['#ffd166', '#ff7ab8', '#55e0ff', '#f2f0ea', '#b06bff', '#7dffb0'];
          for (let rx = -108; rx <= 108; rx += 9)
            for (let ry = -24; ry <= 24; ry += 8)
              if (Math.random() < 0.75)
                crowd.push({ x: rx + rnd(-2, 2), y: ry + rnd(-2, 2), c: cCols[(Math.random() * 6) | 0] });
          const ca2 = Math.cos(rot2), sa2 = Math.sin(rot2);
          stampShadow(cx, cy, 128, 46, 0.32);
          props.push({
            cx, cy, cr: 156,
            draw(g) {
              boxPart(g, cx, cy, 118, 32, rot2, 0, 14, '#3d4354', '#454c60');
              for (const q of crowd) {
                const wx = cx + q.x * ca2 - q.y * sa2, wy = cy + q.x * sa2 + q.y * ca2;
                const l = liftW(wx, wy, 15.5);
                g.fillStyle = q.c;
                g.fillRect(l.x - 1.4, l.y - 1.4, 2.8, 2.8);
              }
              for (const qx of [-100, 100]) for (const qy of [-24, 24]) {
                const wx = cx + qx * ca2 - qy * sa2, wy = cy + qx * sa2 + qy * ca2;
                cylPart(g, wx, wy, 2, 14, 32, '#2a2d36', '#3a3e48');
              }
              boxPart(g, cx, cy, 122, 36, rot2, 32, 39, '#59607a', '#666e92', {
                roof(g2, top, r3, z1) {
                  const c = liftW(cx, cy, z1);
                  g2.save();
                  g2.translate(c.x, c.y); g2.rotate(rot2);
                  g2.globalAlpha = 0.85;
                  for (let b = -120; b < 120; b += 24) {
                    g2.fillStyle = ((b / 24) & 1) ? '#ff5a66' : '#f5f0ea';
                    g2.fillRect(b, -34, 24, 68);
                  }
                  g2.restore();
                }
              });
            }
          });
        }
      }
    }
  }
  genProps();

  // ---------------------------------------------- minimap (prerendered)
  const MMW = 148;
  const mm = document.createElement('canvas');
  const mmScale = MMW / TRACK.worldW;
  mm.width = MMW; mm.height = Math.max(24, Math.round(TRACK.worldH * mmScale));
  {
    const g = mm.getContext('2d');
    const P = TRACK.pts, N = TRACK.N;
    for (const pass of [0, 1]) {
      g.beginPath();
      for (let i = 0; i <= N; i++) {
        const p = P[i % N];
        i ? g.lineTo(p.x * mmScale, p.y * mmScale) : g.moveTo(p.x * mmScale, p.y * mmScale);
      }
      g.strokeStyle = pass ? 'rgba(214,196,255,0.85)' : 'rgba(8,4,16,0.9)';
      g.lineWidth = pass ? 1.3 : 7;
      g.lineJoin = 'round'; g.lineCap = 'round'; g.stroke();
    }
    const sp2 = P[TRACK.startIdx];
    g.strokeStyle = '#ffd166'; g.lineWidth = 2;
    g.beginPath();
    g.moveTo((sp2.x - sp2.nx * 70) * mmScale, (sp2.y - sp2.ny * 70) * mmScale);
    g.lineTo((sp2.x + sp2.nx * 70) * mmScale, (sp2.y + sp2.ny * 70) * mmScale);
    g.stroke();
  }

  let markFadeT = 0;
  function fadeMarks(dt) {
    markFadeT += dt;
    if (markFadeT > 0.3) {
      markFadeT = 0;
      mctx.save();
      mctx.globalCompositeOperation = 'destination-out';
      mctx.globalAlpha = 0.03;
      mctx.fillStyle = '#000';
      mctx.fillRect(0, 0, marks.width, marks.height);
      mctx.restore();
    }
  }

  // ---------------------------------------------- gameplay state
  let car = null;
  const score = { total: 0, chain: 0, mult: 1, chainT: 0, grace: 0, best: 0, wallCalled: false };
  const lap = { run: 0, cur: 0, best: null, last: null, count: 0, cp: 0, prevFrac: 0, rec: [], ghost: null, gi: 0, gspec: null };
  let lastGhostPos = null;      // shared by world render + minimap
  const smoke = [], petals = [], dust = [], pops = [];
  let callout = { en: '', jp: '', t: 99 };

  function addPop(x, y, txt, color, size) { pops.push({ x, y, txt, color, size, t: 0 }); }
  function setCallout(en, jp) { callout = { en, jp, t: 0 }; }

  // petals now carry altitude z and truly fall through the 3D air
  function petalBurst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = rnd(TAU), sp = rnd(30, 130);
      petals.push({
        x, y, z: 6, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        vz: rnd(40, 95),
        life: rnd(1.4, 2.4), max: 2.4, rot: rnd(TAU), vr: rnd(-4, 4),
        s: rnd(2.4, 4.2), ph: rnd(TAU), amb: false
      });
    }
  }
  function spawnPetalAmbient() {
    const vw = W / cam.z, vh = H / cam.z;
    petals.push({
      x: cam.x + rnd(-0.55, 0.55) * vw, y: cam.y + rnd(-0.55, 0.55) * vh,
      z: rnd(36, 68), vx: rnd(-30, -8), vy: rnd(8, 24), vz: -rnd(9, 15),
      life: 30, max: 30, rot: rnd(TAU), vr: rnd(-2.5, 2.5),
      s: rnd(2, 3.6), ph: rnd(TAU), amb: true
    });
  }
  function spawnSmokeAt(x, y, inten) {
    // signature hook: at high combo, tyre smoke becomes sakura petals
    const petalChance = score.mult >= 5 ? 0.72 : score.mult >= 3 ? 0.42 : 0;
    if (Math.random() < petalChance) {
      petals.push({
        x, y, z: 4, vx: rnd(-50, 50), vy: rnd(-50, 50), vz: rnd(30, 80),
        life: rnd(1.2, 2.1), max: 2.1, rot: rnd(TAU), vr: rnd(-5, 5),
        s: rnd(2.4, 4.4), ph: rnd(TAU), amb: false
      });
    } else {
      smoke.push({
        x: x + rnd(-3, 3), y: y + rnd(-3, 3),
        vx: rnd(-24, 24), vy: rnd(-24, 24),
        life: rnd(0.5, 0.95), max: 0.95,
        size: rnd(4, 7) * (0.7 + inten * 0.6), rot: rnd(TAU), vr: rnd(-2, 2)
      });
    }
  }
  function spawnDust() {
    dust.push({
      x: car.x + rnd(-8, 8), y: car.y + rnd(-8, 8),
      vx: -car.vx * 0.12 + rnd(-20, 20), vy: -car.vy * 0.12 + rnd(-20, 20),
      life: rnd(0.4, 0.8), max: 0.8, size: rnd(3, 6)
    });
  }
  function updateParticles(dt) {
    for (let i = smoke.length - 1; i >= 0; i--) {
      const p = smoke[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.size += 16 * dt; p.rot += p.vr * dt; p.life -= dt;
      if (p.life <= 0) smoke.splice(i, 1);
    }
    for (let i = petals.length - 1; i >= 0; i--) {
      const p = petals[i];
      p.ph += dt * 3;
      p.x += (p.vx + Math.sin(p.ph) * 24) * dt;
      p.y += p.vy * dt;
      if (!p.amb && p.z > 0) p.vz -= 120 * dt; // burst gravity
      p.z += p.vz * dt;
      if (p.z <= 0) { p.z = 0; p.vz = 0; p.life = Math.min(p.life, 0.8); }
      p.rot += p.vr * dt; p.life -= dt;
      if (p.amb) {
        // drifted out of view or touched down -> recycle just upwind of
        // the frame instead of dying (keeps the sakura fall continuous)
        const vw = W / cam.z * 0.62, vh = H / cam.z * 0.62;
        if (p.z <= 0 || Math.abs(p.x - cam.x) > vw || Math.abs(p.y - cam.y) > vh) {
          p.x = cam.x + vw * 0.96; p.y = cam.y + rnd(-vh, vh);
          p.z = rnd(36, 68); p.vz = -rnd(9, 15); p.life = p.max;
        }
        continue;
      }
      if (p.life <= 0) petals.splice(i, 1);
    }
    for (let i = dust.length - 1; i >= 0; i--) {
      const p = dust[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) dust.splice(i, 1);
    }
    for (let i = pops.length - 1; i >= 0; i--) {
      const p = pops[i];
      p.t += dt; p.y -= 26 * dt;
      if (p.t > 1.5) pops.splice(i, 1);
    }
    callout.t += dt;
    let amb = 0;
    for (const p of petals) if (p.amb) amb++;
    while (amb < 30) { spawnPetalAmbient(); amb++; }
  }

  // ---------------------------------------------- race setup / control
  function newRace() {
    const spec = CARS[G.sel];
    const p = TRACK.pts[TRACK.startIdx];
    car = {
      spec, x: p.x, y: p.y, h: Math.atan2(p.ty, p.tx),
      vx: 0, vy: 0, steer: 0, slip: 0, drifting: false, speed: 0,
      prog: TRACK.startIdx, off: false, deep: false,
      prevEb: false, inThr: 0, thrRaw: 0, inEb: false, brakeOn: false, shiftT: 0,
      pwl: null, pwr: null, roll: 0, pitch: 0, smokeAcc: 0, spinLock: false,
      rpm: 0, gearI: 0, gear: 1, gearHold: 0.82, flash: 0, wallT: 0, wallZone: false
    };
    score.total = 0; score.chain = 0; score.mult = 1; score.chainT = 0;
    score.grace = 0; score.best = 0; score.wallCalled = false;
    lap.run = 0; lap.cur = 0; lap.best = null; lap.last = null; lap.count = 0;
    lap.cp = 0; lap.prevFrac = 0; lap.rec = []; lap.ghost = null; lap.gi = 0;
    lap.gspec = null; lastGhostPos = null;
    if (G.mode === 'tt' && Number.isFinite(SAVE.data.bestLap)) {
      const g = decGhost(SAVE.data.ghost);
      if (g) {
        lap.best = SAVE.data.bestLap;
        lap.ghost = g;
        lap.gspec = CARS.find(s2 => s2.id === (SAVE.data.ghost && SAVE.data.ghost.car)) || spec;
      }
    }
    SAVE.data.sel = G.sel; SAVE.data.mode = G.mode; SAVE.write();
    smoke.length = 0; dust.length = 0; pops.length = 0;
    for (let i = petals.length - 1; i >= 0; i--) if (!petals[i].amb) petals.splice(i, 1);
    callout = { en: '', jp: '', t: 99 };
    mctx.clearRect(0, 0, marks.width, marks.height);
    cam.x = p.x; cam.y = p.y; cam.z = 1.1;
    G.wrong = 0; G.shake = 0;
    SND.init(); SND.setCar(spec);
    G.state = 'count'; G.cd = 3.6; G.cdLast = 4;
  }
  function respawn() {
    if (!car) return;
    const p = TRACK.pts[car.prog];
    car.x = p.x; car.y = p.y; car.h = Math.atan2(p.ty, p.tx);
    car.vx = 0; car.vy = 0; car.pwl = null; car.pwr = null;
    car.slip = 0; car.drifting = false; car.spinLock = false;
    car.wallT = 0; car.smokeAcc = 0; car.inEb = false; car.brakeOn = false;
    car.steer = 0; car.roll = 0; car.pitch = 0; car.speed = 0;
    car.rpm = 0; car.gearI = 0; car.gear = 1; car.gearHold = 0.82; car.shiftT = 0;
    score.chain = 0; score.mult = 1; score.chainT = 0; score.grace = 0;
    score.wallCalled = false;
  }

  function onPress(k) {
    if (k === 'mute') { SND.toggleMute(); return; }
    switch (G.state) {
      case 'title':
        if (k === 'enter') G.state = 'garage';
        break;
      case 'garage':
        if (k === 'left') { G.sel = (G.sel + CARS.length - 1) % CARS.length; SND.beep(520, 0.05, 'square', 0.045); }
        if (k === 'right') { G.sel = (G.sel + 1) % CARS.length; SND.beep(520, 0.05, 'square', 0.045); }
        if (k === 'enter') G.state = 'mode';
        if (k === 'esc' || k === 'back') G.state = 'title';
        break;
      case 'mode':
        if (k === 'left' || k === 'right' || k === 'up' || k === 'down')
          G.mode = G.mode === 'free' ? 'tt' : 'free';
        if (k === 'enter') newRace();
        if (k === 'esc' || k === 'back') G.state = 'garage';
        break;
      case 'count':
        if (k === 'esc') G.state = 'mode';
        break;
      case 'play':
        if (k === 'esc') G.state = 'pause';
        if (k === 'reset') respawn();
        break;
      case 'pause':
        if (k === 'esc' || k === 'enter') G.state = 'play';
        if (k === 'reset') { respawn(); G.state = 'play'; }
        if (k === 'back') { G.state = 'title'; car = null; }
        break;
    }
  }

  // ---------------------------------------------- car physics
  function stepCar(dt) {
    const c = car, P = c.spec.phys;
    const ts = touchState();
    const gp = padState();
    const st = clamp(((keys.left || ts.left) ? -1 : 0) + ((keys.right || ts.right) ? 1 : 0) + gp.st, -1, 1);
    const thr = Math.max((keys.up || ts.up) ? 1 : 0, gp.thr);      // analog 0..1
    const brk = Math.max((keys.down || ts.down) ? 1 : 0, gp.brk);  // analog 0..1
    const eb = !!(keys.eb || ts.eb || gp.eb);
    c.inThr = lerp(c.inThr, thr, clamp(dt * 6, 0, 1));
    c.thrRaw = thr;                                       // un-lerped, for BOV lift
    c.inEb = eb; c.brakeOn = brk > 0.15 && c.speed > 40;

    const rate = st !== 0 ? 7.5 : 11;
    c.steer = clamp(c.steer + clamp(st - c.steer, -rate * dt, rate * dt), -1, 1);

    const cos = Math.cos(c.h), sin = Math.sin(c.h);
    let vf = c.vx * cos + c.vy * sin;      // forward speed
    let vr = -c.vx * sin + c.vy * cos;     // lateral (slide) speed
    const speed = Math.hypot(c.vx, c.vy);
    updateGearbox(c, dt, speed, thr, brk, up => { if (G.state === 'play') SND.shift(up); });

    // longitudinal (thr / brk are analog). Past ~65° of slip the driven
    // wheels point sideways: engine thrust can no longer straighten the
    // velocity vector — without this fade, holding gas pins slip at ~1.45
    // and the spin-out threshold (2.35) is unreachable.
    const a1 = Math.abs(c.slip);
    const satStart = eb ? 0.75 : 1.2;   // locked rears saturate much earlier
    const satRamp = eb ? 0.4 : 0.5;
    const sideways = clamp((a1 - satStart) / satRamp, 0, 1) * clamp((2.9 - a1) / 0.25, 0, 1);
    const shiftCut = (c.shiftT || 0) > 0.08 ? 0.1 : 1;   // clutch out mid-shift
    const thrEff = thr * (1 - 0.9 * sideways) * shiftCut; // recovers near full reverse
    if (thr && vf < P.maxSpeed) vf += P.accel * gearboxPull(c) * thrEff * dt;
    if (brk) { if (vf > 25) vf -= P.brake * brk * dt; else vf -= P.accel * 0.45 * brk * dt; }
    vf -= vf * P.drag * dt;
    vf = clamp(vf, -P.maxSpeed * 0.3, P.maxSpeed);

    // velocity as (speed, slip-angle). Grip ROTATES the velocity vector
    // toward the nose instead of deleting lateral energy — that's what
    // lets a drift sustain. Scrub is a slip-proportional speed loss.
    let sp = Math.hypot(vf, vr);
    let sa = Math.atan2(vr, vf);
    const slip = sa;
    const wasDrift = c.drifting;
    c.drifting = Math.abs(slip) > 0.19 && Math.abs(slip) < 2.6 && sp > 100;
    if (c.drifting && !wasDrift) SND.chirp();

    let grip = P.grip;
    if (eb) grip *= P.ebrakeGrip;
    else if (c.drifting) grip *= P.driftGrip;
    const tgt = vf >= 0 ? 0 : Math.PI * (sa >= 0 ? 1 : -1);
    // tyre saturation: past ~70° off the travel direction the tyres are
    // fully sliding and can't pull the car straight any more — this is
    // what lets an overcooked e-brake flick actually swap ends (SPIN!).
    // Deviation is measured from tgt, so reverse driving is unaffected.
    const sat = clamp((Math.abs(sa - tgt) - satStart) / satRamp, 0, 1);
    grip *= 1 - 0.92 * sat;
    sa = tgt + (sa - tgt) * Math.exp(-grip * dt);
    if (eb) sp -= sp * 0.55 * dt;
    if (c.drifting) sp -= sp * P.driftFriction * Math.abs(Math.sin(sa)) * dt;
    vf = Math.cos(sa) * sp;
    vr = Math.sin(sa) * sp;

    // steering + slide yaw (countersteer emerges naturally)
    const sf = clamp(speed / 230, 0, 1) * (1 - clamp(speed / (P.maxSpeed * 1.5), 0, 0.32));
    let yaw = c.steer * P.turn * sf;
    if (c.drifting) yaw += c.steer * P.driftTurn * clamp(Math.abs(slip) / 0.9, 0, 1);
    yaw += clamp(vr * 0.0035, -1, 1) * P.slideYaw;
    // reversed steering geometry only while genuinely BACKING UP —
    // flipping mid-spin (vf dips negative past 90° of slip) created a
    // dynamic barrier at ~1.6 rad that made spin-outs unreachable
    if (vf < -5 && Math.abs(sa) > 2.6) yaw = -yaw;
    c.h += yaw * dt;
    // handbrake flick to initiate the drift
    if (eb && !c.prevEb && speed > 150 && Math.abs(c.steer) > 0.25)
      c.h += Math.sign(c.steer) * P.kick;
    c.prevEb = eb;

    // recompose velocity in the PRE-rotation frame: heading turning ahead
    // of the velocity vector is exactly what creates slip next frame.
    c.vx = cos * vf - sin * vr;
    c.vy = sin * vf + cos * vr;
    const c2 = Math.cos(c.h), s2 = Math.sin(c.h);

    // weight transfer for the stacked-sprite lean
    c.pitch = lerp(c.pitch, brk + (eb ? 0.4 : 0) - c.inThr * 0.55, clamp(dt * 6, 0, 1));
    c.flash = Math.max(0, c.flash - dt);

    // progress + surface (soft-fail off-track)
    const ns = nearestSample(c.x, c.y, c.prog, 60);
    c.prog = ns.i;
    const hw = TRACK.pts[ns.i].w / 2;
    let off = ns.d > hw, deep = ns.d > hw + 80;
    if (off && anyOnTrack(c.x, c.y)) { off = false; deep = false; } // fig-8 branch
    c.off = off; c.deep = deep;
    c.wallZone = !off && c.drifting && speed > 150 && (hw - ns.d) < 36 && (hw - ns.d) > 0;
    if (off) {
      const drag = deep ? 2.8 : 1.5;
      c.vx -= c.vx * drag * dt; c.vy -= c.vy * drag * dt;
      if (speed > 70 && Math.random() < dt * 26) spawnDust();
      G.shake = Math.max(G.shake, deep ? 2.6 : 1.4);
    }
    c.x += c.vx * dt; c.y += c.vy * dt;
    c.x = clamp(c.x, 24, TRACK.worldW - 24);
    c.y = clamp(c.y, 24, TRACK.worldH - 24);
    c.speed = Math.hypot(c.vx, c.vy);
    c.slip = slip;
    c.roll = lerp(c.roll, clamp(vr / 220, -1, 1), clamp(dt * 8, 0, 1));

    // skid marks + smoke at the rear wheels
    const bx = c.x - c2 * 13.8, by = c.y - s2 * 13.8;
    const wl = { x: bx + s2 * 8.6, y: by - c2 * 8.6 };
    const wr = { x: bx - s2 * 8.6, y: by + c2 * 8.6 };
    const skidding = (c.drifting || (eb && speed > 110)) && !off;
    if (skidding && c.pwl) {
      mctx.strokeStyle = 'rgba(22,20,30,0.5)';
      mctx.lineWidth = 5.2; mctx.lineCap = 'round';
      mctx.beginPath();
      mctx.moveTo(c.pwl.x, c.pwl.y); mctx.lineTo(wl.x, wl.y);
      mctx.moveTo(c.pwr.x, c.pwr.y); mctx.lineTo(wr.x, wr.y);
      mctx.stroke();
    }
    c.pwl = wl; c.pwr = wr;
    if (c.drifting && !off) {
      const inten = clamp(Math.abs(slip) / 0.8, 0, 1) * clamp(speed / 300, 0, 1.2);
      c.smokeAcc += inten * dt * 46;
      let side = 0;
      while (c.smokeAcc > 1) {
        c.smokeAcc--;
        const w = (side++ & 1) ? wl : wr;
        spawnSmokeAt(w.x, w.y, inten);
      }
    }

    // spin-out drops the combo (more forgiving in v2)
    if (Math.abs(slip) > 2.35 && speed > 80 && !c.spinLock) {
      c.spinLock = true;
      if (score.chain > 1) addPop(c.x, c.y - 30, 'SPIN! スピン', '#ff6a6a', 20);
      score.chain = 0; score.mult = 1; score.chainT = 0; score.grace = 0;
      score.wallCalled = false;
      SND.beep(160, 0.25, 'sawtooth', 0.06);
      rumble(0.75, 180);
    }
    if (Math.abs(slip) < 0.5) c.spinLock = false;
  }

  // ---------------------------------------------- per-frame play update
  function updatePlay(dt) {
    // fixed-ish 120 Hz substeps: integration error stays constant from
    // 30 to 144 Hz displays, and identical wall-time inputs give
    // identical trajectories (fair time-attack across devices).
    const steps = Math.max(1, Math.ceil(dt * 120 - 1e-6));  // eps: float dt
    const hh = dt / steps;
    for (let i = 0; i < steps; i++) stepCar(hh);

    // drift scoring: angle x speed x duration, chained combos
    // (spinLock gates accrual — a spin must not instantly re-chain)
    if (car.drifting && !car.spinLock && !car.off && car.speed > 105) {
      score.grace = 1.3;
      score.chainT += dt;
      const m = 1 + Math.min(8, Math.floor(score.chainT / 2.0));
      if (m > score.mult) {
        score.mult = m;
        if (m === 3) { setCallout('NICE DRIFT!', 'いいぞ！'); SND.callout(); }
        if (m === 5) { setCallout('ONI DRIFT!', '鬼ドリ！'); SND.callout(); }
        if (m === 7) { setCallout('KANSEI DORIFTO!!', '慣性ドリフト!!'); SND.callout(); }
      }
      const angleF = clamp(Math.abs(car.slip) / 1.05, 0, 1);
      const speedF = clamp(car.speed / 500, 0, 1.2);
      score.chain += 360 * angleF * speedF * dt;
      // wall-run bonus: drifting tight to the edge
      if (car.wallZone) {
        score.chain += 260 * dt;
        car.wallT += dt;
        if (!score.wallCalled && car.wallT > 0.4) {
          score.wallCalled = true;
          setCallout('WALL RUN!', '壁ドリ！'); SND.callout();
        }
      } else car.wallT = 0;
    } else if (score.grace > 0) {
      score.grace -= dt;
      if (score.grace <= 0 && score.chain > 1) {
        const banked = Math.round(score.chain * score.mult);
        score.total += banked;
        score.best = Math.max(score.best, banked);
        if (banked > (SAVE.data.bestChain || 0)) SAVE.set('bestChain', banked);
        rumble(0.3, 90);
        addPop(car.x, car.y - 34, '+' + banked.toLocaleString(), '#ffd166', 18);
        if (score.mult >= 4) petalBurst(car.x, car.y, 26);
        SND.bank();
        score.chain = 0; score.mult = 1; score.chainT = 0;
        score.wallCalled = false; car.wallT = 0;
      }
    }

    // lap / checkpoint / ghost logic
    lap.run += dt; lap.cur += dt;
    const frac = ((car.prog - TRACK.startIdx + TRACK.N) % TRACK.N) / TRACK.N;
    const cps = [0.25, 0.5, 0.75];
    for (let i = 0; i < 3; i++)
      if (!car.deep && Math.abs(frac - cps[i]) < 0.02) lap.cp |= (1 << i);
    const df = frac - lap.prevFrac;
    const wrapped = lap.prevFrac > 0.85 && frac < 0.15;
    const backWrap = lap.prevFrac < 0.15 && frac > 0.85;
    // frame-rate independent: compare the wrap-corrected progress RATE.
    // prog is sample-quantised, so zero-df frames HOLD the accumulator
    // instead of decaying it (decay-on-zero starved detection entirely
    // at high refresh rates and while reversing slowly).
    const rate = (df + (wrapped ? 1 : 0) - (backWrap ? 1 : 0)) / dt;
    if (car.speed > 90 && rate < -0.02) G.wrong = Math.min(G.wrong + dt, 3);
    else if (rate > 0.005 || car.speed <= 90) G.wrong = Math.max(0, G.wrong - dt * 2);
    if (wrapped) {
      if (lap.cp === 7) {
        lap.count++; lap.last = lap.cur;
        if (G.mode === 'tt') {
          if (lap.best == null || lap.cur < lap.best) {
            lap.best = lap.cur; lap.ghost = lap.rec; lap.gspec = car.spec;
            SAVE.data.bestLap = lap.best;
            SAVE.data.ghost = encGhost(lap.rec, car.spec.id);
            SAVE.write();
            addPop(car.x, car.y - 46, 'NEW RECORD! 新記録', '#7dffb0', 20);
            SND.callout();
          } else {
            addPop(car.x, car.y - 46, fmtT(lap.cur), '#cfd8ff', 17);
          }
        }
      }
      lap.cur = 0; lap.rec = []; lap.gi = 0; lap.cp = 0;
    }
    lap.prevFrac = frac;
    if (G.mode === 'tt') {
      lap.rec.push({ t: lap.cur, x: car.x, y: car.y, h: car.h });
      if (lap.rec.length > 60 * 240) lap.rec.shift();
    }

    // camera: velocity look-ahead + speed zoom
    const look = 0.5;
    const k = clamp(dt * 3.2, 0, 1);
    cam.x = lerp(cam.x, car.x + car.vx * look, k);
    cam.y = lerp(cam.y, car.y + car.vy * look, k);
    const small = Math.min(W, H) < 560 ? 0.8 : 1;
    const zT = clamp(1.40 - (car.speed / car.spec.phys.maxSpeed) * 0.36, 1.02, 1.40) * small;
    cam.z = lerp(cam.z, zT, clamp(dt * 2, 0, 1));
    G.shake = Math.max(0, G.shake - dt * 6);

    fadeMarks(dt);
    updateParticles(dt);
  }

  // ---------------------------------------------- drawing helpers
  const FONT = (w, s) =>
    w + ' ' + s + 'px system-ui, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif';
  function txt(g, str, x, y, size, color, align = 'center', weight = 700, glow = 0, glowCol) {
    g.save();
    g.font = FONT(weight, size);
    g.textAlign = align; g.textBaseline = 'middle';
    if (glow > 0) { g.shadowColor = glowCol || color; g.shadowBlur = glow; }
    g.fillStyle = color;
    g.fillText(str, x, y);
    if (glow > 0) g.fillText(str, x, y);
    g.restore();
  }
  function rr(g, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    g.beginPath();
    g.moveTo(x + r, y);
    g.arcTo(x + w, y, x + w, y + h, r);
    g.arcTo(x + w, y + h, x, y + h, r);
    g.arcTo(x, y + h, x, y, r);
    g.arcTo(x, y, x + w, y, r);
    g.closePath();
  }
  function panel(g, x, y, w, h, stroke, glow) {
    g.save();
    rr(g, x, y, w, h, 14);
    g.fillStyle = 'rgba(18,10,32,0.82)';
    g.fill();
    if (stroke) {
      g.shadowColor = glow || stroke; g.shadowBlur = glow ? 16 : 0;
      g.strokeStyle = stroke; g.lineWidth = 2; g.stroke();
    }
    g.restore();
  }

  // ---------------------------------------------- stacked-sprite cars
  // Five badge-free JDM legend silhouettes, ~45 x 21 world px, facing +x.
  // Rendered as stacked height slabs with per-layer parallax offsets, so
  // the body reads as a 3D shell that leans in drifts and dips on brakes.
  function bodyPath(g, id) {
    g.beginPath();
    if (id === 'fd') {              // curvy rotary coupe
      g.moveTo(21.1, -6.0);
      g.quadraticCurveTo(23.5, 0, 21.1, 6.0);
      g.bezierCurveTo(16.2, 9.2, 11.4, 10.2, 4.8, 10.7);
      g.bezierCurveTo(-2.4, 10.9, -11.4, 10.7, -16.8, 9.8);
      g.bezierCurveTo(-20.8, 9.1, -22.2, 7.6, -22.2, 4.1);
      g.quadraticCurveTo(-22.9, 0, -22.2, -4.1);
      g.bezierCurveTo(-22.2, -7.6, -20.8, -9.1, -16.8, -9.8);
      g.bezierCurveTo(-11.4, -10.7, -2.4, -10.9, 4.8, -10.7);
      g.bezierCurveTo(11.4, -10.2, 16.2, -9.2, 21.1, -6.0);
    } else if (id === 'ae86') {     // boxy hatch, chamfered nose
      g.moveTo(21.2, -8.0);
      g.quadraticCurveTo(22.3, -8.2, 22.3, -6.4);
      g.lineTo(22.3, 6.4);
      g.quadraticCurveTo(22.3, 8.2, 21.2, 8.0);
      g.lineTo(12.6, 9.6);
      g.lineTo(-16.2, 10.0);
      g.quadraticCurveTo(-22.0, 10.0, -22.0, 7.1);
      g.lineTo(-22.0, -7.1);
      g.quadraticCurveTo(-22.0, -10.0, -16.2, -10.0);
      g.lineTo(12.6, -9.6);
      g.closePath();
    } else if (id === 'r34') {      // muscular box with flared arches
      g.moveTo(21.6, -7.6);
      g.quadraticCurveTo(22.8, -7.8, 22.8, -5.6);
      g.lineTo(22.8, 5.6);
      g.quadraticCurveTo(22.8, 7.8, 21.6, 7.6);
      g.lineTo(15.5, 9.4);
      g.quadraticCurveTo(12.5, 10.8, 9.0, 10.2);
      g.lineTo(-8.5, 10.0);
      g.quadraticCurveTo(-12.5, 11.2, -17.0, 10.4);
