      g.quadraticCurveTo(-21.8, 9.7, -21.8, 6.4);
      g.lineTo(-21.8, -6.4);
      g.quadraticCurveTo(-21.8, -9.7, -17.0, -10.4);
      g.quadraticCurveTo(-12.5, -11.2, -8.5, -10.0);
      g.lineTo(9.0, -10.2);
      g.quadraticCurveTo(12.5, -10.8, 15.5, -9.4);
      g.closePath();
    } else if (id === 'a80') {      // rounded muscular, long nose, fat tail
      g.moveTo(22.0, -5.2);
      g.quadraticCurveTo(24.0, 0, 22.0, 5.2);
      g.bezierCurveTo(17.5, 8.6, 12.5, 9.8, 6.0, 10.4);
      g.bezierCurveTo(-2.0, 10.9, -12.0, 10.8, -17.5, 9.9);
      g.bezierCurveTo(-21.5, 9.2, -22.6, 7.4, -22.6, 4.4);
      g.quadraticCurveTo(-23.2, 0, -22.6, -4.4);
      g.bezierCurveTo(-22.6, -7.4, -21.5, -9.2, -17.5, -9.9);
      g.bezierCurveTo(-12.0, -10.8, -2.0, -10.9, 6.0, -10.4);
      g.bezierCurveTo(12.5, -9.8, 17.5, -8.6, 22.0, -5.2);
    } else {                        // s15 wedge notchback
      g.moveTo(21.6, -6.8);
      g.quadraticCurveTo(22.6, 0, 21.6, 6.8);
      g.bezierCurveTo(17.4, 8.9, 13.2, 9.6, 8.4, 10.0);
      g.bezierCurveTo(1.2, 10.6, -8.4, 10.6, -15.0, 9.8);
      g.bezierCurveTo(-19.8, 9.4, -22.1, 8.9, -22.1, 5.9);
      g.quadraticCurveTo(-22.8, 0, -22.1, -5.9);
      g.bezierCurveTo(-22.1, -8.9, -19.8, -9.4, -15.0, -9.8);
      g.bezierCurveTo(-8.4, -10.6, 1.2, -10.6, 8.4, -10.0);
      g.bezierCurveTo(13.2, -9.6, 17.4, -8.9, 21.6, -6.8);
    }
  }
  // greenhouse geometry per model
  const HOUSE = {
    ae86: { x0: -15.1, x1: 8.3, hw: 8.4, r: 3.1, rx0: -6.7, rx1: 3.1, rhw: 7.4 },
    s15:  { x0: -12.5, x1: 9.1, hw: 8.5, r: 3.8, rx0: -5.8, rx1: 3.8, rhw: 7.4 },
    fd:   { x0: -11.8, x1: 7.9, hw: 8.3, r: 5.5, rx0: -5.5, rx1: 2.6, rhw: 6.5 },
    r34:  { x0: -13.9, x1: 9.6, hw: 8.6, r: 3.4, rx0: -6.2, rx1: 3.4, rhw: 7.5 },
    a80:  { x0: -12.2, x1: 8.6, hw: 8.4, r: 5.0, rx0: -5.6, rx1: 3.0, rhw: 6.7 }
  };
  function headlight(g, x, y, w, h, col) {
    g.save();
    g.shadowColor = '#ffd88a'; g.shadowBlur = 9;
    rr(g, x, y, w, h, 0.8);
    g.fillStyle = col; g.fill();
    g.restore();
  }
  function deckDetails(g, spec, brakeCol, brakeGlow) {
    const id = spec.id;
    g.save(); g.globalAlpha = 0.12; g.fillStyle = '#fff';
    g.beginPath(); g.ellipse(1.8, 0, 16, 4.1, 0, 0, TAU); g.fill();
    g.restore();
    if (id === 'ae86') {
      // panda scheme: black hood + lower stripes, pop-up seams
      g.beginPath();
      g.moveTo(11.5, -8.9); g.lineTo(20.9, -7.3); g.lineTo(20.9, 7.3); g.lineTo(11.5, 8.9);
      g.closePath(); g.fillStyle = '#17171d'; g.fill();
      g.fillStyle = '#17171d';
      g.fillRect(-16.2, 8.3, 27.5, 1.7);
      g.fillRect(-16.2, -10.0, 27.5, 1.7);
      g.strokeStyle = 'rgba(255,255,255,0.25)'; g.lineWidth = 0.6;
      g.strokeRect(15.4, -7.6, 4.4, 3.4); g.strokeRect(15.4, 4.2, 4.4, 3.4);
      headlight(g, 17.3, -7.0, 3.2, 3.1, '#fff1c8');
      headlight(g, 17.3, 3.9, 3.2, 3.1, '#fff1c8');
      g.save(); g.shadowColor = '#ff2e44'; g.shadowBlur = brakeGlow;
      g.fillStyle = brakeCol;
      rr(g, -21.8, -8.0, 1.9, 16.0, 0.6); g.fill();
      g.restore();
      g.fillStyle = 'rgba(0,0,0,0.55)';
      g.fillRect(-21.7, -0.9, 1.7, 1.8);
    } else if (id === 's15') {
      g.strokeStyle = 'rgba(0,0,0,0.28)'; g.lineWidth = 0.7;
      g.beginPath();
      g.moveTo(19.9, -5.0); g.lineTo(10.8, -7.9);
      g.moveTo(19.9, 5.0); g.lineTo(10.8, 7.9);
      g.moveTo(10.8, -7.9); g.quadraticCurveTo(11.9, 0, 10.8, 7.9);
      g.stroke();
      // boomerang projector lamps
      g.save(); g.shadowColor = '#ffd88a'; g.shadowBlur = 9; g.fillStyle = '#ffedc2';
      g.beginPath(); g.moveTo(20.8, -6.4); g.lineTo(13.9, -8.6); g.lineTo(15.4, -5.4); g.lineTo(20.4, -4.2); g.closePath(); g.fill();
      g.beginPath(); g.moveTo(20.8, 6.4); g.lineTo(13.9, 8.6); g.lineTo(15.4, 5.4); g.lineTo(20.4, 4.2); g.closePath(); g.fill();
      g.restore();
      g.save(); g.shadowColor = '#ff2e44'; g.shadowBlur = brakeGlow; g.fillStyle = brakeCol;
      rr(g, -22.0, -8.0, 2.0, 5.2, 0.6); g.fill();
      rr(g, -22.0, 2.8, 2.0, 5.2, 0.6); g.fill();
      g.restore();
    } else if (id === 'fd') {
      // raised pop-up pods + hood vent
      for (const sy of [-1, 1]) {
        rr(g, 15.5, sy === -1 ? -7.1 : 3.4, 4.3, 3.7, 1.2);
        g.fillStyle = '#20222c'; g.fill();
        headlight(g, 16.0, sy === -1 ? -6.6 : 3.9, 3.3, 2.8, '#fff3cf');
      }
      rr(g, 11.5, -1.8, 3.1, 3.6, 1.4);
      g.fillStyle = 'rgba(0,0,0,0.5)'; g.fill();
      g.save(); g.shadowColor = '#ff2e44'; g.shadowBlur = brakeGlow; g.fillStyle = brakeCol;
      for (const sy of [-1, 1]) for (const yy of [3.1, 6.2]) {
        g.beginPath(); g.arc(-21.0, yy * sy, 1.5, 0, TAU); g.fill();
      }
      g.restore();
    } else if (id === 'r34') {
      // hood vents + intercooler mouth + the four round tails
      g.fillStyle = 'rgba(0,0,0,0.45)';
      rr(g, 13.9, -6.2, 5.0, 2.2, 0.8); g.fill();
      rr(g, 13.9, 4.0, 5.0, 2.2, 0.8); g.fill();
      rr(g, 21.0, -3.4, 1.6, 6.8, 0.6); g.fill();
      headlight(g, 18.2, -7.4, 3.6, 3.0, '#eaf4ff');
      headlight(g, 18.2, 4.4, 3.6, 3.0, '#eaf4ff');
      g.save(); g.shadowColor = '#ff2e44'; g.shadowBlur = brakeGlow; g.fillStyle = brakeCol;
      for (const sy of [-1, 1]) for (const yy of [3.4, 6.6]) {
        g.beginPath(); g.arc(-20.6, yy * sy, 1.7, 0, TAU); g.fill();
      }
      g.restore();
      g.strokeStyle = 'rgba(0,0,0,0.3)'; g.lineWidth = 0.6;
      g.beginPath(); g.moveTo(12.6, -8.6); g.quadraticCurveTo(13.6, 0, 12.6, 8.6); g.stroke();
    } else { // a80
      g.strokeStyle = 'rgba(0,0,0,0.28)'; g.lineWidth = 0.7;
      g.beginPath();
      g.moveTo(20.2, -4.6); g.lineTo(12.0, -8.2);
      g.moveTo(20.2, 4.6); g.lineTo(12.0, 8.2);
      g.stroke();
      g.save(); g.shadowColor = '#ffd88a'; g.shadowBlur = 9; g.fillStyle = '#ffedc2';
      g.beginPath(); g.ellipse(18.9, -6.2, 2.4, 2.0, -0.3, 0, TAU); g.fill();
      g.beginPath(); g.ellipse(18.9, 6.2, 2.4, 2.0, 0.3, 0, TAU); g.fill();
      g.restore();
      g.save(); g.shadowColor = '#ff2e44'; g.shadowBlur = brakeGlow; g.fillStyle = brakeCol;
      g.beginPath(); g.ellipse(-21.2, -5.4, 1.8, 2.4, 0, 0, TAU); g.fill();
      g.beginPath(); g.ellipse(-21.2, 5.4, 1.8, 2.4, 0, 0, TAU); g.fill();
      g.globalAlpha = 0.7;
      rr(g, -22.0, -3.0, 1.3, 6.0, 0.5); g.fill();
      g.restore();
    }
  }
  function wingDraw(g, spec, L) {
    const id = spec.id;
    if (id === 'ae86') {   // ducktail lip only
      const off = L(11);
      g.save(); g.translate(off.x, off.y);
      rr(g, -21.6, -8.6, 2.0, 17.2, 1);
      g.fillStyle = spec.accent; g.fill();
      g.restore();
      return;
    }
    const px = id === 'r34' ? -17.5 : -17.0;
    const wingH = id === 'r34' ? 17.5 : (id === 'a80' ? 18.5 : 15.5);
    const span = id === 'r34' ? 9.4 : (id === 'a80' ? 9.8 : 8.6);
    for (const sy of [-1, 1]) {
      const off = L(12);
      g.save(); g.translate(off.x, off.y);
      g.fillStyle = '#1a1c24';
      g.fillRect(px - 0.9, sy * (span - 2.4) - 0.9, 1.8, 1.8);
      g.restore();
    }
    const off = L(wingH);
    g.save(); g.translate(off.x, off.y);
    rr(g, px - 2.2, -span, 4.4, span * 2, 1.6);
    g.fillStyle = spec.accent; g.fill();
    g.strokeStyle = 'rgba(255,255,255,0.15)'; g.lineWidth = 0.6; g.stroke();
    g.fillStyle = '#22242c';
    g.fillRect(px - 2.8, -span - 0.8, 5.6, 1.2);
    g.fillRect(px - 2.8, span - 0.4, 5.6, 1.2);
    g.restore();
  }

  // main stacked renderer. o.lift(h) supplies the LOCAL-frame parallax
  // offset per height unit; roll/pitch add body lean on top.
  function drawCarStacked(g, spec, o = {}) {
    const steer = o.steer || 0, roll = o.roll || 0, pitch = o.pitch || 0;
    const lift = o.lift || (() => ({ x: 0, y: 0 }));
    const L = h => {
      const p = lift(h);
      return { x: p.x + pitch * h * 0.14, y: p.y + roll * h * 0.34 };
    };
    const brakeCol = o.brake ? '#ff5560' : '#c92634';
    const brakeGlow = o.brake ? 16 : 7;
    g.save();
    if (o.alpha != null) g.globalAlpha = o.alpha;

    // ground shadow — offset fixed in WORLD space (dusk-sun direction),
    // rotated into the car's local frame via its heading
    const hdg = o.hdg || 0;
    const shx = Math.cos(-hdg) * 1.6 - Math.sin(-hdg) * 2.1;
    const shy = Math.sin(-hdg) * 1.6 + Math.cos(-hdg) * 2.1;
    g.fillStyle = 'rgba(10,6,18,0.38)';
    g.beginPath(); g.ellipse(shx, shy, 23.5, 12, 0, 0, TAU); g.fill();

    // wheels (front pair steers)
    {
      const off = L(1.5);
      g.save(); g.translate(off.x, off.y);
      const wp = [[13.2, -8.8], [13.2, 8.8], [-13.8, -8.8], [-13.8, 8.8]];
      for (let i = 0; i < 4; i++) {
        g.save();
        g.translate(wp[i][0], wp[i][1]);
        if (i < 2) g.rotate(steer * 0.42);
        g.fillStyle = '#14141b';
        g.fillRect(-4.3, -2.4, 8.6, 4.8);
        g.fillStyle = '#2e3138';
        g.fillRect(-1, -2.1, 2, 4.2);
        g.restore();
      }
      g.restore();
    }

    // stacked body slabs — the 3D shell
    for (let k = 0; k < 5; k++) {
      const h = 2.2 + k * 1.9;
      const off = L(h);
      g.save(); g.translate(off.x, off.y);
      bodyPath(g, spec.id);
      g.fillStyle = k === 4 ? spec.body : mixCol(spec.body2, spec.body, k / 4);
      g.fill();
      if (k === 4) { g.strokeStyle = 'rgba(8,8,14,0.5)'; g.lineWidth = 0.9; g.stroke(); }
      g.restore();
    }

    // deck details + lights on the top slab
    {
      const off = L(9.8);
      g.save(); g.translate(off.x, off.y);
      deckDetails(g, spec, brakeCol, brakeGlow);
      g.restore();
    }

    // greenhouse slabs + roof cap
    const HS = HOUSE[spec.id];
    for (let k = 0; k < 3; k++) {
      const h = 10 + k * 1.6;
      const off = L(h);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.x0, -HS.hw, HS.x1 - HS.x0, HS.hw * 2, HS.r);
      g.fillStyle = k === 2 ? '#1a2130' : '#10151f';
      g.fill();
      if (k === 2) {
        g.save(); g.globalAlpha = 0.4; g.fillStyle = '#9fd0ff';
        g.fillRect(HS.x1 - 2.6, -HS.hw + 1.4, 1.5, HS.hw * 2 - 2.8);
        g.restore();
      }
      g.restore();
    }
    {
      const off = L(15);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.rx0, -HS.rhw, HS.rx1 - HS.rx0, HS.rhw * 2, HS.r * 0.8);
      g.fillStyle = spec.body; g.fill();
      g.strokeStyle = 'rgba(0,0,0,0.32)'; g.lineWidth = 0.6; g.stroke();
      g.restore();
    }

    // mirrors
    {
      const off = L(11);
      g.save(); g.translate(off.x, off.y);
      rr(g, HS.x1 - 1.5, -HS.hw - 1.9, 2.0, 1.3, 0.4); g.fillStyle = '#20222c'; g.fill();
      rr(g, HS.x1 - 1.5, HS.hw + 0.6, 2.0, 1.3, 0.4); g.fill();
      g.restore();
    }

    wingDraw(g, spec, L);

    // exhaust tip + lift-off backfire flash
    {
      const off = L(3);
      g.save(); g.translate(off.x, off.y);
      g.fillStyle = '#3a3f4a';
      g.beginPath(); g.arc(-22.4, 5.6, 1.1, 0, TAU); g.fill();
      if ((o.flash || 0) > 0) {
        g.save();
        g.globalAlpha = clamp(o.flash * 10, 0, 1);
        g.shadowColor = '#ff9a3d'; g.shadowBlur = 12;
        g.fillStyle = '#ffcf6e';
        g.beginPath(); g.ellipse(-24.6, 5.6, 3.4, 1.7, 0, 0, TAU); g.fill();
        g.restore();
      }
      g.restore();
    }
    g.restore();
  }

  // interpolated ghost sample at the current lap time — records are
  // 15-60 Hz depending on source, lerping removes the visible stepping.
  function ghostPos() {
    const gh = lap.ghost;
    if (!gh || gh.length < 2) return null;
    while (lap.gi < gh.length - 1 && gh[lap.gi + 1].t < lap.cur) lap.gi++;
    while (lap.gi > 0 && gh[lap.gi].t > lap.cur) lap.gi--;
    const a = gh[Math.min(lap.gi, gh.length - 1)];
    const b = gh[Math.min(lap.gi + 1, gh.length - 1)];
    const span = b.t - a.t;
    const k = span > 1e-6 ? clamp((lap.cur - a.t) / span, 0, 1) : 0;
    return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), h: a.h + angNorm(b.h - a.h) * k };
  }

  // world-space wrapper: converts the camera parallax into the car's
  // local frame so the whole stack leans away from screen centre.
  function drawCarWorld(g, x, y, h, spec, o) {
    const woX = (x - cam.x) * KZ, woY = (y - cam.y) * KZ;
    const ch = Math.cos(h), sh = Math.sin(h);
    o.hdg = h;
    o.lift = hh => ({ x: (woX * ch + woY * sh) * hh, y: (-woX * sh + woY * ch) * hh });
    g.save();
    g.translate(x, y); g.rotate(h);
    drawCarStacked(g, spec, o);
    g.restore();
  }

  // dusk headlight cones painted on the asphalt
  function drawBeams(c) {
    const ch = Math.cos(c.h), sh = Math.sin(c.h);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (const sy of [-1, 1]) {
      const nx = c.x + ch * 20 - sh * sy * 6.5;
      const ny = c.y + sh * 20 + ch * sy * 6.5;
      const fx = nx + ch * 175, fy = ny + sh * 175;
      const grd = ctx.createLinearGradient(nx, ny, fx, fy);
      grd.addColorStop(0, 'rgba(255,235,190,0.16)');
      grd.addColorStop(1, 'rgba(255,235,190,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(nx, ny);
      ctx.lineTo(fx - sh * 27, fy + ch * 27);
      ctx.lineTo(fx + sh * 27, fy - ch * 27);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // ---------------------------------------------- world render pass
  function renderWorld() {
    const s = DPR * cam.z;
    const jx = G.shake > 0 ? (Math.random() * 2 - 1) * G.shake * 5 : 0;
    const jy = G.shake > 0 ? (Math.random() * 2 - 1) * G.shake * 5 : 0;
    ctx.setTransform(s, 0, 0, s, W / 2 * DPR, H / 2 * DPR);
    ctx.translate(-cam.x + jx, -cam.y + jy);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(bg, 0, 0);
    ctx.drawImage(marks, 0, 0);

    // dust (flat, on the grass)
    for (const p of dust) {
      ctx.globalAlpha = 0.30 * (p.life / p.max);
      ctx.fillStyle = '#b99a6f';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;

    const inRace = car && (G.state === 'count' || G.state === 'play' || G.state === 'pause');

    // headlight pools on the asphalt, under everything tall
    if (inRace) drawBeams(car);

    // depth-sorted draw list: props + ghost + player, painter far→near
    const vw = W / cam.z / 2 + 240, vh = H / cam.z / 2 + 240;
    const list = [];
    for (const pr of props) {
      if (Math.abs(pr.cx - cam.x) > vw + pr.cr || Math.abs(pr.cy - cam.y) > vh + pr.cr) continue;
      const d = pr.bias != null ? pr.bias : ((pr.cx - cam.x) ** 2 + (pr.cy - cam.y) ** 2);
      list.push({ d, draw: pr.draw });
    }
    lastGhostPos = null;
    if (car && (G.state === 'play' || G.state === 'pause') && G.mode === 'tt') {
      const gp2 = ghostPos();
      if (gp2) {
        lastGhostPos = gp2;
        const gs = lap.gspec || car.spec;   // ghost keeps the car it was set in
        list.push({
          d: (gp2.x - cam.x) ** 2 + (gp2.y - cam.y) ** 2,
          draw: g => drawCarWorld(g, gp2.x, gp2.y, gp2.h, gs, { alpha: 0.34, glow: false })
        });
      }
    }
    if (inRace) {
      list.push({
        d: (car.x - cam.x) ** 2 + (car.y - cam.y) ** 2,
        draw: g => drawCarWorld(g, car.x, car.y, car.h, car.spec, {
          steer: car.steer, roll: car.roll, pitch: car.pitch,
          brake: car.brakeOn || car.inEb, glow: true, flash: car.flash
        })
      });
    }
    list.sort((a, b) => b.d - a.d);
    for (const it of list) it.draw(ctx);

    // tyre smoke rises above the cars
    for (const p of smoke) {
      const a = p.life / p.max;
      const l = liftW(p.x, p.y, (1 - a) * 26);
      ctx.globalAlpha = 0.24 * a;
      ctx.fillStyle = '#e8e3ef';
      ctx.beginPath(); ctx.arc(l.x, l.y, p.size * (1.6 - a * 0.6), 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // sakura petals falling through the air
    for (const p of petals) {
      const a = clamp(p.life / p.max, 0, 1);
      const l = liftW(p.x, p.y, p.z);
      ctx.save();
      ctx.globalAlpha = (p.amb ? 0.75 : 0.9) * Math.min(1, a * 3);
      ctx.translate(l.x, l.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.amb ? '#ffb7d5' : '#ff9ecb';
      ctx.beginPath(); ctx.ellipse(0, 0, p.s, p.s * 0.55, 0, 0, TAU); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // score popups (world space)
    for (const p of pops) {
      const a = clamp(1.5 - p.t, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      txt(ctx, p.txt, p.x, p.y, p.size, p.color, 'center', 800, 10);
      ctx.restore();
    }
  }

  // dusk atmosphere + vignette (screen space)
  function skyOverlay() {
    const g1 = ctx.createLinearGradient(0, 0, 0, H);
    g1.addColorStop(0, 'rgba(255,118,168,0.15)');
    g1.addColorStop(0.42, 'rgba(255,150,92,0.05)');
    g1.addColorStop(1, 'rgba(38,10,62,0.24)');
    ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.42, W / 2, H / 2, Math.max(W, H) * 0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(18,5,38,0.5)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }

  // anime speed lines during hard drifts
  function drawSpeedLines() {
    if (!car) return;
    const it = clamp((Math.abs(car.slip) - 0.38) / 0.5, 0, 1) * clamp((car.speed - 220) / 260, 0, 1);
    if (it <= 0.02) return;
    ctx.save();
    ctx.strokeStyle = '#fff';
    const cx = W / 2, cy = H / 2, R = Math.hypot(W, H) / 2;
    const n = Math.round(6 + it * 12);
    for (let i = 0; i < n; i++) {
      const a = rnd(TAU);
      const r1 = R * rnd(0.6, 1.0);
      const r2 = r1 - rnd(50, 170) * it;
      ctx.globalAlpha = rnd(0.04, 0.13) * it;
      ctx.lineWidth = rnd(1, 2.6);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
      ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ---------------------------------------------- HUD
  function drawHUD() {
    if (!car) return;
    const kmh = Math.round(car.speed * 0.35);

    // speed + gear + rpm + boost (top-left cluster)
    ctx.save();
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.font = FONT(800, 44);
    ctx.shadowColor = car.drifting ? '#ff7ab8' : '#55e0ff';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#fff';
    ctx.fillText(kmh, 22, 56);
    ctx.shadowBlur = 0;
    ctx.font = FONT(700, 14);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText('km/h · 速度', 24, 76);
    // gear + rpm bar
    ctx.font = FONT(900, 20);
    ctx.fillStyle = '#ffd166';
    ctx.fillText('G' + car.gear, 24, 102);
    const rb = clamp(car.rpm, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(62, 90, 110, 8);
    ctx.fillStyle = rb > 0.92 ? '#ff5a5a' : '#9fe8ff';
    ctx.fillRect(62, 90, 110 * rb, 8);
    // boost gauge for turbo cars
    if (car.spec.eng.turbo > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(62, 102, 110, 5);
      ctx.fillStyle = '#55e0ff';
      ctx.fillRect(62, 102, 110 * clamp(SND.boost, 0, 1), 5);
      ctx.font = FONT(700, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText('BOOST', 176, 109);
    }
    if (car.drifting) txt(ctx, 'DRIFT!', 52, 128, 15, '#ff7ab8', 'center', 800, 12);
    if (car.off) txt(ctx, 'コースアウト off track', 92, car.drifting ? 148 : 128, 12, '#ffb14d', 'center', 700, 6);
    ctx.restore();

    // score (top-right)
    ctx.save();
    txt(ctx, 'スコア SCORE', W - 22, 26, 13, 'rgba(255,255,255,0.75)', 'right');
    txt(ctx, score.total.toLocaleString(), W - 22, 54, 30, '#ffd166', 'right', 800, 12);
    if (score.chain > 0) {
      const c = score.mult >= 5 ? '#ff7ab8' : (score.mult >= 3 ? '#ffb14d' : '#9fe8ff');
      txt(ctx, '+' + Math.round(score.chain).toLocaleString() + '  ×' + score.mult,
        W - 22, 86, 22, c, 'right', 800, 14);
      const bw = 150, bx = W - 22 - bw, by = 100;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(bx, by, bw, 5);
      ctx.shadowColor = c; ctx.shadowBlur = 8; ctx.fillStyle = c;
      ctx.fillRect(bx + bw * (1 - clamp(score.grace / 1.3, 0, 1)), by,
        bw * clamp(score.grace / 1.3, 0, 1), 5);
    }
    ctx.restore();

    // lap board (bottom-left, time attack)
    if (G.mode === 'tt') {
      const bx = 18, by = H - 108;
      panel(ctx, bx, by, 205, 92, 'rgba(85,224,255,0.5)');
      txt(ctx, 'タイムアタック TIME ATTACK', bx + 12, by + 16, 11, '#9fe8ff', 'left');
      txt(ctx, 'LAP ' + (lap.count + 1) + '   ' + fmtT(lap.cur), bx + 12, by + 38, 17, '#fff', 'left', 800);
      txt(ctx, 'BEST ' + fmtT(lap.best), bx + 12, by + 60, 13, '#7dffb0', 'left');
      txt(ctx, 'LAST ' + fmtT(lap.last), bx + 12, by + 78, 13, '#cfd8ff', 'left');
    } else {
      txt(ctx, 'フリー走行 FREESTYLE · BEST CHAIN ' + Math.round(Math.max(score.best, SAVE.data.bestChain || 0)).toLocaleString(),
        18 + 2, H - 22, 12, 'rgba(255,255,255,0.6)', 'left');
    }

    // combo callout (center)
    if (callout.t < 1.5 && callout.en) {
      const k = clamp(callout.t / 0.18, 0, 1);
      const sc = 0.6 + 0.4 * (1 - Math.pow(1 - k, 3));
      const a = callout.t > 1.1 ? clamp((1.5 - callout.t) / 0.4, 0, 1) : 1;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(W / 2, H * 0.3);
      ctx.scale(sc, sc);
      txt(ctx, callout.en, 0, -14, 42, '#ff7ab8', 'center', 900, 22);
      txt(ctx, callout.jp, 0, 26, 24, '#ffd166', 'center', 800, 14);
      ctx.restore();
    }

    drawMinimap();
    if (SND.muted)
      txt(ctx, 'ミュート MUTED · M', W / 2, 16, 11, 'rgba(255,255,255,0.55)', 'center', 800);

    // wrong way
    if (G.wrong > 0.7 && Math.floor(G.t * 3) % 2 === 0)
      txt(ctx, '逆走！ WRONG WAY', W / 2, H * 0.18, 30, '#ff5a5a', 'center', 900, 18);

    // controls hint
    if (lap.run < 6 && (!G.touch || pad.connected))
      txt(ctx, pad.connected || G.t - G.padT < 10
        ? 'STICK steer · RT gas · LT brake · A handbrake · Y respawn · START pause'
        : 'WASD/矢印 drive · SPACE handbrake · R respawn · ESC pause · M mute', W / 2, H - 20,
        12, 'rgba(255,255,255,0.55)');
  }

  function drawMinimap() {
    if (!car || H < 420) return;
    const w = W < 560 ? 110 : MMW;
    const h2 = mm.height * (w / mm.width);
    const x = W - w - 16, y = 118;
    ctx.save();
    ctx.globalAlpha = 0.92;
    rr(ctx, x - 8, y - 8, w + 16, h2 + 16, 10);
    ctx.fillStyle = 'rgba(18,10,32,0.55)';
    ctx.fill();
    ctx.drawImage(mm, x, y, w, h2);
    const k = w / TRACK.worldW;
    if (lastGhostPos) {
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.arc(x + lastGhostPos.x * k, y + lastGhostPos.y * k, 2.2, 0, TAU); ctx.fill();
    }
    ctx.shadowColor = car.spec.glow; ctx.shadowBlur = 6;
    ctx.fillStyle = car.spec.glow;
    ctx.beginPath(); ctx.arc(x + car.x * k, y + car.y * k, 3.2, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + car.x * k, y + car.y * k, 1.4, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // ---------------------------------------------- menus / overlays
  function drawCountdown() {
    const n = Math.ceil(G.cd);
    const f = G.cd - Math.floor(G.cd);
    ctx.save();
    ctx.globalAlpha = clamp(f * 2.2, 0, 1);
    const sc = 1 + (1 - f) * 0.5;
    ctx.translate(W / 2, H * 0.4);
    ctx.scale(sc, sc);
    if (n > 0) txt(ctx, n, 0, 0, 110, '#ffd166', 'center', 900, 30);
    else txt(ctx, 'GO! 行け！', 0, 0, 72, '#7dffb0', 'center', 900, 26);
    ctx.restore();
  }
  function drawPause() {
    ctx.fillStyle = 'rgba(10,4,22,0.62)';
    ctx.fillRect(0, 0, W, H);
    txt(ctx, 'ポーズ PAUSED', W / 2, H * 0.34, 42, '#fff', 'center', 900, 18, '#b06bff');
    const sndLbl = 'サウンド sound: ' + (SND.muted ? 'OFF' : 'ON');
    const items = touchControlsEnabled()
      ? [['tap here → resume', () => onPress('enter')],
         ['respawn リスポーン', () => onPress('reset')],
         [sndLbl, () => onPress('mute')],
         ['title タイトル', () => onPress('back')]]
      : pad.connected
      ? [['A / START resume · Y respawn', null],
         [sndLbl + ' · M', null],
         ['B title', null]]
      : [['ENTER resume · R respawn', null],
         [sndLbl + ' · M', null],
         ['BACKSPACE title', null]];
    let y = H * 0.48;
    for (const [label, act] of items) {
      if (act) {
        const bw = 300, bx = W / 2 - bw / 2;
        panel(ctx, bx, y - 22, bw, 44, 'rgba(255,255,255,0.4)');
        zones.push({ x: bx, y: y - 22, w: bw, h: 44, act });
      }
      txt(ctx, label, W / 2, y, 17, '#cfd8ff', 'center', 700);
      y += 56;
    }
  }

  // attract-mode camera: slow glide around the circuit behind the menus
  function menuDrift(dt) {
    // constant px/s glide: advance by arc length, not sample index —
    // Catmull-Rom sample spacing varies, indexed stepping surged/crawled
    G.menuD = (G.menuD || 0) + dt * 150;
    let i = G.menuI || 0;
    for (let guard = 0; guard < TRACK.N; guard++) {
      const p0 = TRACK.pts[i % TRACK.N], p1 = TRACK.pts[(i + 1) % TRACK.N];
      const seg = Math.hypot(p1.x - p0.x, p1.y - p0.y) || 1;
      if (G.menuD < seg) break;
      G.menuD -= seg; i++;
    }
    G.menuI = i % TRACK.N;
    const p = TRACK.pts[G.menuI];
    const k = clamp(dt * 1.2, 0, 1);
    cam.x = lerp(cam.x, p.x, k);
    cam.y = lerp(cam.y, p.y, k);
    cam.z = lerp(cam.z, 0.9, k);
  }

  function drawTitle() {
    ctx.fillStyle = 'rgba(14,5,28,0.45)';
    ctx.fillRect(0, 0, W, H);
    const cy = H * 0.36;
    const bob = Math.sin(G.t * 1.6) * 6;
    txt(ctx, '恵比寿サーキット', W / 2, cy - 66 + bob, Math.min(46, W * 0.085), '#ffd166', 'center', 900, 22);
    txt(ctx, 'EBISU CIRCUIT', W / 2, cy + bob, Math.min(64, W * 0.11), '#fff', 'center', 900, 26, '#ff5fb4');
    txt(ctx, 'ドリフト天国 · drift heaven', W / 2, cy + 52 + bob, 17, '#9fe8ff', 'center', 700, 10);
    txt(ctx, 'NEO 3D · 5 LEGENDS · ワイドコース', W / 2, cy + 82 + bob, 13, '#7dffb0', 'center', 800, 6);
    const bw = 260, bx = W / 2 - bw / 2, by = H * 0.66;
    const pulse = 0.6 + 0.4 * Math.sin(G.t * 3);
    panel(ctx, bx, by, bw, 54, 'rgba(255,209,102,' + pulse + ')', '#ffd166');
    txt(ctx, pad.connected ? 'A / START · スタート' : (G.touch ? 'タップ TAP TO START' : 'ENTER · スタート'),
      W / 2, by + 28, 19, '#ffd166', 'center', 900, 10);
    zones.push({ x: 0, y: 0, w: W, h: H, act: () => onPress('enter') });
    txt(ctx, 'sakura dusk · wall runs · gears & turbo', W / 2, H - 24, 12, 'rgba(255,255,255,0.5)');
  }

  function drawGarage() {
    ctx.fillStyle = 'rgba(14,5,28,0.55)';
    ctx.fillRect(0, 0, W, H);
    txt(ctx, 'ガレージ GARAGE', W / 2, H * 0.09, 28, '#fff', 'center', 900, 16, '#b06bff');
    const spec = CARS[G.sel];
    const cy = H * 0.33;
    const k = clamp(H / 640, 0.72, 1);        // compact rhythm on short screens
    const ck = clamp(H / 560, 0.7, 1);        // car preview shrink

    // turntable glow pad
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.shadowColor = spec.glow; ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(30,16,50,0.9)';
    ctx.beginPath(); ctx.ellipse(W / 2, cy + 22 * ck, 148 * ck, 42 * ck, 0, 0, TAU); ctx.fill();
    ctx.restore();

    // rotating stacked 3D preview — lean vector fixed in SCREEN space,
    // rotated into the car's local frame so the stack reads as a turntable
    const scl = Math.min(4.2, W / 270) * ck;
    const ang = G.t * 0.7;
    const vx = 0.75, vy = -0.6;
    const lx = vx * Math.cos(-ang) - vy * Math.sin(-ang);
    const ly = vx * Math.sin(-ang) + vy * Math.cos(-ang);
    ctx.save();
    ctx.translate(W / 2, cy);
    ctx.scale(scl, scl);
    ctx.rotate(ang);
    drawCarStacked(ctx, spec, {
      glow: true, hdg: ang,
      lift: h => ({ x: lx * h * 0.14, y: ly * h * 0.14 })
    });
    ctx.restore();

    txt(ctx, spec.name, W / 2, cy + 92 * k, 32, '#fff', 'center', 900, 14, spec.glow);
    txt(ctx, spec.jp + ' · ' + spec.tag, W / 2, cy + 120 * k, 13, '#ffb7d5', 'center', 800);

    // stat bars
    const rows = [['POWER', spec.stats.power], ['GRIP', spec.stats.grip], ['DRIFT', spec.stats.drift]];
    const bw2 = Math.min(300, W * 0.62);
    rows.forEach((r, ri) => {
      const by = cy + 146 * k + ri * 24 * k, bx = W / 2 - bw2 / 2;
      txt(ctx, r[0], bx, by, 11, 'rgba(255,255,255,0.7)', 'left', 800);
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.fillRect(bx + 58, by - 5, bw2 - 58, 8);
      ctx.save();
      ctx.shadowColor = spec.glow; ctx.shadowBlur = 8;
      ctx.fillStyle = spec.glow;
      ctx.fillRect(bx + 58, by - 5, (bw2 - 58) * (r[1] / 5), 8);
      ctx.restore();
    });
    txt(ctx, spec.desc, W / 2, cy + 226 * k, 13, '#cfd8ff', 'center', 700);

    // carousel dots
    for (let i = 0; i < CARS.length; i++) {
      ctx.fillStyle = i === G.sel ? CARS[i].glow : 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(W / 2 + (i - (CARS.length - 1) / 2) * 20, cy + 248 * k, i === G.sel ? 5 : 3.4, 0, TAU);
      ctx.fill();
    }

    // arrows
    const ar = 32;
    const arms = [
      [W / 2 - Math.min(250, W * 0.40), '◀', () => onPress('left')],
      [W / 2 + Math.min(250, W * 0.40), '▶', () => onPress('right')]
    ];
    for (const [sx, lbl, act] of arms) {
      panel(ctx, sx - ar, cy - ar, ar * 2, ar * 2, spec.glow);
      txt(ctx, lbl, sx, cy + 2, 22, '#fff', 'center', 900);
      zones.push({ x: sx - ar - 14, y: cy - ar - 14, w: ar * 2 + 28, h: ar * 2 + 28, act });
    }

    // select
    const bw = 220, bx2 = W / 2 - bw / 2, by2 = Math.min(H - 62, cy + 266 * k);
    panel(ctx, bx2, by2, bw, 46, '#ffd166', '#ffd166');
    txt(ctx, '決定 SELECT →', W / 2, by2 + 24, 17, '#ffd166', 'center', 900, 8);
    zones.push({ x: bx2, y: by2, w: bw, h: 46, act: () => onPress('enter') });
    if (pad.connected)
      txt(ctx, 'STICK/D-PAD choose · A select · B back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
    else if (!G.touch)
      txt(ctx, '◀ ▶ choose · ENTER select · ESC back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
  }

  function drawMode() {
    ctx.fillStyle = 'rgba(14,5,28,0.55)';
    ctx.fillRect(0, 0, W, H);
    txt(ctx, 'モード MODE', W / 2, H * 0.16, 28, '#fff', 'center', 900, 16, '#b06bff');
    const defs = [
      ['free', 'フリー走行', 'FREESTYLE', 'chain drifts, chase the combo'],
      ['tt', 'タイムアタック', 'TIME ATTACK', 'race your ghost for the lap record']
    ];
    const cw = Math.min(300, W * 0.42), ch = 168;
    const gap = Math.min(40, W * 0.04);
    const totW = cw * 2 + gap;
    let x = W / 2 - totW / 2;
    const y = H * 0.30;
    for (const [id, jp, en, desc] of defs) {
      const on = G.mode === id;
      panel(ctx, x, y, cw, ch, on ? '#ffd166' : 'rgba(255,255,255,0.25)', on ? '#ffd166' : null);
      txt(ctx, jp, x + cw / 2, y + 46, 22, on ? '#ffd166' : '#cfd8ff', 'center', 900, on ? 10 : 0);
      txt(ctx, en, x + cw / 2, y + 78, 17, '#fff', 'center', 800);
      wrapText(desc, x + cw / 2, y + 112, cw - 36, 13, 'rgba(255,255,255,0.7)');
      const id2 = id;
      zones.push({
        x, y, w: cw, h: ch,
        act: () => { if (G.mode === id2) onPress('enter'); else { G.mode = id2; SND.beep(520, 0.05, 'square', 0.045); } }
      });
      x += cw + gap;
    }
    const bw = 240, bx = W / 2 - bw / 2, by = y + ch + 44;
    panel(ctx, bx, by, bw, 48, '#7dffb0', '#7dffb0');
    txt(ctx, '発進 START →', W / 2, by + 25, 18, '#7dffb0', 'center', 900, 8);
    zones.push({ x: bx, y: by, w: bw, h: 48, act: () => onPress('enter') });
    if (pad.connected)
      txt(ctx, 'STICK/D-PAD switch · A start · B back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
    else if (!G.touch)
      txt(ctx, '◀ ▶ switch · ENTER start · ESC back', W / 2, H - 18, 12, 'rgba(255,255,255,0.55)');
  }
  function wrapText(str, cx, y, maxW, size, color) {
    ctx.font = FONT(700, size);
    const words = str.split(' ');
    let line = '', ly = y;
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && line) {
        txt(ctx, line, cx, ly, size, color, 'center', 700);
        line = w; ly += size + 5;
      } else line = test;
    }
    if (line) txt(ctx, line, cx, ly, size, color, 'center', 700);
  }

  function drawTouch() {
    if (!touchControlsEnabled() || !(G.state === 'play' || G.state === 'count')) return;
    layoutTouch();
    const st = touchState();
    for (const b of touchBtns) {
      ctx.save();
      ctx.globalAlpha = st[b.id] ? 0.5 : 0.25;
      ctx.fillStyle = st[b.id] ? '#ffd166' : '#ffffff';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
      ctx.globalAlpha = 0.85;
      txt(ctx, b.label, b.x, b.y + 1, b.r * 0.52, '#1a0e2e', 'center', 900);
      ctx.restore();
    }
  }

  // ---------------------------------------------- render + main loop
  function render() {
    renderWorld();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    skyOverlay();
    zones = [];
    switch (G.state) {
      case 'title': drawTitle(); break;
      case 'garage': drawGarage(); break;
      case 'mode': drawMode(); break;
      case 'count': drawHUD(); drawCountdown(); drawTouch(); break;
      case 'play': drawSpeedLines(); drawHUD(); drawTouch(); break;
      case 'pause': drawHUD(); drawPause(); break;
    }
  }

  let last = performance.now();
  function frame(now) {
    let dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    G.t += dt;
    padMenus();
    switch (G.state) {
      case 'play':
        updatePlay(dt);
        break;
      case 'count': {
        G.cd -= dt;
        const n = Math.ceil(Math.max(0, G.cd));
        if (n !== G.cdLast) {
          G.cdLast = n;
          if (n > 0) SND.beep(440, 0.12, 'square', 0.06);
          else { SND.beep(880, 0.4, 'square', 0.07); }
        }
        // camera settles onto the grid + idle rev
        const k = clamp(dt * 3, 0, 1);
        cam.x = lerp(cam.x, car.x, k); cam.y = lerp(cam.y, car.y, k);
        cam.z = lerp(cam.z, 1.24, k);
        const gas = Math.max((keys.up || touchState().up) ? 1 : 0, padState().thr);
        car.rpm = 0.25 + 0.2 * Math.sin(G.t * 9) + gas * 0.4;
        car.inThr = lerp(car.inThr, gas, clamp(dt * 6, 0, 1));
        updateParticles(dt);
        if (G.cd <= -0.6) G.state = 'play';
        break;
      }
      case 'pause':
        break;
      default:
        menuDrift(dt);
        updateParticles(dt);
    }
    SND.update(dt, car, G.state === 'play' || G.state === 'count');
    render();
    requestAnimationFrame(frame);
  }

  if (window.__EBISU_TEST) {
    window.__dbg = {
      get G() { return G; }, get car() { return car; },
      get score() { return score; }, get lap() { return lap; },
      props, TRACK, CARS, onPress, fmtT, SND, SAVE
    };
  }
  requestAnimationFrame(frame);
  }

  if (typeof window !== 'undefined') startGame();
</script>
